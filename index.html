          <button id="btn-gen-devis" class="btn btn-ghost">📄 Devis / Facture</button>
          <button id="btn-add-revenue" class="btn btn-primary">${iconPlus()} Ajouter entrée</button>
        </div>
      </div>
      <p style="color:rgba(244,238,229,.45);font-size:.875rem;margin-bottom:24px;">Revenus par projet · Visible uniquement par admin et contrôleur</p>

      ${(()=>{
        const anomalies = detectFinanceAnomalies();
        if (!anomalies.length) return '';
        return `<div style="margin-bottom:20px;background:rgba(240,169,136,.08);border:1px solid rgba(240,169,136,.25);border-radius:14px;padding:16px 18px;">
          <div style="display:flex;align-items:center;gap:8px;margin-bottom:10px;">
            <span style="font-size:1.1rem;">📉</span>
            <span style="font-size:.9rem;font-weight:600;color:var(--peach);">Analyse financière — points d'attention</span>
          </div>
          ${anomalies.map(a=>`<div style="display:flex;align-items:flex-start;gap:8px;margin-bottom:6px;font-size:.84rem;color:var(--ink-2);">
            <span style="color:var(--peach);flex-shrink:0;">${a.type==='trend'?'↘':'⚠'}</span>
            <span>${esc(a.message)}</span>
          </div>`).join('')}
        </div>`;
      })()}

      <!-- KPIs -->
      <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:14px;margin-bottom:28px;">
        <div class="glass-card stat-card">
          <span style="font-size:1.5rem;">💰</span>
          <div style="font-size:1.8rem;font-weight:700;color:var(--sage);margin-top:8px;">${fmtAmt(total)}</div>
          <div style="font-size:.82rem;font-weight:600;color:var(--ink-2);margin-top:4px;">Revenu total</div>
          <div style="font-size:.72rem;color:var(--ink-4);">${entries.length} entrée(s)</div>
        </div>
        <div class="glass-card stat-card">
          <span style="font-size:1.5rem;">📅</span>
          <div style="font-size:1.8rem;font-weight:700;color:var(--sky);margin-top:8px;">${fmtAmt(monthTotal)}</div>
          <div style="font-size:.82rem;font-weight:600;color:var(--ink-2);margin-top:4px;">Ce mois</div>
          <div style="font-size:.72rem;color:var(--ink-4);">${thisMonth}</div>
        </div>
        <div class="glass-card stat-card">
          <span style="font-size:1.5rem;">📊</span>
          <div style="font-size:1.8rem;font-weight:700;color:var(--peach);margin-top:8px;">${fmtAmt(avgPerProject)}</div>
          <div style="font-size:.82rem;font-weight:600;color:var(--ink-2);margin-top:4px;">Moy. par entrée</div>
          <div style="font-size:.72rem;color:var(--ink-4);">${projectEntries.length} projet(s)</div>
        </div>
      </div>

      <!-- Goals -->
      <div class="glass-card" style="padding:20px;margin-bottom:24px;">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:${(monthGoal>0||annualGoal>0)?'14':'0'}px;">
          <h2 style="font-size:.95rem;font-weight:600;color:var(--peach);">🎯 Objectifs</h2>
          <button id="btn-edit-goals" class="btn btn-ghost btn-sm">Modifier</button>
        </div>
        ${monthGoal<=0&&annualGoal<=0?`<div style="font-size:.82rem;color:var(--ink-4);">Aucun objectif défini. Cliquez sur "Modifier".</div>`:''}
        ${monthGoal>0?`
        <div style="margin-bottom:12px;">
          <div style="display:flex;justify-content:space-between;font-size:.82rem;margin-bottom:5px;"><span style="color:var(--ink-2);">Ce mois</span><span style="color:var(--peach);font-weight:600;">${fmtAmt(monthTotal)} / ${fmtAmt(monthGoal)} · ${monthPct}%</span></div>
          <div style="height:8px;background:rgba(255,255,255,.06);border-radius:6px;overflow:hidden;"><div style="height:100%;width:${monthPct}%;background:linear-gradient(90deg,var(--peach),var(--coral));border-radius:6px;"></div></div>
        </div>`:''}
        ${annualGoal>0?`

            const h = Math.max(4, Math.round(monthMap[m]/maxMonth*72));

        <h2 style="font-size:.95rem;font-weight:600;margin-bottom:14px;color:var(--ink-2);">Toutes les entrées</h2>

                  <th style="text-align:right;padding:8px 10px;color:var(--ink-3);font-weight:500;">Montant</th>
                  <th style="text-align:left;padding:8px 10px;color:var(--ink-3);font-weight:500;">Date</th>
                  <th style="text-align:left;padding:8px 10px;color:var(--ink-3);font-weight:500;">Statut</th>

                    <td style="padding:9px 10px;"><span style="font-size:.72rem;padding:2px 8px;border-radius:999px;${e.paymentStatus==='paid'?'background:rgba(147,181,148,.18);color:#b6d1b7;border:1px solid rgba(147,181,148,.3);':e.paymentStatus==='partial'?'background:rgba(240,169,136,.18);color:var(--peach);border:1px solid rgba(240,169,136,.3);':'background:rgba(155,184,216,.12);color:var(--sky);border:1px solid rgba(155,184,216,.3);'}">${e.paymentStatus==='paid'?'✅ Payé':e.paymentStatus==='partial'?'🔶 Partiel':'⏳ Attente'}</span></td>
                    <td style="padding:9px 10px;color:var(--ink-4);font-size:.8rem;max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${esc(e.note||e.label||'')}</td>

          </div>`}

  function wireAdminFinance(){
    document.getElementById('btn-export-finance-csv')?.addEventListener('click',()=>{
      const rows = [['Projet','Montant','Date','Statut paiement','Note','Ajouté par']];
      (db.finance||[]).forEach(e=>{
        const pname = db.projects.find(p=>p.id===e.projectId)?.name||e.label||'—';
        rows.push([pname, e.amount||0, e.date||'', e.paymentStatus||'paid', e.note||e.label||'', e.addedBy||'']);
      });
      const csv = rows.map(r=>r.map(v=>'"'+String(v).replace(/"/g,'""')+'"').join(',')).join('\n');
      const blob = new Blob(['﻿'+csv],{type:'text/csv;charset=utf-8'});
      const a = document.createElement('a'); a.href=URL.createObjectURL(blob);
      a.download='flow_finance_'+new Date().toISOString().slice(0,10)+'.csv'; a.click();
      toast('CSV exporté !','success');
    });
    const btnAdd = document.getElementById('btn-add-revenue');
    if(btnAdd) btnAdd.addEventListener('click',()=>openAddRevenueModal());

    document.getElementById('btn-gen-devis')?.addEventListener('click',openDevisModal);

    const btnGoals=document.getElementById('btn-edit-goals');
    if(btnGoals) btnGoals.addEventListener('click',()=>{
      showModal(`<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:22px;"><h2 style="font-size:1.1rem;font-weight:700;">🎯 Objectifs financiers</h2><button onclick="closeModal()" class="btn btn-ghost btn-sm">✕</button></div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:20px;">
        <div><label class="label">Objectif mensuel (€)</label><input id="goal-monthly" class="glass-input" type="number" min="0" value="${db.financeGoal?.monthly||0}" /></div>
        <div><label class="label">Objectif annuel (€)</label><input id="goal-annual" class="glass-input" type="number" min="0" value="${db.financeGoal?.annual||0}" /></div>
      </div>
      <div style="display:flex;gap:10px;"><button onclick="closeModal()" class="btn btn-ghost" style="flex:1;justify-content:center;">Annuler</button><button id="goal-save" class="btn btn-primary" style="flex:1;justify-content:center;">Enregistrer</button></div>`,
      ()=>{ document.getElementById('goal-save').addEventListener('click',()=>{ if(!db.financeGoal) db.financeGoal={}; db.financeGoal.monthly=parseFloat(document.getElementById('goal-monthly').value)||0; db.financeGoal.annual=parseFloat(document.getElementById('goal-annual').value)||0; saveDB(); toast('Objectifs mis à jour !','success'); closeModal(); refreshAdminTab(); }); });
    });

    document.querySelectorAll('.btn-del-finance').forEach(b=>{
      b.addEventListener('click',()=>{
        const e = (db.finance||[]).find(x=>x.id===b.dataset.fid);
        if(!e) return;
        showModal(`
          <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;">
            <h2 style="font-size:1.05rem;font-weight:700;">🗑 Supprimer l'entrée</h2>
            <button onclick="closeModal()" class="btn btn-ghost btn-sm">✕</button>
          </div>
          <p style="color:var(--ink-2);font-size:.9rem;margin-bottom:20px;">Supprimer <strong>${esc(e.label)}</strong> — <strong>${Number(e.amount).toLocaleString('fr-FR')}€</strong> ?</p>
          <div style="display:flex;gap:10px;">
            <button onclick="closeModal()" class="btn btn-ghost" style="flex:1;justify-content:center;">Annuler</button>
            <button id="confirm-del-fin" class="btn btn-danger" style="flex:1;justify-content:center;">Supprimer</button>
          </div>`,
        ()=>{
          document.getElementById('confirm-del-fin').addEventListener('click',()=>{
            db.finance = db.finance.filter(x=>x.id!==e.id);
            saveDB(); toast('Entrée supprimée.','info'); closeModal(); refreshAdminTab();
          });
        });
      });
    });

  function openAddRevenueModal(){
    const projects = db.projects.filter(p=>!p.archived);
    showModal(`
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:22px;">
        <h2 style="font-size:1.1rem;font-weight:700;">💰 Nouvelle entrée</h2>
        <button onclick="closeModal()" class="btn btn-ghost btn-sm">✕</button>
      </div>
      <div style="margin-bottom:14px;">
        <label class="label">Projet</label>
        <select id="fin-proj" class="glass-input">
          <option value="">— Saisie manuelle —</option>
          ${projects.map(p=>`<option value="${p.id}">${esc(p.name)}</option>`).join('')}
        </select>
      </div>
      <div style="margin-bottom:14px;">
        <label class="label">Libellé (si saisie manuelle)</label>
        <input id="fin-label" class="glass-input" placeholder="Ex : Refonte site Dupont" />
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px;">
        <div><label class="label">Montant (€) *</label><input id="fin-amount" class="glass-input" type="number" min="0" placeholder="2500" /></div>
        <div><label class="label">Date (mois) *</label><input id="fin-date" class="glass-input" type="month" value="${new Date().toISOString().slice(0,7)}" /></div>
      </div>
      <div style="margin-bottom:14px;">
        <label class="label">Note (optionnel)</label>
        <input id="fin-note" class="glass-input" placeholder="Ex : Paiement final, acompte…" />
      </div>
      <div style="margin-bottom:14px;">
        <label class="label">Statut de paiement</label>
        <select id="rev-pstatus" class="glass-input">
          <option value="paid">✅ Payé</option>
          <option value="pending">⏳ En attente</option>
          <option value="partial">🔶 Partiel</option>
        </select>
      </div>
      <div id="fin-msg" style="display:none;margin-bottom:14px;padding:10px 14px;border-radius:8px;font-size:.85rem;"></div>
      <div style="display:flex;gap:10px;">
        <button onclick="closeModal()" class="btn btn-ghost" style="flex:1;justify-content:center;">Annuler</button>
        <button id="fin-save" class="btn btn-primary" style="flex:1;justify-content:center;">Enregistrer</button>
      </div>`,
    ()=>{
      const projSel = document.getElementById('fin-proj');
      projSel.addEventListener('change',()=>{
        const p = db.projects.find(x=>x.id===projSel.value);
        if(p) document.getElementById('fin-label').value = p.name;
      });
      document.getElementById('fin-save').addEventListener('click',()=>{
        const projId = projSel.value;
        const label = document.getElementById('fin-label').value.trim() || (db.projects.find(x=>x.id===projId)?.name||'');
        const amount = parseFloat(document.getElementById('fin-amount').value);
        const date = document.getElementById('fin-date').value;
        const note = document.getElementById('fin-note').value.trim();
        const msg = document.getElementById('fin-msg');
        if(!label){ showMsg(msg,'Entrez un libellé ou sélectionnez un projet.','error'); return; }
        if(!amount||isNaN(amount)||amount<=0){ showMsg(msg,'Entrez un montant valide.','error'); return; }
        if(!date){ showMsg(msg,'Sélectionnez une date.','error'); return; }
        const pstatus = document.getElementById('rev-pstatus')?.value||'paid';
        if(!db.finance) db.finance=[];
        db.finance.push({id:uid(),projectId:projId||null,label,amount,date,note,paymentStatus:pstatus,addedBy:me.username,addedAt:new Date().toISOString()});
        logActivity('finance_added','Revenu enregistré : '+label+' — '+amount+'€');
        saveDB(); toast('Entrée ajoutée !','success'); closeModal(); refreshAdminTab();
      });
    });
  }

  function svgProgressCircle(pct, color='#d97757', size=52){
    const r=20; const circ=2*Math.PI*r;
    const dash=Math.round(pct/100*circ);
    return `<svg width="${size}" height="${size}" viewBox="0 0 52 52" style="flex-shrink:0;">
      <circle cx="26" cy="26" r="${r}" fill="none" stroke="rgba(255,255,255,.08)" stroke-width="5"/>
      <circle cx="26" cy="26" r="${r}" fill="none" stroke="${color}" stroke-width="5"
        stroke-dasharray="${dash} ${circ-dash}" stroke-linecap="round"
        transform="rotate(-90 26 26)"/>
      <text x="26" y="30" text-anchor="middle" fill="${color}" font-size="10" font-weight="700" font-family="Geist,sans-serif">${pct}%</text>
    </svg>`;
  }

  function launchConfetti(){
    const cols=['#d97757','#93b594','#9bb8d8','#c4a3d4','#f0c080','#e07080'];
    for(let i=0;i<70;i++){
      const el=document.createElement('div');
      const s=6+Math.random()*6;
      el.style.cssText=`position:fixed;z-index:9999;width:${s}px;height:${s}px;border-radius:${Math.random()>.5?'50%':'2px'};background:${cols[Math.floor(Math.random()*cols.length)]};left:${Math.random()*100}vw;top:-10px;animation:confetti-fall ${1.5+Math.random()*2}s ease-in ${Math.random()*.8}s forwards;pointer-events:none;`;
      document.body.appendChild(el);
      setTimeout(()=>el.remove(),4000);
    }
  }

  function openManageTasksModal(projectId){
    const p = db.projects.find(x=>x.id===projectId);
    if(!p) return;
    if(!p.internalTasks) p.internalTasks=[];
    const renderList=()=>{
      const c=document.getElementById('tasks-list');
      if(!c) return;
      c.innerHTML=p.internalTasks.map((t,i)=>`
        <div style="display:flex;align-items:center;gap:8px;padding:8px 0;border-bottom:1px solid rgba(255,255,255,.05);">
          <input type="checkbox" class="task-ck" data-i="${i}" ${t.done?'checked':''} style="accent-color:var(--sage);width:16px;height:16px;cursor:pointer;" />
          <span style="flex:1;font-size:.875rem;color:${t.done?'var(--ink-4)':'var(--ink)'};text-decoration:${t.done?'line-through':'none'};">${esc(t.label)}</span>
          <button class="btn btn-danger btn-sm task-dl" data-i="${i}">🗑</button>
        </div>`).join('');
      c.querySelectorAll('.task-ck').forEach(cb=>cb.addEventListener('change',()=>{ p.internalTasks[cb.dataset.i].done=cb.checked; saveDB(); renderList(); refreshAdminTab(); }));
      c.querySelectorAll('.task-dl').forEach(b=>b.addEventListener('click',()=>{ p.internalTasks.splice(Number(b.dataset.i),1); saveDB(); renderList(); refreshAdminTab(); }));
    };
    showModal(`
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;">
        <h2 style="font-size:1.05rem;font-weight:700;">✅ Tâches — ${esc(p.name)}</h2>
        <button onclick="closeModal()" class="btn btn-ghost btn-sm">✕</button>
      </div>
      <div id="tasks-list"></div>
      <div style="display:flex;gap:8px;margin-top:14px;">
        <input id="new-task-inp" class="glass-input" placeholder="Nouvelle tâche…" style="flex:1;" />
        <button id="add-task-btn" class="btn btn-primary btn-sm">Ajouter</button>
      </div>`,
    ()=>{
      renderList();
      const doAdd=()=>{ const v=document.getElementById('new-task-inp')?.value.trim(); if(!v) return; p.internalTasks.push({id:uid(),label:v,done:false}); document.getElementById('new-task-inp').value=''; saveDB(); renderList(); refreshAdminTab(); };
      document.getElementById('add-task-btn')?.addEventListener('click',doAdd);
      document.getElementById('new-task-inp')?.addEventListener('keydown',e=>{ if(e.key==='Enter') doAdd(); });
    });
  }

  function openDevisModal(){
    const clients=db.users.filter(u=>u.role==='client');
    showModal(`
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:22px;">
        <h2 style="font-size:1.1rem;font-weight:700;">📄 Devis / Facture</h2>
        <button onclick="closeModal()" class="btn btn-ghost btn-sm">✕</button>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:14px;">
        <div><label class="label">Client</label><select id="dv-client" class="glass-input"><option value="">— Libre —</option>${clients.map(c=>`<option value="${c.id}">${esc(c.username)}</option>`).join('')}</select></div>
        <div><label class="label">N° document</label><input id="dv-num" class="glass-input" value="${new Date().getFullYear()}-${String(Date.now()).slice(-3)}" /></div>
      </div>
      <div style="margin-bottom:14px;"><label class="label">Objet</label><input id="dv-title" class="glass-input" placeholder="Création site vitrine" /></div>
      <div id="dv-lines">
        <div style="font-size:.78rem;font-weight:600;color:var(--ink-3);margin-bottom:6px;">Lignes</div>
        <div class="dv-line" style="display:grid;grid-template-columns:1fr 60px 90px auto;gap:6px;margin-bottom:6px;">
          <input class="glass-input dv-desc" placeholder="Description" />
          <input class="glass-input dv-qty" type="number" value="1" min="1" />
          <input class="glass-input dv-price" type="number" placeholder="Prix HT €" />
          <button class="btn btn-danger btn-sm dv-dl">🗑</button>
        </div>
      </div>
      <button id="dv-add-line" class="btn btn-ghost btn-sm" style="margin-bottom:16px;">+ Ligne</button>
      <div style="display:flex;gap:10px;">
        <button onclick="closeModal()" class="btn btn-ghost" style="flex:1;justify-content:center;">Annuler</button>
        <button id="dv-gen" class="btn btn-primary" style="flex:1;justify-content:center;">Générer PDF</button>
      </div>`,
    ()=>{
      const addLine=()=>{ const d=document.createElement('div'); d.className='dv-line'; d.style.cssText='display:grid;grid-template-columns:1fr 60px 90px auto;gap:6px;margin-bottom:6px;'; d.innerHTML=`<input class="glass-input dv-desc" placeholder="Description"/><input class="glass-input dv-qty" type="number" value="1" min="1"/><input class="glass-input dv-price" type="number" placeholder="Prix HT €"/><button class="btn btn-danger btn-sm dv-dl">🗑</button>`; d.querySelector('.dv-dl').addEventListener('click',()=>d.remove()); document.getElementById('dv-lines').appendChild(d); };
      document.getElementById('dv-add-line').addEventListener('click',addLine);
      document.querySelectorAll('.dv-dl').forEach(b=>b.addEventListener('click',()=>b.closest('.dv-line').remove()));
      document.getElementById('dv-gen').addEventListener('click',()=>{
        if(!window.jspdf){ toast('jsPDF non chargé','error'); return; }
        const {jsPDF}=window.jspdf;
        const pdf=new jsPDF();
        const cid=document.getElementById('dv-client').value;
        const client=db.users.find(u=>u.id===cid);
        const num=document.getElementById('dv-num').value||'001';
        const title=document.getElementById('dv-title').value||'Devis';
        const lines=[...document.querySelectorAll('.dv-line')].map(l=>({desc:l.querySelector('.dv-desc')?.value||'',qty:parseFloat(l.querySelector('.dv-qty')?.value)||1,price:parseFloat(l.querySelector('.dv-price')?.value)||0})).filter(l=>l.desc);
        const ht=lines.reduce((s,l)=>s+l.qty*l.price,0);
        const tva=ht*0.2; const ttc=ht+tva;
        pdf.setFillColor(217,119,87); pdf.rect(0,0,210,28,'F');
        pdf.setTextColor(255,255,255); pdf.setFontSize(22); pdf.setFont('helvetica','bold'); pdf.text('flow',14,18);
        pdf.setFontSize(11); pdf.setFont('helvetica','normal'); pdf.text('N° '+num,50,18); pdf.text(new Date().toLocaleDateString('fr-FR'),160,18);
        pdf.setTextColor(26,19,14); pdf.setFontSize(13); pdf.setFont('helvetica','bold'); pdf.text('Pour :',14,42);
        pdf.setFont('helvetica','normal'); pdf.setFontSize(11);
        if(client){ pdf.text((client.firstName||'')+' '+(client.lastName||client.username),14,52); if(client.email) pdf.text(client.email,14,60); }
        pdf.setFontSize(14); pdf.setFont('helvetica','bold'); pdf.setTextColor(217,119,87); pdf.text(title,14,72);
        let y=84; pdf.setFillColor(245,238,230); pdf.rect(14,y-6,182,10,'F');
        pdf.setFontSize(10); pdf.setFont('helvetica','bold'); pdf.setTextColor(80,60,40);
        pdf.text('Description',16,y); pdf.text('Qté',128,y); pdf.text('PU HT',148,y); pdf.text('Total HT',172,y); y+=10;
        pdf.setFont('helvetica','normal'); pdf.setTextColor(26,19,14);

            <span style="font-size:.9rem;">⚠️</span>
            <div style="flex:1;min-width:0;">
              <span style="font-weight:600;color:#f08a8a;">${esc(r.clientUsername||'—')}</span>
              <span style="color:var(--ink-3);"> — "${esc(r.originalMessage.substring(0,70))}"</span>

  function wireAdminAIAutomation(){
    const saveBtn = document.getElementById('btn-save-ai-config');
    if(saveBtn) saveBtn.addEventListener('click',()=>{
      const g = document.getElementById('ai-groq-key').value.trim();
      if(!g){ toast('Veuillez entrer une clé API Groq.','error'); return; }
      if(!db.aiConfig) db.aiConfig={};
      db.aiConfig.groqKey = g;
      if('claudeKey' in db.aiConfig) delete db.aiConfig.claudeKey;
      if('geminiKey' in db.aiConfig) delete db.aiConfig.geminiKey;
      saveDB(); toast('Clé Groq enregistrée ✓','success');
    });

    // #6 — Rapport hebdomadaire IA
    const reportBtn = document.getElementById('btn-weekly-report');
    if(reportBtn) reportBtn.addEventListener('click', async()=>{
      const groqKey = db.aiConfig?.groqKey;
      if(!groqKey){ toast('Clé Groq non configurée.','error'); return; }
      const since7 = new Date(); since7.setDate(since7.getDate()-7);
      const weekReqs = (db.aiRequests||[]).filter(r=>r.status==='answered'&&new Date(r.createdAt)>since7);
      if(!weekReqs.length){ toast('Aucune conversation cette semaine.','info'); return; }
      reportBtn.disabled=true; reportBtn.textContent='Génération…';
      try{
        const lines = weekReqs.map(r=>`- @${r.clientUsername||'?'} : "${r.originalMessage}"`).join('\n');
        const prompt = `Voici les questions posées par des clients sur leur projet cette semaine :\n\n${lines}\n\nFais un résumé structuré en français :\n1. Les thèmes les plus fréquents\n2. Les points de blocage éventuels\n3. Les recommandations pour l'équipe\n\nSois concis (maximum 200 mots).`;
        const json = await groqPost(groqKey,[{role:'user',content:prompt}],400);
        const summary = json.choices?.[0]?.message?.content||'';
        showModal(`<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;"><h2 style="font-size:1rem;font-weight:700;">📊 Résumé IA — 7 derniers jours</h2><button onclick="closeModal()" class="btn btn-ghost btn-sm">✕</button></div><div style="font-size:.875rem;color:var(--ink-2);line-height:1.7;white-space:pre-wrap;background:rgba(255,255,255,.03);border-radius:10px;padding:16px;">${esc(summary)}</div>`);
      } catch(_){ toast('Erreur lors de la génération.','error'); }
      reportBtn.disabled=false; reportBtn.textContent='📊 Résumé IA — 7 derniers jours';
    });

    // #4 — Génération FAQ automatique
    document.querySelectorAll('.btn-gen-faq').forEach(btn=>{
      btn.addEventListener('click', async()=>{
        const groqKey = db.aiConfig?.groqKey;
        if(!groqKey){ toast('Clé Groq non configurée.','error'); return; }
        const uid_c = btn.dataset.uid;
        const pid   = btn.dataset.pid;
        const proj  = db.projects.find(p=>p.id===pid);
        if(!proj){ toast('Projet introuvable.','error'); return; }
        const reqs  = (db.aiRequests||[]).filter(r=>r.clientId===uid_c&&r.status==='answered');
        btn.disabled=true; btn.textContent='…';
        try{
          const lines = reqs.slice(-20).map(r=>`Q: ${r.originalMessage}\nR: ${(r.groqAnswer||'').substring(0,200)}`).join('\n\n');
          const prompt = `Voici des échanges Q&A entre un client et un assistant IA sur son projet "${proj.name}" :\n\n${lines}\n\nIdentifie 3 à 5 questions fréquentes ou importantes et génère des paires FAQ claires en français. Format JSON :\n[{"q":"question","a":"réponse concise"},...]`;
          const json = await groqPost(groqKey,[{role:'user',content:prompt}],600);
          let raw = json.choices?.[0]?.message?.content||'';
          raw = raw.replace(/```json\n?/g,'').replace(/```/g,'').trim();
          let faqs=[];
          try{ faqs=JSON.parse(raw); }catch(_){ throw new Error('Format JSON invalide'); }
          if(!faqs.length) throw new Error('Aucune FAQ générée');
          // Afficher pour validation
          showModal(`<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;"><h2 style="font-size:1rem;font-weight:700;">💡 FAQ suggérées — ${esc(proj.name)}</h2><button onclick="closeModal()" class="btn btn-ghost btn-sm">✕</button></div>
            <p style="font-size:.82rem;color:var(--ink-3);margin-bottom:14px;">Sélectionnez les entrées à ajouter à la FAQ du projet :</p>
            ${faqs.map((f,i)=>`<label style="display:flex;gap:10px;padding:10px 12px;border-radius:8px;border:1px solid rgba(255,255,255,.08);background:rgba(255,255,255,.02);margin-bottom:8px;cursor:pointer;align-items:flex-start;"><input type="checkbox" id="faq-${i}" checked style="margin-top:3px;accent-color:var(--coral);flex-shrink:0;"><div><div style="font-size:.84rem;font-weight:600;color:var(--ink);">${esc(f.q)}</div><div style="font-size:.78rem;color:var(--ink-3);margin-top:3px;">${esc(f.a)}</div></div></label>`).join('')}
            <div style="display:flex;gap:8px;margin-top:16px;"><button onclick="closeModal()" class="btn btn-ghost" style="flex:1;justify-content:center;">Annuler</button><button id="faq-confirm" class="btn btn-primary" style="flex:1;justify-content:center;">✅ Ajouter au projet</button></div>`,
            ()=>{
              document.getElementById('faq-confirm').addEventListener('click',()=>{
                if(!Array.isArray(proj.faq)) proj.faq=[];
                faqs.forEach((f,i)=>{ if(document.getElementById('faq-'+i)?.checked) proj.faq.push({id:'faq_'+Date.now()+'_'+i, q:f.q, a:f.a}); });
                saveDB(); toast('FAQ ajoutée au projet ✓','success'); closeModal(); refreshAdminTab();
              });
            });
        } catch(e){ toast('Impossible de générer la FAQ : '+String(e).substring(0,60),'error'); }
        btn.disabled=false; btn.textContent='✨ Générer FAQ';
      });
    });
  }

  // #2 — Suggestions contextuelles selon l'état du projet
  function generateContextSuggestions(project){
    if(!project) return [
      'Parlez-moi de votre agence', 'Quels sont vos délais habituels ?',
      'Comment se passe la collaboration ?', 'Quels services proposez-vous ?'
    ];
    const sugs = [];
    const tl       = project.timeline||[];
    const current  = tl.find(s=>s.status==='current');
    const done     = tl.filter(s=>s.status==='done').length;
    const pending  = tl.filter(s=>s.status==='pending').length;
    const pct      = tl.length>0 ? Math.round(done/tl.length*100) : 0;
    const daysLeft = project.dueDate ? Math.ceil((new Date(project.dueDate)-new Date())/86400000) : null;
    const pendingDocs = (db.documents||[]).filter(d=>d.projectId===project.id&&d.status==='pending');
    const filledDocs  = (db.documents||[]).filter(d=>d.projectId===project.id&&d.status==='filled');

    if(current)                        sugs.push(`Qu'est-ce qui reste à faire pour "${current.label}" ?`);
    if(pct>0&&pct<100)                 sugs.push(`Que représentent concrètement les ${pct}% réalisés ?`);
    if(daysLeft!==null&&daysLeft<=7&&daysLeft>0) sugs.push(`La livraison est dans ${daysLeft}j — tout est sur les rails ?`);
    if(daysLeft!==null&&daysLeft<=0)   sugs.push('Quel est le nouveau calendrier de livraison ?');
    if(pendingDocs.length>0)           sugs.push(`Mon document "${pendingDocs[0].name}" — que dois-je compléter ?`);
    if(filledDocs.length>0)            sugs.push('Avez-vous bien reçu mes documents remplis ?');
    if(pending>0&&current)             sugs.push(`Après "${current.label}", quelle est la prochaine étape ?`);
    if(project.tags?.includes('e-commerce'))  sugs.push('Comment sera gérée la boutique en ligne ?');
    if(project.tags?.includes('restaurant'))  sugs.push('La réservation en ligne sera-t-elle disponible ?');
    if(project.websiteUrl)             sugs.push('Puis-je déjà voir une version en cours du site ?');
    sugs.push('Quand aurai-je un aperçu visuel ?');
    return sugs.slice(0,4);
  }

  // #5 — Détection de frustration (local, sans API)
  function detectFrustration(text){
    const neg=/toujours pas|ça fait \d|encore rien|jamais livré|en retard|trop long|inacceptable|inadmissible|sans nouvelle|aucune réponse|pas normal|catastrophique|honteux|vous foutez|foutage de gueule|arnaque|remboursement|avocat|plainte/i;
    return neg.test(text);
  }

  // #7 — Détection de demandes de tâche dans les messages
  function detectTaskRequest(text){
    const taskWords=/il faudrait|faut ajouter|peut-on ajouter|ajouter une|créer une|mettre en place|je voudrais|j'aimerais|on pourrait|serait possible|manque une|page .+manque|section .+à faire|bouton .+à mettre|formulaire .+à créer/i;
    return taskWords.test(text);
  }

  // Cooldown : après QA_BURST_SIZE messages, pause QA_COOLDOWN_MS ms avant la prochaine salve
  const QA_BURST_SIZE   = 3;
  const QA_COOLDOWN_MS  = 60_000; // 60 secondes
  let _qaBurstCount    = 0;   // messages envoyés dans la salve courante
  let _qaCooldownUntil = 0;   // timestamp fin du cooldown (0 = pas de cooldown)
  let _qaConversationHistory = []; // mémoire multi-tour [{role,content}]
  /* ── Discussion Q&A mode ─────────────────────── */
  // Rendu markdown simple pour les réponses IA
  function renderMarkdown(raw){
    if(!raw) return '';
    const e = s=>s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    return e(raw)
      // Titres ###
      .replace(/^###\s+(.+)$/gm,'<h3 class="qa-md-h">$1</h3>')
      // Gras **text**
      .replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>')
      // Italique *text*
      .replace(/\*(.+?)\*/g,'<em>$1</em>')
      // Code inline `code`
      .replace(/`([^`\n]+)`/g,'<code>$1</code>')
      // Listes (- item ou • item)
      .replace(/^[-•*]\s+(.+)$/gm,'<li>$1</li>')
      // Paragraphes (double \n)
      .split(/\n{2,}/).map(p=>{
        p=p.trim(); if(!p) return '';
        if(/<li>/.test(p)) return `<ul class="qa-md">${p}</ul>`;
        if(/<h3/.test(p)) return p;
        return `<p class="qa-md">${p.replace(/\n/g,'<br>')}</p>`;
      }).join('');
  }

  // ── Initialise la mémoire multi-tour depuis db ────
  function initQAHistory(){
    const past = (db.aiRequests||[])
      .filter(r=>r.clientId===me.id && r.type==='qa' && r.status==='answered' && (r.groqAnswer||r.geminiAnswer))
      .sort((a,b)=>new Date(a.createdAt)-new Date(b.createdAt))
      .slice(-8); // 8 derniers échanges = 16 messages max
    _qaConversationHistory = past.flatMap(r=>[
      { role:'user',      content: r.originalMessage },
      { role:'assistant', content: r.groqAnswer || r.geminiAnswer || '' }
    ]);
  }

  // ── Construit les messages pour Groq (système + historique + message courant)
  function buildGroqMessages(userText, project, siteHtml){
    const siteText = siteHtml
      ? siteHtml.replace(/<style[^>]*>[\s\S]*?<\/style>/gi,'')
                .replace(/<script[^>]*>[\s\S]*?<\/script>/gi,'')
                .replace(/<[^>]+>/g,' ')
                .replace(/\s+/g,' ').trim().substring(0,3500)
      : '';
    const ctx = [];
    if(project){
      if(project.name)           ctx.push(`Projet : ${project.name}`);
      if(project.status)         ctx.push(`Statut : ${{pending:'En attente',in_progress:'En cours',done:'Terminé'}[project.status]||project.status}`);
      if(project.progress!=null) ctx.push(`Avancement : ${project.progress}%`);
      if(project.currentStep)    ctx.push(`Étape en cours : ${project.currentStep}`);
      if(project.dueDate)        ctx.push(`Livraison prévue : ${new Date(project.dueDate).toLocaleDateString('fr-FR')}`);
      if(project.tags?.length)   ctx.push(`Technologies : ${project.tags.join(', ')}`);
      if(project.description)    ctx.push(`Description : ${project.description.substring(0,250)}`);
    }
    const ctxBlock = ctx.length ? `\n\nContexte du projet :\n${ctx.join('\n')}` : '';
    const siteBlock = siteText
      ? `\n\nExtrait textuel du site :\n"""\n${siteText}\n"""`
      : '\n\n(Aucun fichier site lié — mode test.)';
    // #10 — Bonnes pratiques selon le type de projet (tags)
    const sectorTips = project?.tags?.length ? (() => {
      const tips = [];
      if(project.tags.some(t=>/restaurant|café|bar|food/i.test(t))) tips.push('Pour un site restaurant : mets en avant la réservation en ligne, le menu photographié, les horaires et la localisation.');
      if(project.tags.some(t=>/e-commerce|boutique|shop|magasin/i.test(t))) tips.push('Pour un e-commerce : panier clair, processus de paiement simplifié, photos produits de qualité, avis clients.');
      if(project.tags.some(t=>/portfolio|freelance|créatif/i.test(t))) tips.push('Pour un portfolio : page "À propos" percutante, projets avec résultats mesurables, contact simplifié.');
      if(project.tags.some(t=>/immobilier|agence|property/i.test(t))) tips.push('Pour un site immobilier : filtres de recherche intuitifs, galeries photos immersives, formulaire de contact par bien.');
      return tips.length ? `\n\n💡 Bonnes pratiques pour ce type de projet (${project.tags.join(', ')}) :\n${tips.join('\n')}` : '';
    })() : '';

    const system = `Tu es un assistant conversationnel pour une agence web. Tu réponds de façon naturelle, concise et structurée.

LANGUE : Détecte automatiquement la langue du message du client et réponds DANS CETTE MÊME LANGUE. Si le client écrit en anglais → réponds en anglais. En espagnol → espagnol. Par défaut : français.

Ce que tu peux faire :
- Expliquer l'avancement du projet et ses étapes
- Décrire le code du site existant, les technologies et choix techniques
- Répondre aux questions générales sur le projet, les délais, la livraison
- Te souvenir du contexte de la conversation précédente

Ce que tu n'as pas la capacité de faire :
- Générer, écrire ou modifier du code (tu n'as simplement pas cette fonctionnalité)
- Créer des pages ou du contenu pour le site
Si on te demande d'écrire du code, explique naturellement que tu n'as pas cette capacité. Ne mentionne ni règles ni formulaire.

Utilise du markdown simple (**gras**, listes à puces, titres ###) pour structurer tes réponses quand c'est utile. Sois concis.${ctxBlock}${siteBlock}${sectorTips}`;

    return [
      { role:'system', content:system },
      ..._qaConversationHistory.slice(-14), // max 7 échanges passés
      { role:'user', content:userText }
    ];
  }

    // #1 — Brief automatique (une fois par session, si pas d'historique)
    const briefKey = 'qa_brief_'+me.id;
    const hasHistory = (db.aiRequests||[]).some(r=>r.clientId===me.id&&r.type==='qa'&&r.status==='answered');
    if(!hasHistory && !sessionStorage.getItem(briefKey) && db.aiConfig?.groqKey){
      sessionStorage.setItem(briefKey,'1');
      setTimeout(()=>generateWelcomeBrief(), 600);
    }

    // #9 — Entrée vocale (Web Speech API)
    const voiceBtn = document.getElementById('qa-voice-btn');
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    if(SR && voiceBtn){
      voiceBtn.style.display='flex';
      const rec = new SR();
      rec.lang='fr-FR'; rec.continuous=false; rec.interimResults=true;
      let listening=false;
      voiceBtn.addEventListener('click',()=>{
        if(listening){ rec.stop(); return; }
        rec.start(); listening=true;
        voiceBtn.textContent='🔴'; voiceBtn.style.color='#f08a8a';
      });
      rec.onresult=e=>{
        const t=Array.from(e.results).map(r=>r[0].transcript).join('');
        input.value=t; input.dispatchEvent(new Event('input'));
      };
      rec.onend=()=>{ listening=false; voiceBtn.textContent='🎤'; voiceBtn.style.color='var(--sky)'; };
      rec.onerror=()=>{ listening=false; voiceBtn.textContent='🎤'; voiceBtn.style.color='var(--sky)'; };
    }

    // ── Auto-resize textarea ─────────────────────────
    const resizeInput = ()=>{
      input.style.height = 'auto';
      input.style.height = Math.min(input.scrollHeight, 120) + 'px';
    };

    // ── Compte à rebours live ───────────────────────
    function startCooldownTick(){
      clearInterval(_qaCooldownTimer);
      _qaCooldownTimer = setInterval(()=>{
        const badge = document.getElementById('qa-rate-badge');
        const inp   = document.getElementById('qa-input');
        const btn   = document.getElementById('qa-send-btn');
        if(!badge){ clearInterval(_qaCooldownTimer); return; }
        const rem = Math.ceil((_qaCooldownUntil - Date.now()) / 1000);
        if(rem <= 0){
          clearInterval(_qaCooldownTimer);
          _qaCooldownUntil = 0;
          badge.textContent = `${_qaBurstCount}/${QA_BURST_SIZE}`;
          badge.style.background = 'rgba(155,184,216,.08)';
          badge.style.borderColor = 'rgba(155,184,216,.2)';
          badge.style.color = 'var(--sky)';
          if(inp){ inp.disabled=false; inp.placeholder='Posez une question…'; inp.focus(); }
          if(btn) btn.disabled=false;
        } else {
          badge.textContent = `⏸ ${rem}s`;
          badge.style.background = 'rgba(220,80,80,.15)';
          badge.style.borderColor = 'rgba(220,80,80,.3)';
          badge.style.color = '#f08a8a';
          if(inp){ inp.disabled=true; inp.placeholder=`Disponible dans ${rem}s…`; }
          if(btn) btn.disabled=true;
        }
      }, 500);
    }
    if(_qaCooldownUntil > Date.now()) startCooldownTick();

    // ── Compteur de caractères ──────────────────────
    input.addEventListener('input', ()=>{
      resizeInput();
      const len = input.value.length;
      if(charCount){
        charCount.textContent = len > 350 ? `${len}/500` : '';
        charCount.style.color = len>=500?'var(--coral)':len>=425?'var(--peach)':'var(--ink-4)';
      }
    });

    // ── Chips de suggestion ─────────────────────────
    document.querySelectorAll('.qa-suggestion').forEach(btn=>{
      btn.addEventListener('click',()=>{
        input.value = btn.dataset.q;
        resizeInput();
        input.focus();
        // Masquer les suggestions
        const sugg = document.getElementById('qa-suggestions');
        if(sugg) sugg.style.opacity = '0';
      });
    });

    // ── Bouton effacer la conversation ──────────────
    const clearBtn = document.getElementById('qa-clear-btn');
    if(clearBtn) clearBtn.addEventListener('click',()=>{
      confirmAction('Effacer tout l\'historique de conversation ?', ()=>{
        db.aiRequests = (db.aiRequests||[]).filter(r=>!(r.clientId===me.id&&r.type==='qa'));
        _qaConversationHistory = [];
        saveDB();
        refreshClientTab(true);
      }, {label:'Effacer', danger:true});

    // ── Fonction d'injection DOM d'un échange ───────
    function injectUserBubble(text){
      const msgs = document.getElementById('qa-messages');
      if(!msgs) return;
      // Retirer l'état vide
      const empty = document.getElementById('qa-empty-state');
      if(empty) empty.style.display='none';
      const t = new Date().toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'});
      const div = document.createElement('div');
      div.style.cssText = 'display:flex;flex-direction:column;align-items:flex-end;gap:2px;';
      div.innerHTML = `
        <div style="max-width:82%;background:var(--coral);color:#fff;border-radius:18px 18px 5px 18px;padding:10px 14px;font-size:.875rem;line-height:1.55;word-break:break-word;">${esc(text)}</div>
        <div style="font-size:.63rem;color:var(--ink-4);padding-right:2px;">${t}</div>`;
      msgs.appendChild(div);
      msgs.scrollTop = msgs.scrollHeight;
    }

    function injectAIBubble(msgId){
      const msgs = document.getElementById('qa-messages');
      if(!msgs) return;
      const wrap = document.createElement('div');
      wrap.id = msgId+'-wrap';
      wrap.style.cssText = 'display:flex;align-items:flex-start;gap:8px;';
      wrap.innerHTML = `
        <div style="width:24px;height:24px;border-radius:50%;background:linear-gradient(135deg,rgba(155,184,216,.28),rgba(155,184,216,.12));display:flex;align-items:center;justify-content:center;font-size:.75rem;flex-shrink:0;margin-top:2px;">✨</div>
        <div style="flex:1;min-width:0;">
          <div id="${msgId}-content" class="qa-md" style="background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:5px 18px 18px 18px;padding:11px 14px;font-size:.875rem;color:var(--ink-2);line-height:1.65;word-break:break-word;">
            <span style="display:inline-flex;gap:4px;align-items:center;">
              <span style="width:5px;height:5px;border-radius:50%;background:var(--ink-4);animation:qa-dot 1.2s 0s infinite;display:inline-block;"></span>
              <span style="width:5px;height:5px;border-radius:50%;background:var(--ink-4);animation:qa-dot 1.2s .2s infinite;display:inline-block;"></span>
              <span style="width:5px;height:5px;border-radius:50%;background:var(--ink-4);animation:qa-dot 1.2s .4s infinite;display:inline-block;"></span>
            </span>
          </div>
        </div>`;
      msgs.appendChild(wrap);
      msgs.scrollTop = msgs.scrollHeight;
    }

    // ── Envoi ───────────────────────────────────────
    const doSend = async ()=>{
      const text = input.value.trim();
      if(!text) return;
      if(text.length > 500){ toast('Question trop longue (max 500 car.).','error'); return; }
      if(Date.now() < _qaCooldownUntil){
        toast(`Patientez encore ${Math.ceil((_qaCooldownUntil-Date.now())/1000)}s.`,'info'); return;
      }
      const groqKey = db.aiConfig?.groqKey;
      if(!groqKey){ toast('Assistant non configuré. Contactez votre équipe.','error'); return; }

      // 1 — Vider & désactiver l'input
      const userText = text;
      input.value=''; resizeInput();
      if(charCount) charCount.textContent='';
      input.disabled=true; sendBtn.disabled=true;

      // 2 — Injecter les bulles dans le DOM
      const msgId = 'qa_'+Date.now();
      injectUserBubble(userText);
      injectAIBubble(msgId);

      const proj     = getUserProject(me.id);
      const siteHtml = proj?(proj.siteHtml||''):'';
      const messages = buildGroqMessages(userText, proj||null, siteHtml);
      const contentEl = ()=>document.getElementById(msgId+'-content');
      let fullAnswer = '';

      try{
        // 3 — Streaming : chaque chunk met à jour la bulle en temps réel
        await groqPostStream(groqKey, messages, partial=>{
          fullAnswer = partial;
          const el = contentEl();
          if(el) el.innerHTML = renderMarkdown(partial) + '<span class="qa-cursor">▋</span>';
          const msgs = document.getElementById('qa-messages');
          if(msgs) msgs.scrollTop = msgs.scrollHeight;
        }, 700);

        // 4 — Finaliser : retirer le curseur
        const el = contentEl();
        if(el) el.innerHTML = renderMarkdown(fullAnswer);

        // 5 — Sauvegarder dans db (#5 frustration + #7 tâches)
        const isFrustrated = detectFrustration(userText);
        const isTaskRequest = detectTaskRequest(userText);
        if(!db.aiRequests) db.aiRequests=[];
        const reqId = msgId+'_'+Math.random().toString(36).slice(2,5);
        db.aiRequests.push({
          id:reqId, clientId:me.id, clientUsername:me.username, type:'qa',
          originalMessage:userText, status:'answered', groqAnswer:fullAnswer,
          frustration: isFrustrated || undefined,
          possibleTask: isTaskRequest || undefined,
          createdAt:new Date().toISOString(), updatedAt:new Date().toISOString()
        });
        saveDB();

        // 6 — Mettre à jour la mémoire multi-tour
        _qaConversationHistory.push({role:'user',      content:userText});
        _qaConversationHistory.push({role:'assistant', content:fullAnswer});

        // 7 — Compteur de burst
        _qaBurstCount++;
        if(_qaBurstCount >= QA_BURST_SIZE){
          _qaBurstCount=0;
          _qaCooldownUntil = Date.now()+QA_COOLDOWN_MS;
          startCooldownTick();
        } else {
          const badge = document.getElementById('qa-rate-badge');
          if(badge) badge.textContent=`${_qaBurstCount}/${QA_BURST_SIZE}`;
        }

      } catch(err){
        // Retirer la bulle IA vide en cas d'erreur
        const wrap = document.getElementById(msgId+'-wrap');
        if(wrap) wrap.remove();
        const msg = String(err).includes('RATE_LIMIT')
          ? 'Assistant indisponible — réessayez dans quelques secondes.'
          : String(err).includes('INVALID_KEY')
          ? 'Clé API invalide. Vérifiez la configuration.'
          : 'Erreur de connexion à l\'assistant.';
        toast(msg,'error');
      } finally {
        if(Date.now() >= _qaCooldownUntil){
          input.disabled=false; sendBtn.disabled=false; input.focus();
        }
      }
    };

    sendBtn.addEventListener('click', doSend);
    input.addEventListener('keydown', e=>{
      if((e.ctrlKey||e.metaKey)&&e.key==='Enter'){ e.preventDefault(); doSend(); }
      if(e.key==='Enter'&&!e.shiftKey&&window.innerWidth<769){ e.preventDefault(); doSend(); }
    });
  }

        if(!Array.isArray(req.comments)) req.comments=[];
        req.comments.push({ id:'c_'+Date.now(), author:me.username||me.firstName||'Client', text, createdAt:new Date().toISOString() });
        saveDB(); toast('Commentaire ajouté.','success'); refreshClientTab();
      });
    });

    // Revision toggle
    document.querySelectorAll('.btn-request-revision').forEach(btn=>{
      btn.addEventListener('click',()=>{
        const form=document.getElementById('revision-form-'+btn.dataset.id);
        if(form) form.style.display=form.style.display==='none'?'block':'none';
      });
    });

    // Revision submit
    document.querySelectorAll('.btn-revision-submit').forEach(btn=>{
      btn.addEventListener('click',async ()=>{
        const id=btn.dataset.id, inp=document.getElementById('revision-input-'+id);
        const text=(inp?.value||'').trim();
        if(!text){ toast('Décrivez les modifications souhaitées.','error'); return; }
        btn.disabled=true; btn.textContent='Envoi…';
        await submitDiscussionMessage(text, null, { isRevision:true, revisedFromId:id });
        toast('Demande de révision envoyée.','success');
      });
    });
    const msgs = document.getElementById('discussion-messages');
    if(msgs) msgs.scrollTop = msgs.scrollHeight;
  }

  // ════════════════════════════════════════════════
  //  AI WORKFLOW
  // ════════════════════════════════════════════════
  function localModerate(text){
    const banned = /haine|violence|meurtre|terroris|pornograph|racist|sexist|illégal|drogue|arnaque/i;
    if(banned.test(text)) return { passed:false, reason:'Contenu non conforme détecté localement.' };
    if(text.length<3) return { passed:false, reason:'Message trop court.' };
    return { passed:true, reason:'' };
  }

  async function submitDiscussionMessage(text, photoBase64, opts={}){
    const reqId = 'air_'+Date.now()+'_'+Math.random().toString(36).slice(2,7);
    const _proj = getUserProject(me.id)||getUserProjects(me.id)[0]||null;
    let projectContext = null;
    if(_proj){
      const tl=_proj.timeline||[];
      const doneCnt=tl.filter(s=>s.status==='done').length;
      projectContext={
        name:_proj.name, description:_proj.description||'',
        status:_proj.status, websiteUrl:_proj.websiteUrl||'',
        progress:tl.length>0?Math.round(doneCnt/tl.length*100):0,
        currentStep:tl.find(s=>s.status==='current')?.label||'',
        dueDate:_proj.dueDate||'', tags:(_proj.tags||[]).join(', '),
        priority:_proj.priority||''
      };
    }
    const req = {
      id: reqId, clientId: me.id, clientUsername: me.username,
      originalMessage: text, originalPhoto: photoBase64||null,
      projectContext, requestType: _discType||'site',
      isRevision: opts.isRevision||false, revisedFromId: opts.revisedFromId||null,
      moderationPassed: null, moderationReason: '',
      reformulatedPrompt: '', adminAction: null, adminModifiedPrompt: '',
      claudeResponse: '', comments: [], status: 'pending_moderation',
      createdAt: new Date().toISOString(), updatedAt: new Date().toISOString()
    };
    db.aiRequests.push(req);
    saveDB();
    refreshClientTab();
    toast('Votre demande est enregistrée.','success');
    const geminiKey = db.aiConfig&&(db.aiConfig.groqKey||db.aiConfig.geminiKey||'');
    if(!geminiKey){
      // Modération locale sans clé IA
      const localMod = localModerate(text);
      const r=db.aiRequests.find(x=>x.id===reqId);
      if(!r) return;
      if(!localMod.passed){
        r.status='moderation_failed'; r.moderationPassed=false; r.moderationReason=localMod.reason; r.updatedAt=new Date().toISOString();
        saveDB(); refreshClientTab(); return;
      }
      r.moderationPassed=true; r.reformulatedPrompt=text; r.status='pending_admin'; r.updatedAt=new Date().toISOString();
      saveDB(); refreshClientTab();
      toast('Demande transmise à l\'équipe (mode sans Gemini).','info'); return;
    }
    try{
      // Appel unique : modération + classification d'intention combinées
      const lastCompleted = [...(db.aiRequests||[])].reverse().find(x=>x.clientId===me.id&&x.status==='completed'&&x.claudeResponse);
      const siteHtml = (!opts.isRevision && lastCompleted) ? lastCompleted.claudeResponse : null;
      const combined = await callGeminiModerateAndClassify(text, photoBase64, siteHtml, geminiKey);
      const r=db.aiRequests.find(x=>x.id===reqId);
      if(!r) return;
      if(!combined.moderation.passed){
        r.status='moderation_failed'; r.moderationPassed=false; r.moderationReason=combined.moderation.reason; r.updatedAt=new Date().toISOString();
        saveDB(); refreshClientTab(); return;
      }
      r.moderationPassed=true;
      // Brancher selon l'intention détectée
      if(siteHtml && combined.intent==='question'){
        toast('Réponse IA en cours…','info');
        const answer = await callGeminiAnswer(text, siteHtml, r.projectContext, geminiKey);
        r.status='answered'; r.geminiAnswer=answer; r.updatedAt=new Date().toISOString();
        saveDB(); refreshClientTab();
        toast('Réponse IA reçue !','success');
        return;
      }
      const reformulated = await callGeminiReformulate(text, geminiKey, r.projectContext||null, r.requestType||'site');
      r.reformulatedPrompt=reformulated; r.status='pending_admin'; r.updatedAt=new Date().toISOString();
      saveDB(); refreshClientTab();
      logActivity('ai_request','Demande IA soumise par '+me.username);
    } catch(err){
      const r=db.aiRequests.find(x=>x.id===reqId);
      const isRateLimit = String(err).includes('RATE_LIMIT')||String(err).includes('429')||String(err).includes('rate limit');
      if(r){
        if(isRateLimit){
          // Rate limit persistant : fallback modération locale → pending_admin
          const localMod = localModerate(text);
          if(!localMod.passed){
            r.status='moderation_failed'; r.moderationPassed=false; r.moderationReason=localMod.reason; r.updatedAt=new Date().toISOString();
            saveDB(); refreshClientTab(); return;
          }
          r.moderationPassed=true; r.reformulatedPrompt=text; r.status='pending_admin'; r.updatedAt=new Date().toISOString();
          saveDB(); refreshClientTab();
          toast('Gemini temporairement indisponible — demande transmise sans reformulation.','info');
        } else {
          r.status='error'; r.moderationReason=String(err); r.updatedAt=new Date().toISOString();
          saveDB(); refreshClientTab();
          toast('Erreur IA : '+String(err).substring(0,80),'error');
        }
      }
    }
  }

  // ─── Groq fetch : throttle global (free tier 30 RPM = 1 req/2s) ──
  const _groqDelay = ms => new Promise(r=>setTimeout(r,ms));
  let _lastGroqCallTime = 0;
  const GROQ_MIN_GAP = 2100; // ms entre appels (free tier 30 RPM)

  async function groqPost(apiKey, messages, maxTokens=500){
    const gap = GROQ_MIN_GAP - (Date.now() - _lastGroqCallTime);
    if(gap > 0) await _groqDelay(gap);
    _lastGroqCallTime = Date.now();
    const resp = await fetch('https://api.groq.com/openai/v1/chat/completions', {
      method:'POST',
      headers:{ 'Content-Type':'application/json', 'Authorization':'Bearer '+apiKey },
      body: JSON.stringify({
        model: 'llama-3.3-70b-versatile',
        messages,
        max_tokens: maxTokens,
        temperature: 0.65
      })
    });
    if(resp.status===429){
      const retryAfter = parseInt(resp.headers.get('Retry-After')||'0')*1000;
      if(retryAfter>0) _lastGroqCallTime = Date.now()+retryAfter;
      throw new Error('RATE_LIMIT_429');
    }
    if(resp.status===401) throw new Error('INVALID_KEY');
    if(resp.status===503) throw new Error('RATE_LIMIT_503');
    if(!resp.ok) throw new Error('HTTP_'+resp.status);
    return await resp.json();
  }

  // Legacy stub — geminiPost() replaced by groqPost().
  async function geminiPost(){ throw new Error('geminiPost is deprecated — use groqPost()'); }

  // ── Groq streaming : reçoit les chunks via callback onChunk(partialText) ──
  async function groqPostStream(apiKey, messages, onChunk, maxTokens=700){
    const gap = GROQ_MIN_GAP - (Date.now() - _lastGroqCallTime);
    if(gap > 0) await _groqDelay(gap);
    _lastGroqCallTime = Date.now();
    const resp = await fetch('https://api.groq.com/openai/v1/chat/completions',{
      method:'POST',
      headers:{'Content-Type':'application/json','Authorization':'Bearer '+apiKey},
      body:JSON.stringify({
        model:'llama-3.3-70b-versatile',
        messages, max_tokens:maxTokens, temperature:0.65, stream:true
      })
    });
    if(resp.status===429){
      const ra = parseInt(resp.headers.get('Retry-After')||'0')*1000;
      if(ra>0) _lastGroqCallTime = Date.now()+ra;
      throw new Error('RATE_LIMIT_429');
    }
    if(resp.status===401) throw new Error('INVALID_KEY');
    if(!resp.ok) throw new Error('HTTP_'+resp.status);

    const reader  = resp.body.getReader();
    const decoder = new TextDecoder();
    let full = '';
    let buf  = '';

    while(true){
      const {done, value} = await reader.read();
      if(done) break;
      buf += decoder.decode(value, {stream:true});
      // Traiter toutes les lignes complètes du buffer
      const lines = buf.split('\n');
      buf = lines.pop(); // la dernière ligne peut être incomplète
      for(const line of lines){
        const l = line.trim();
        if(!l || l==='data: [DONE]') continue;
        if(!l.startsWith('data: ')) continue;
        try{
          const d = JSON.parse(l.slice(6));
          const chunk = d.choices?.[0]?.delta?.content || '';
          if(chunk){ full += chunk; onChunk(full); }
        }catch(_){}
      }
    }
    return full;
  }

  // ─── Appel combiné : modération + classification intention (1 seul call) ──
  async function callGeminiModerateAndClassify(text, photoBase64, existingSiteHtml, apiKey){
    const siteCtx = existingSiteHtml
      ? `\nSite existant du client (extrait) : "${existingSiteHtml.replace(/<[^>]+>/g,' ').replace(/\s+/g,' ').trim().substring(0,500).replace(/"/g,"'")}"`
      : '';
    const intentField = existingSiteHtml
      ? `\n- "intent" : "question" si c'est une question/demande d'info sur le site existant, "generation" si c'est une demande de création ou modification`
      : `\n- "intent" : "generation"`;
    const promptText = `Tu es l'assistant IA d'une agence web. Analyse ce message et réponds UNIQUEMENT avec un JSON valide contenant :
- "passed" : true si le message est acceptable, false s'il contient du contenu haineux, violent, illégal ou contraire à l'éthique
- "reason" : courte explication de la décision de modération${intentField}${siteCtx}

Message : "${text.replace(/"/g,"'")}"

Réponds UNIQUEMENT avec le JSON, sans markdown ni explication supplémentaire.`;
    const parts = [{ text: promptText }];
    if(photoBase64&&photoBase64.startsWith('data:image')){
      const [meta,data]=photoBase64.split(',');
      parts.push({ inlineData:{ mimeType:meta.match(/data:(.*);/)?.[1]||'image/jpeg', data } });
    }
    try{
      const json = await geminiPost(apiKey,{ contents:[{ parts }] });
      const raw = (json.candidates?.[0]?.content?.parts?.[0]?.text||'').replace(/```json\n?/g,'').replace(/```/g,'').trim();
      try{
        const parsed = JSON.parse(raw);
        return {
          moderation: { passed: !!parsed.passed, reason: parsed.reason||'' },
          intent: parsed.intent||'generation'
        };
      }catch(_){
        return { moderation:{ passed:true, reason:'Non parseable — approuvé.' }, intent:'generation' };
      }
    }catch(e){
      if(String(e).includes('RATE_LIMIT')){
        toast('Gemini indisponible — modération locale activée.','info');
        const loc = localModerate(text);
        return { moderation: loc, intent:'generation' };
      }
      throw e;
    }
  }

  async function callGeminiReformulate(text, apiKey, projectContext=null, requestType='site'){
    let ctxBlock='';
    if(projectContext){
      const lines=[
        projectContext.name        && `- Nom du projet : ${projectContext.name}`,
        projectContext.description && `- Description : ${projectContext.description}`,
        projectContext.websiteUrl  && `- URL actuelle : ${projectContext.websiteUrl}`,
        projectContext.status      && `- Statut : ${{pending:'En attente',in_progress:'En cours',done:'Terminé'}[projectContext.status]||projectContext.status}`,
        projectContext.progress!=null && `- Avancement timeline : ${projectContext.progress}%`,
        projectContext.currentStep && `- Étape en cours : ${projectContext.currentStep}`,
        projectContext.tags        && `- Secteur / tags : ${projectContext.tags}`,
        projectContext.priority    && `- Priorité : ${projectContext.priority}`,
        projectContext.dueDate     && `- Livraison prévue : ${projectContext.dueDate}`
      ].filter(Boolean).join('\n');
      if(lines) ctxBlock=`\n\nContexte du projet client :\n${lines}`;
    }
    const clientUser = db.users.find(u=>u.username===(projectContext?.clientUsername)||false) || null;
    const aiInstr = clientUser?.aiInstructions || '';
    const instrBlock = aiInstr ? `\n\nInstructions spéciales pour ce client :\n${aiInstr}` : '';
    const baseByType = {
      site:    'Reformule et optimise la demande suivante pour générer un site web HTML complet, esthétique et fonctionnel.',
      text:    'Reformule et optimise la demande suivante pour générer un texte professionnel, structuré et convaincant (article, page About, description, etc.).',
      email:   'Reformule et optimise la demande suivante pour générer un email client professionnel, clair et impactant.',
      resume:  'Reformule et optimise la demande suivante pour générer un résumé structuré du projet, concis et factuel.',
      analyse: 'Reformule et optimise la demande suivante pour générer une analyse détaillée du brief fourni, avec recommandations.'
    };
    const base = baseByType[requestType]||baseByType.site;
    const prompt = `Tu es un expert en prompt engineering pour des modèles IA génératifs (Claude). ${base} Réponds UNIQUEMENT avec le prompt reformulé, sans commentaire ni explication.${ctxBlock}${instrBlock}\n\nDemande originale du client : "${text.replace(/"/g,'\\"')}"`;
    try{
      const json = await geminiPost(apiKey,{ contents:[{ parts:[{ text:prompt }] }] });
      return json.candidates?.[0]?.content?.parts?.[0]?.text||text;
    }catch(e){
      if(String(e).includes('RATE_LIMIT')){
        toast('Gemini indisponible — prompt original utilisé.','info');
        return text; // fallback : prompt non reformulé
      }
      throw e;
    }
  }

  async function callGeminiAnswer(question, existingSiteHtml, projectContext, apiKey){
    const siteText = existingSiteHtml.replace(/<[^>]+>/g,' ').replace(/\s+/g,' ').trim().substring(0,2000);
    let ctxBlock = '';
    if(projectContext){
      const parts = [
        projectContext.name        && `Projet : ${projectContext.name}`,
        projectContext.status      && `Statut : ${projectContext.status}`,
        projectContext.progress!=null && `Avancement : ${projectContext.progress}%`,
        projectContext.currentStep && `Étape en cours : ${projectContext.currentStep}`,
        projectContext.tags        && `Tags : ${projectContext.tags}`
      ].filter(Boolean);
      if(parts.length) ctxBlock = `\nContexte projet — ${parts.join(' · ')}`;
    }
    const prompt = `Tu es l'assistant IA d'une agence web. Un client te pose une question sur son site web existant. Réponds de façon claire, concise et utile en français.${ctxBlock}

Contenu textuel du site actuel :
"${siteText.replace(/"/g,"'")}"

Question du client : "${question.replace(/"/g,"'")}"

Réponds directement en français, sans préambule ni répétition de la question.`;
    try{
      const json = await geminiPost(apiKey,{ contents:[{ parts:[{ text:prompt }] }] });
      return json.candidates?.[0]?.content?.parts?.[0]?.text||'Désolé, je ne peux pas répondre pour le moment.';
    }catch(e){
      if(String(e).includes('RATE_LIMIT')) throw new Error('Gemini rate limit — impossible de répondre pour le moment. Réessayez dans quelques secondes.');
      throw e;
    }
  }
