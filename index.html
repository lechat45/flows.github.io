<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Flow</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --coral:#d97757;--coral-light:#e8906f;--coral-dim:#b85f40;
  --sage:#93b594;--sage-light:#aecaaf;
  --sky:#9bb8d8;
  --bg-0:#1a130e;--bg-1:#221810;--bg-2:#2d1f14;--bg-3:#3a2818;
  --text-0:#f5ede6;--text-1:#d4c4b8;--text-2:#9a8070;
  --border:rgba(255,255,255,.07);
  --glass-bg:rgba(30,20,13,.72);
  --radius:18px;
}
html,body{height:100%;background:var(--bg-0);color:var(--text-0);font-family:'Geist',sans-serif;font-size:15px;overflow:hidden}

/* ── Background ── */
#bg{position:fixed;inset:0;z-index:0;background:radial-gradient(ellipse 80% 60% at 20% 20%,#3d1f0a 0%,transparent 60%),radial-gradient(ellipse 60% 80% at 80% 80%,#0d2218 0%,transparent 60%),var(--bg-0);animation:drift 18s ease-in-out infinite alternate}
@keyframes drift{0%{background-position:0% 0%}100%{background-position:100% 100%}}

/* ── Layout ── */
#app{position:relative;z-index:1;height:100vh;display:flex;align-items:stretch}

/* ── Sidebar ── */
#sidebar{
  width:220px;flex-shrink:0;
  margin:14px 0 14px 14px;
  border-radius:22px;
  background:var(--glass-bg);
  backdrop-filter:blur(28px) saturate(1.6);
  border:1px solid var(--border);
  display:flex;flex-direction:column;
  padding:24px 14px 20px;
  gap:4px;
  position:relative;overflow:hidden;
}
#sidebar::before{content:'';position:absolute;inset:0;border-radius:22px;background:linear-gradient(135deg,rgba(255,255,255,.06) 0%,transparent 60%);pointer-events:none}
.logo{font-family:'Instrument Serif',serif;font-size:26px;color:var(--coral);padding:0 8px 18px;letter-spacing:.5px}
.nav-item{
  display:flex;align-items:center;gap:10px;
  padding:9px 12px;border-radius:12px;
  color:var(--text-1);font-size:14px;font-weight:500;
  cursor:pointer;transition:all .2s;border:none;background:none;text-align:left;width:100%;
}
.nav-item:hover{background:rgba(255,255,255,.06);color:var(--text-0)}
.nav-item.active{background:rgba(217,119,87,.18);color:var(--coral)}
.nav-item svg{width:16px;height:16px;flex-shrink:0;opacity:.7}
.nav-item.active svg{opacity:1}
.nav-spacer{flex:1}
.nav-user{padding:10px 12px;border-top:1px solid var(--border);margin-top:8px}
.nav-user-name{font-size:13px;font-weight:600;color:var(--text-0)}
.nav-user-role{font-size:11px;color:var(--text-2);margin-top:2px;text-transform:capitalize}
.nav-logout{margin-top:8px;width:100%;padding:7px 12px;border-radius:10px;background:rgba(255,255,255,.05);border:1px solid var(--border);color:var(--text-2);font-size:13px;cursor:pointer;transition:all .2s}
.nav-logout:hover{background:rgba(255,80,50,.15);color:#ff6b50;border-color:rgba(255,80,50,.3)}

/* ── Main ── */
#main{flex:1;overflow-y:auto;padding:20px 20px 20px 14px;display:flex;flex-direction:column;gap:0}
#main::-webkit-scrollbar{width:6px}
#main::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1);border-radius:3px}

/* ── Cards ── */
.card{background:var(--glass-bg);backdrop-filter:blur(20px) saturate(1.5);border:1px solid var(--border);border-radius:var(--radius);padding:22px 24px;position:relative;overflow:hidden}
.card::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(255,255,255,.12),transparent)}
.page-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
.page-title{font-family:'Instrument Serif',serif;font-size:28px;color:var(--text-0)}
.page-subtitle{font-size:13px;color:var(--text-2);margin-top:2px}

/* ── Buttons ── */
.btn{display:inline-flex;align-items:center;gap:7px;padding:9px 18px;border-radius:12px;font-size:14px;font-weight:500;cursor:pointer;border:none;transition:all .2s}
.btn-primary{background:var(--coral);color:#fff}
.btn-primary:hover{background:var(--coral-light);transform:translateY(-1px)}
.btn-ghost{background:rgba(255,255,255,.07);color:var(--text-1);border:1px solid var(--border)}
.btn-ghost:hover{background:rgba(255,255,255,.12);color:var(--text-0)}
.btn-danger{background:rgba(220,60,60,.2);color:#ff6b6b;border:1px solid rgba(220,60,60,.3)}
.btn-danger:hover{background:rgba(220,60,60,.35)}
.btn-sm{padding:6px 13px;font-size:13px;border-radius:10px}

/* ── Stats grid ── */
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin-bottom:20px}
.stat-card{background:rgba(255,255,255,.04);border:1px solid var(--border);border-radius:14px;padding:16px 18px}
.stat-val{font-family:'Instrument Serif',serif;font-size:32px;color:var(--text-0)}
.stat-lbl{font-size:12px;color:var(--text-2);margin-top:2px}

/* ── Table ── */
.tbl{width:100%;border-collapse:collapse;font-size:14px}
.tbl th{text-align:left;padding:10px 12px;font-size:12px;font-weight:500;color:var(--text-2);text-transform:uppercase;letter-spacing:.05em;border-bottom:1px solid var(--border)}
.tbl td{padding:12px 12px;border-bottom:1px solid rgba(255,255,255,.04);vertical-align:middle}
.tbl tr:hover td{background:rgba(255,255,255,.03)}
.badge{display:inline-block;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:500}
.badge-admin{background:rgba(217,119,87,.2);color:var(--coral)}
.badge-controller{background:rgba(147,181,148,.2);color:var(--sage)}
.badge-client{background:rgba(155,184,216,.2);color:var(--sky)}
.badge-done{background:rgba(100,200,120,.15);color:#6ec880}
.badge-progress{background:rgba(217,119,87,.15);color:var(--coral)}
.badge-pending{background:rgba(255,255,255,.08);color:var(--text-2)}

/* ── Progress bar ── */
.prog-bar{height:6px;background:rgba(255,255,255,.08);border-radius:3px;overflow:hidden;min-width:80px}
.prog-fill{height:100%;border-radius:3px;background:linear-gradient(90deg,var(--coral),var(--coral-light));transition:width .4s}

/* ── Search ── */
.search-wrap{position:relative;margin-bottom:16px}
.search-wrap input{width:100%;background:rgba(255,255,255,.05);border:1px solid var(--border);border-radius:12px;padding:9px 14px 9px 38px;color:var(--text-0);font-size:14px;font-family:'Geist',sans-serif;outline:none;transition:border-color .2s}
.search-wrap input:focus{border-color:rgba(217,119,87,.4)}
.search-wrap svg{position:absolute;left:12px;top:50%;transform:translateY(-50%);width:15px;height:15px;color:var(--text-2);pointer-events:none}

/* ── Login ── */
#login-page{position:fixed;inset:0;z-index:100;display:flex;align-items:center;justify-content:center;background:var(--bg-0)}
.login-card{width:360px;padding:40px 36px;background:var(--glass-bg);backdrop-filter:blur(30px) saturate(1.8);border:1px solid var(--border);border-radius:28px;position:relative;overflow:hidden}
.login-card::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(255,255,255,.15),transparent)}
.login-logo{font-family:'Instrument Serif',serif;font-size:38px;color:var(--coral);text-align:center;margin-bottom:8px}
.login-sub{text-align:center;color:var(--text-2);font-size:13px;margin-bottom:30px}
.field{margin-bottom:16px}
.field label{display:block;font-size:13px;color:var(--text-2);margin-bottom:6px}
.field input{width:100%;background:rgba(255,255,255,.06);border:1px solid var(--border);border-radius:12px;padding:11px 14px;color:var(--text-0);font-size:14px;font-family:'Geist',sans-serif;outline:none;transition:border-color .2s}
.field input:focus{border-color:rgba(217,119,87,.5)}
.login-err{background:rgba(220,60,60,.15);border:1px solid rgba(220,60,60,.3);color:#ff8080;border-radius:10px;padding:10px 14px;font-size:13px;margin-bottom:14px;display:none}

/* ── Modal ── */
#modal-overlay{position:fixed;inset:0;z-index:200;background:rgba(0,0,0,.6);backdrop-filter:blur(6px);display:none;align-items:center;justify-content:center}
#modal-overlay.open{display:flex}
.modal{background:#22180f;border:1px solid var(--border);border-radius:22px;width:520px;max-width:94vw;max-height:88vh;overflow-y:auto;position:relative}
.modal::-webkit-scrollbar{width:4px}
.modal::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1);border-radius:2px}
.modal-head{padding:22px 26px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.modal-title{font-family:'Instrument Serif',serif;font-size:20px}
.modal-close{background:rgba(255,255,255,.07);border:none;color:var(--text-1);width:30px;height:30px;border-radius:8px;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center}
.modal-close:hover{background:rgba(255,255,255,.14)}
.modal-body{padding:22px 26px}
.modal-foot{padding:16px 26px 22px;display:flex;gap:10px;justify-content:flex-end}
.mfield{margin-bottom:14px}
.mfield label{display:block;font-size:13px;color:var(--text-2);margin-bottom:5px}
.mfield input,.mfield select,.mfield textarea{width:100%;background:rgba(255,255,255,.06);border:1px solid var(--border);border-radius:10px;padding:9px 12px;color:var(--text-0);font-size:14px;font-family:'Geist',sans-serif;outline:none;transition:border-color .2s}
.mfield input:focus,.mfield select:focus,.mfield textarea:focus{border-color:rgba(217,119,87,.4)}
.mfield select option{background:#22180f}
.mfield textarea{resize:vertical;min-height:80px}

/* ── Steps list ── */
.steps-list{display:flex;flex-direction:column;gap:8px;margin-top:8px}
.step-row{display:flex;align-items:center;gap:8px}
.step-row input{flex:1;background:rgba(255,255,255,.06);border:1px solid var(--border);border-radius:8px;padding:7px 10px;color:var(--text-0);font-size:13px;font-family:'Geist',sans-serif;outline:none}
.step-row input:focus{border-color:rgba(217,119,87,.4)}
.step-del{background:none;border:none;color:var(--text-2);cursor:pointer;padding:4px;border-radius:6px;font-size:16px;line-height:1;transition:color .2s}
.step-del:hover{color:#ff6b6b}
.add-step-btn{background:rgba(255,255,255,.05);border:1px dashed var(--border);color:var(--text-2);border-radius:8px;padding:7px;font-size:13px;cursor:pointer;width:100%;transition:all .2s;margin-top:4px}
.add-step-btn:hover{background:rgba(255,255,255,.09);color:var(--text-1)}

/* ── Doc status stepper ── */
.step-stepper{display:flex;flex-direction:column;gap:10px}
.step-item{display:flex;align-items:center;gap:12px;padding:10px 14px;border-radius:12px;background:rgba(255,255,255,.04);border:1px solid var(--border)}
.step-dot{width:20px;height:20px;border-radius:50%;border:2px solid var(--border);flex-shrink:0;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .2s}
.step-dot.done{background:var(--sage);border-color:var(--sage)}
.step-dot.done::after{content:'✓';font-size:10px;color:#fff}
.step-label{flex:1;font-size:14px;color:var(--text-1)}
.step-item.done .step-label{color:var(--text-2);text-decoration:line-through}

/* ── Activity ── */
.activity-list{display:flex;flex-direction:column;gap:10px}
.activity-item{display:flex;align-items:flex-start;gap:12px;padding:12px 14px;background:rgba(255,255,255,.03);border-radius:12px;border:1px solid var(--border)}
.activity-dot{width:8px;height:8px;border-radius:50%;background:var(--coral);flex-shrink:0;margin-top:5px}
.activity-text{font-size:13px;color:var(--text-1);line-height:1.5}
.activity-time{font-size:11px;color:var(--text-2);margin-top:2px}

/* ── Profile avatar ── */
.avatar-wrap{display:flex;flex-direction:column;align-items:center;gap:12px;margin-bottom:20px}
.avatar-img{width:80px;height:80px;border-radius:50%;object-fit:cover;border:2px solid var(--border);background:var(--bg-2)}
.avatar-placeholder{width:80px;height:80px;border-radius:50%;background:rgba(217,119,87,.2);display:flex;align-items:center;justify-content:center;font-family:'Instrument Serif',serif;font-size:32px;color:var(--coral);border:2px solid rgba(217,119,87,.3)}

/* ── Toast ── */
#toast-container{position:fixed;bottom:24px;right:24px;z-index:9999;display:flex;flex-direction:column;gap:8px;pointer-events:none}
.toast{padding:12px 18px;border-radius:12px;font-size:14px;color:#fff;min-width:220px;max-width:340px;backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,.12);pointer-events:auto;animation:toastIn .3s ease}
.toast-success{background:rgba(80,160,90,.85)}
.toast-error{background:rgba(200,60,60,.85)}
.toast-info{background:rgba(80,120,180,.85)}
@keyframes toastIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes toastOut{to{opacity:0;transform:translateY(10px)}}

/* ── Sync indicator ── */
#sync-dot{position:fixed;top:20px;right:20px;z-index:50;width:8px;height:8px;border-radius:50%;background:var(--sage);display:none;box-shadow:0 0 6px var(--sage)}
#sync-dot.syncing{background:#f0c040;box-shadow:0 0 6px #f0c040;animation:pulse .8s infinite}
#sync-dot.error{background:#ff6b6b;box-shadow:0 0 6px #ff6b6b}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

/* ── Misc ── */
.section-title{font-size:13px;font-weight:600;color:var(--text-2);text-transform:uppercase;letter-spacing:.06em;margin-bottom:12px}
.empty{text-align:center;padding:40px;color:var(--text-2);font-size:14px}
.divider{height:1px;background:var(--border);margin:16px 0}
.chip{display:inline-block;padding:2px 8px;border-radius:6px;font-size:11px;background:rgba(255,255,255,.07);color:var(--text-2)}
.gap-col{display:flex;flex-direction:column;gap:14px}
.gap-row{display:flex;gap:10px;flex-wrap:wrap}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
</style>
</head>
<body>

<!-- Firebase SDK v8 compat -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<div id="bg"></div>
<div id="toast-container"></div>
<div id="sync-dot"></div>

<!-- Login -->
<div id="login-page">
  <div class="login-card">
    <div class="login-logo">Flow</div>
    <div class="login-sub">Espace de gestion privé</div>
    <div id="login-err" class="login-err">Accès refusé : Ceci est un site privé.</div>
    <div class="field"><label>Identifiant</label><input id="li-user" type="text" autocomplete="username" placeholder="nom d'utilisateur"/></div>
    <div class="field"><label>Mot de passe</label><input id="li-pass" type="password" autocomplete="current-password" placeholder="••••••"/></div>
    <button class="btn btn-primary" style="width:100%;justify-content:center;margin-top:4px" onclick="doLogin()">Se connecter</button>
  </div>
</div>

<!-- App shell -->
<div id="app" style="display:none">
  <nav id="sidebar">
    <div class="logo">Flow</div>
    <div id="nav-items"></div>
    <div class="nav-spacer"></div>
    <div class="nav-user">
      <div class="nav-user-name" id="nav-name">—</div>
      <div class="nav-user-role" id="nav-role">—</div>
    </div>
    <button class="nav-logout" onclick="doLogout()">Déconnexion</button>
  </nav>
  <div id="main"></div>
</div>

<!-- Modal -->
<div id="modal-overlay" onclick="closeModal(event)">
  <div class="modal" id="modal-box"></div>
</div>

<script>
/* ═══════════════════════════════════════════════
   FIREBASE
═══════════════════════════════════════════════ */
const firebaseConfig = {
  apiKey: "AIzaSyD8KGZ43JjT5DagFVTEEVdnf7agqBLjQ6E",
  authDomain: "flow-app-99150.firebaseapp.com",
  databaseURL: "https://flow-app-99150-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "flow-app-99150",
  storageBucket: "flow-app-99150.firebasestorage.app",
  messagingSenderId: "257985954717",
  appId: "1:257985954717:web:22a139d447c166b984e574"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();
const flowRef = db.ref('flow');
const syncDot = document.getElementById('sync-dot');

function setSyncState(s){
  syncDot.style.display = 'block';
  syncDot.className = s === 'ok' ? '' : s === 'syncing' ? 'syncing' : 'error';
  if(s === 'ok') setTimeout(()=>{ syncDot.style.display='none'; }, 2000);
}

/* ═══════════════════════════════════════════════
   DATA MODEL
═══════════════════════════════════════════════ */
const SEED = {
  users:[
    {id:'u1',name:'Sacha',username:'sacha',password:'$mila2012',role:'admin',email:'sacha@flow.app',photo:''},
    {id:'u2',name:'Alexis',username:'alexis',password:'0000',role:'controller',email:'alexis@flow.app',photo:''}
  ],
  projects:[],
  documents:[]
};

let DATA = null;
let currentUser = null;
let activeTab = 'home';
let fbUnsubscribe = null;

const LS_KEY = 'flow_v3';
const SS_KEY = 'flow_uid';

function lsLoad(){
  try{ return JSON.parse(localStorage.getItem(LS_KEY)); }catch(e){ return null; }
}
function lsSave(d){ localStorage.setItem(LS_KEY, JSON.stringify(d)); }

/* ═══════════════════════════════════════════════
   DB SAVE — writes both LS and Firebase
═══════════════════════════════════════════════ */
function saveDB(d){
  DATA = d;
  lsSave(d);
  setSyncState('syncing');
  flowRef.set(d).then(()=>{
    setSyncState('ok');
  }).catch(err=>{
    console.warn('Firebase write error', err);
    setSyncState('error');
    toast('Sync Firebase échouée – données sauvées localement','error');
  });
}

/* ═══════════════════════════════════════════════
   BOOTSTRAP – load from Firebase, fallback to LS
═══════════════════════════════════════════════ */
function bootApp(){
  setSyncState('syncing');
  flowRef.once('value').then(snap=>{
    const val = snap.val();
    if(val && val.users){
      DATA = val;
      lsSave(DATA);
      setSyncState('ok');
    } else {
      const local = lsLoad();
      if(local && local.users){ DATA = local; }
      else { DATA = JSON.parse(JSON.stringify(SEED)); }
      // push seed/local to Firebase
      flowRef.set(DATA).then(()=>setSyncState('ok')).catch(()=>setSyncState('error'));
    }
    startRealtimeSync();
    restoreSession();
  }).catch(err=>{
    console.warn('Firebase read error', err);
    setSyncState('error');
    const local = lsLoad();
    DATA = (local && local.users) ? local : JSON.parse(JSON.stringify(SEED));
    restoreSession();
  });
}

/* Real-time listener — update if another device changes data */
function startRealtimeSync(){
  if(fbUnsubscribe) fbUnsubscribe();
  fbUnsubscribe = flowRef.on('value', snap=>{
    const val = snap.val();
    if(!val || !val.users) return;
    DATA = val;
    lsSave(DATA);
    if(currentUser){
      // refresh current user info
      const u = DATA.users.find(x=>x.id===currentUser.id);
      if(u) currentUser = u;
      renderCurrentTab();
    }
  });
}

/* ═══════════════════════════════════════════════
   SESSION
═══════════════════════════════════════════════ */
function restoreSession(){
  const uid = sessionStorage.getItem(SS_KEY);
  if(uid && DATA){
    const u = DATA.users.find(x=>x.id===uid);
    if(u){ loginSuccess(u); return; }
  }
  showLogin();
}

function showLogin(){
  document.getElementById('login-page').style.display='flex';
  document.getElementById('app').style.display='none';
}

function doLogin(){
  const uname = document.getElementById('li-user').value.trim().toLowerCase();
  const pass = document.getElementById('li-pass').value;
  const err = document.getElementById('login-err');
  if(!DATA){ toast('Chargement en cours...','info'); return; }
  const u = DATA.users.find(x=>x.username.toLowerCase()===uname && x.password===pass);
  if(!u){ err.style.display='block'; return; }
  err.style.display='none';
  loginSuccess(u);
}

document.addEventListener('keydown',e=>{
  if(e.key==='Enter' && document.getElementById('login-page').style.display!=='none') doLogin();
});

function loginSuccess(u){
  currentUser = u;
  sessionStorage.setItem(SS_KEY, u.id);
  document.getElementById('login-page').style.display='none';
  document.getElementById('app').style.display='flex';
  document.getElementById('nav-name').textContent = u.name;
  document.getElementById('nav-role').textContent = roleLabel(u.role);
  buildNav();
  setTab('home');
}

function doLogout(){
  currentUser = null;
  sessionStorage.removeItem(SS_KEY);
  showLogin();
  document.getElementById('li-user').value='';
  document.getElementById('li-pass').value='';
}

/* ═══════════════════════════════════════════════
   NAVIGATION
═══════════════════════════════════════════════ */
const NAV_ADMIN = [
  {id:'home',label:'Accueil',icon:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>'},
  {id:'users',label:'Utilisateurs',icon:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>'},
  {id:'docs',label:'Suivi & Docs',icon:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>'},
  {id:'profile',label:'Profil',icon:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="4"/><path d="M6 20v-2a6 6 0 0 1 12 0v2"/></svg>'}
];
const NAV_CLIENT = [
  {id:'home',label:'Accueil',icon:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>'},
  {id:'docs',label:'Documents',icon:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>'},
  {id:'profile',label:'Profil',icon:'<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="8" r="4"/><path d="M6 20v-2a6 6 0 0 1 12 0v2"/></svg>'}
];

function buildNav(){
  const isAdmin = currentUser.role==='admin' || currentUser.role==='controller';
  const items = isAdmin ? NAV_ADMIN : NAV_CLIENT;
  document.getElementById('nav-items').innerHTML = items.map(n=>`
    <button class="nav-item" id="nav-${n.id}" onclick="setTab('${n.id}')">${n.icon}${n.label}</button>
  `).join('');
}

function setTab(tab){
  activeTab = tab;
  document.querySelectorAll('.nav-item').forEach(el=>el.classList.remove('active'));
  const el = document.getElementById('nav-'+tab);
  if(el) el.classList.add('active');
  renderCurrentTab();
}

function renderCurrentTab(){
  const role = currentUser.role;
  if(role==='admin'||role==='controller'){
    if(activeTab==='home') renderAdminHome();
    else if(activeTab==='users') renderAdminUsers();
    else if(activeTab==='docs') renderAdminDocs();
    else if(activeTab==='profile') renderProfile();
  } else {
    if(activeTab==='home') renderClientHome();
    else if(activeTab==='docs') renderClientDocs();
    else if(activeTab==='profile') renderProfile();
  }
}

/* ═══════════════════════════════════════════════
   HELPERS
═══════════════════════════════════════════════ */
function uid(){ return 'id'+Date.now()+Math.random().toString(36).slice(2,7); }
function roleLabel(r){ return r==='admin'?'Administrateur':r==='controller'?'Contrôleur':'Client'; }
function roleBadge(r){ const cls=r==='admin'?'badge-admin':r==='controller'?'badge-controller':'badge-client'; return `<span class="badge ${cls}">${roleLabel(r)}</span>`; }
function formatDate(ts){ if(!ts) return '—'; return new Date(ts).toLocaleDateString('fr-FR',{day:'2-digit',month:'short',year:'numeric'}); }
function progressOf(proj){
  if(!proj.steps||!proj.steps.length) return 0;
  return Math.round(proj.steps.filter(s=>s.done).length/proj.steps.length*100);
}

function toast(msg, type='info'){
  const t=document.createElement('div');
  t.className=`toast toast-${type}`;
  t.textContent=msg;
  document.getElementById('toast-container').appendChild(t);
  setTimeout(()=>{ t.style.animation='toastOut .3s ease forwards'; setTimeout(()=>t.remove(),300); },3200);
}

function mHead(title){ return `<div class="modal-head"><span class="modal-title">${title}</span><button class="modal-close" onclick="closeModal()">✕</button></div>`; }
function mFoot(...btns){ return `<div class="modal-foot">${btns.join('')}</div>`; }

function openModal(html){
  document.getElementById('modal-box').innerHTML=html;
  document.getElementById('modal-overlay').classList.add('open');
}
function closeModal(e){
  if(e && e.target!==document.getElementById('modal-overlay')) return;
  document.getElementById('modal-overlay').classList.remove('open');
}

/* ═══════════════════════════════════════════════
   ADMIN – HOME
═══════════════════════════════════════════════ */
function renderAdminHome(){
  const users = DATA.users;
  const projects = DATA.projects;
  const docs = DATA.documents;
  const clients = users.filter(u=>u.role==='client');
  const totalDocs = docs.length;
  const doneDocs = docs.filter(d=>d.status==='done').length;

  // Recent activity: last 5 docs with status changes
  const recentDocs = [...docs].sort((a,b)=>(b.updatedAt||0)-(a.updatedAt||0)).slice(0,5);

  document.getElementById('main').innerHTML=`
    <div class="page-header">
      <div><div class="page-title">Bonjour, ${currentUser.name}</div><div class="page-subtitle">${formatDate(Date.now())}</div></div>
      ${currentUser.role==='admin'?`<button class="btn btn-primary" onclick="openCreateProjectModal()"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>Nouveau projet</button>`:''}
    </div>
    <div class="stats-grid">
      <div class="stat-card"><div class="stat-val">${clients.length}</div><div class="stat-lbl">Clients</div></div>
      <div class="stat-card"><div class="stat-val">${projects.length}</div><div class="stat-lbl">Projets</div></div>
      <div class="stat-card"><div class="stat-val">${totalDocs}</div><div class="stat-lbl">Documents</div></div>
      <div class="stat-card"><div class="stat-val">${doneDocs}</div><div class="stat-lbl">Complétés</div></div>
    </div>
    <div class="grid2" style="margin-bottom:16px">
      <div class="card">
        <div class="section-title">Projets récents</div>
        ${projects.length===0?`<div class="empty">Aucun projet</div>`:projects.slice(-4).reverse().map(p=>{
          const pct=progressOf(p);
          const client = users.find(u=>u.id===p.clientId);
          return `<div style="margin-bottom:14px">
            <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">
              <span style="font-size:14px;font-weight:500">${p.name}</span>
              <span style="font-size:12px;color:var(--text-2)">${pct}%</span>
            </div>
            <div class="prog-bar"><div class="prog-fill" style="width:${pct}%"></div></div>
            ${client?`<div style="font-size:12px;color:var(--text-2);margin-top:4px">${client.name}</div>`:''}
          </div>`;
        }).join('')}
      </div>
      <div class="card">
        <div class="section-title">Activité récente</div>
        ${recentDocs.length===0?`<div class="empty">Aucune activité</div>`:`<div class="activity-list">${recentDocs.map(d=>{
          const proj=projects.find(p=>p.id===d.projectId);
          const client=users.find(u=>u.id===d.clientId);
          return `<div class="activity-item">
            <div class="activity-dot"></div>
            <div>
              <div class="activity-text">${d.name}${proj?` — <span style="color:var(--text-2)">${proj.name}</span>`:''}</div>
              <div class="activity-time">${client?client.name+' · ':''} ${formatDate(d.updatedAt||d.createdAt)}</div>
            </div>
          </div>`;
        }).join('')}</div>`}
      </div>
    </div>
  `;
}

═══════════════════════════════════════════════ */

    if(!filter) return true;
    const q=filter.toLowerCase();
    return u.name.toLowerCase().includes(q)||u.username.toLowerCase().includes(q)||(u.email||'').toLowerCase().includes(q);
  });

  document.getElementById('main').innerHTML=`
    <div class="page-header">
      <div><div class="page-title">Utilisateurs</div><div class="page-subtitle">${DATA.users.length} comptes</div></div>
      ${canCreate?`<button class="btn btn-primary" onclick="openCreateUserModal()"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>Ajouter</button>`:''}
    </div>
    <div class="card">
      <div class="search-wrap">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input id="user-search" type="text" placeholder="Rechercher un utilisateur…" value="${filter}" oninput="renderAdminUsers(this.value)"/>
      </div>
      ${users.length===0?`<div class="empty">Aucun résultat</div>`:`
      <table class="tbl">
        <thead><tr><th>Nom</th><th>Identifiant</th><th>Rôle</th><th>Projets</th><th></th></tr></thead>
        <tbody>${users.map(u=>{
          const projCount = DATA.projects.filter(p=>p.clientId===u.id).length;
          return `<tr>
            <td><span style="font-weight:500">${u.name}</span>${u.email?`<br><span style="font-size:12px;color:var(--text-2)">${u.email}</span>`:''}</td>
            <td><span class="chip">${u.username}</span></td>
            <td>${roleBadge(u.role)}</td>

            <td style="text-align:right">
              <button class="btn btn-ghost btn-sm" onclick="openEditUserModal('${u.id}')">Modifier</button>

}

/* ═══════════════════════════════════════════════
   ADMIN – DOCS / SUIVI
═══════════════════════════════════════════════ */
function renderAdminDocs(){
  const projects = DATA.projects;
  const docs = DATA.documents;
  const users = DATA.users;

  document.getElementById('main').innerHTML=`
    <div class="page-header">
      <div><div class="page-title">Suivi & Documents</div></div>
      <button class="btn btn-primary" onclick="openCreateDocModal()"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>Ajouter un document</button>
    </div>
    <div class="gap-col">
    ${projects.length===0?`<div class="card"><div class="empty">Aucun projet. Créez-en un depuis l'accueil.</div></div>`:
      projects.map(proj=>{
        const client = users.find(u=>u.id===proj.clientId);
        const projDocs = docs.filter(d=>d.projectId===proj.id);
        const pct = progressOf(proj);
        return `<div class="card">
          <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px">
            <div>
              <div style="font-family:'Instrument Serif',serif;font-size:18px">${proj.name}</div>
              ${client?`<div style="font-size:13px;color:var(--text-2);margin-top:2px">Client : ${client.name}</div>`:''}
            </div>
            <div style="text-align:right">
              <div style="font-size:13px;color:var(--text-2);margin-bottom:6px">Avancement ${pct}%</div>
              <div class="prog-bar" style="width:120px"><div class="prog-fill" style="width:${pct}%"></div></div>
            </div>
          </div>
          ${proj.steps&&proj.steps.length?`
            <div class="section-title" style="margin-bottom:8px">Étapes du projet</div>
            <div class="step-stepper" style="margin-bottom:16px">
              ${proj.steps.map((s,i)=>`
                <div class="step-item${s.done?' done':''}" id="si-${proj.id}-${i}">
                  <div class="step-dot${s.done?' done':''}" onclick="toggleStep('${proj.id}',${i})"></div>
                  <div class="step-label">${s.label}</div>
                </div>
              `).join('')}
            </div>
          `:''}
          ${projDocs.length?`
            <div class="section-title" style="margin-bottom:8px">Documents (${projDocs.length})</div>
            <table class="tbl"><thead><tr><th>Nom</th><th>Statut</th><th>Ajouté le</th><th></th></tr></thead><tbody>
            ${projDocs.map(d=>`<tr>
              <td>${d.name}</td>
              <td>${statusBadge(d.status)}</td>
              <td style="font-size:13px;color:var(--text-2)">${formatDate(d.createdAt)}</td>
              <td style="text-align:right">
                <button class="btn btn-ghost btn-sm" onclick="openDocModal('${d.id}')">Voir</button>
                <button class="btn btn-danger btn-sm" style="margin-left:6px" onclick="deleteDoc('${d.id}')">Suppr.</button>
              </td>
            </tr>`).join('')}
            </tbody></table>
          `:`<div style="font-size:13px;color:var(--text-2)">Aucun document pour ce projet.</div>`}
        </div>`;
      }).join('')}
    </div>
  `;
}

function statusBadge(s){
  if(s==='done') return `<span class="badge badge-done">Complété</span>`;
  if(s==='progress') return `<span class="badge badge-progress">En cours</span>`;
  return `<span class="badge badge-pending">En attente</span>`;
}

function toggleStep(projId, idx){
  const proj = DATA.projects.find(p=>p.id===projId);
  if(!proj) return;
  proj.steps[idx].done = !proj.steps[idx].done;
  proj.updatedAt = Date.now();
  saveDB(DATA);
  toast('Étape mise à jour','success');
}

/* ═══════════════════════════════════════════════
   PROFILE
═══════════════════════════════════════════════ */
function renderProfile(){
  const u = currentUser;
  document.getElementById('main').innerHTML=`
    <div class="page-header"><div class="page-title">Profil</div></div>
    <div class="card" style="max-width:480px">
      <div class="avatar-wrap">
        ${u.photo?`<img class="avatar-img" src="${u.photo}" id="avatar-preview"/>`:`<div class="avatar-placeholder" id="avatar-preview">${u.name[0]}</div>`}
        <label class="btn btn-ghost btn-sm" style="cursor:pointer">Changer la photo<input type="file" accept="image/*" style="display:none" onchange="handlePhotoChange(event)"/></label>
      </div>
      <div class="grid2">
        <div class="mfield"><label>Nom</label><input id="prof-name" value="${u.name}"/></div>
        <div class="mfield"><label>Identifiant</label><input id="prof-user" value="${u.username}"/></div>
      </div>
      <div class="mfield"><label>Email</label><input id="prof-email" type="email" value="${u.email||''}"/></div>
      <div class="mfield"><label>Nouveau mot de passe</label><input id="prof-pass" type="password" placeholder="Laisser vide pour conserver"/></div>
      <button class="btn btn-primary" onclick="saveProfile()">Enregistrer</button>
    </div>
  `;
}

function handlePhotoChange(e){
  const file=e.target.files[0];
  if(!file) return;
  const reader=new FileReader();
  reader.onload=ev=>{
    const src=ev.target.result;
    const prev=document.getElementById('avatar-preview');
    if(prev.tagName==='IMG'){ prev.src=src; }
    else { prev.outerHTML=`<img class="avatar-img" src="${src}" id="avatar-preview"/>`; }
    currentUser._pendingPhoto=src;
  };
  reader.readAsDataURL(file);
}

function saveProfile(){
  const name=document.getElementById('prof-name').value.trim();
  const username=document.getElementById('prof-user').value.trim();
  const email=document.getElementById('prof-email').value.trim();
  const pass=document.getElementById('prof-pass').value;
  if(!name||!username){ toast('Nom et identifiant requis','error'); return; }
  const u=DATA.users.find(x=>x.id===currentUser.id);
  if(!u) return;
  u.name=name; u.username=username; u.email=email;
  if(pass) u.password=pass;
  if(currentUser._pendingPhoto){ u.photo=currentUser._pendingPhoto; delete currentUser._pendingPhoto; }
  currentUser=u;
  document.getElementById('nav-name').textContent=u.name;
  saveDB(DATA);
  toast('Profil mis à jour','success');
}

/* ═══════════════════════════════════════════════
   MODALS – USER CRUD
═══════════════════════════════════════════════ */
function openCreateUserModal(){
  const canMakeAdmin = currentUser.role==='admin';
  openModal(`
    ${mHead('Nouvel utilisateur')}
    <div class="modal-body">
      <div class="grid2">
        <div class="mfield"><label>Nom</label><input id="mu-name" placeholder="Prénom Nom"/></div>
        <div class="mfield"><label>Identifiant</label><input id="mu-user" placeholder="login"/></div>
      </div>
      <div class="mfield"><label>Email</label><input id="mu-email" type="email" placeholder="email@…"/></div>
      <div class="mfield"><label>Mot de passe</label><input id="mu-pass" type="password" placeholder="••••••"/></div>
      <div class="mfield"><label>Rôle</label><select id="mu-role">
        <option value="client">Client</option>
        ${canMakeAdmin?'<option value="controller">Contrôleur</option><option value="admin">Administrateur</option>':''}
      </select></div>
    </div>
    ${mFoot(`<button class="btn btn-ghost" onclick="closeModal()">Annuler</button>`,`<button class="btn btn-primary" onclick="createUser()">Créer</button>`)}
  `);
}

function createUser(){
  const name=document.getElementById('mu-name').value.trim();
  const username=document.getElementById('mu-user').value.trim();
  const email=document.getElementById('mu-email').value.trim();
  const pass=document.getElementById('mu-pass').value;
  const role=document.getElementById('mu-role').value;
  if(!name||!username||!pass){ toast('Champs obligatoires manquants','error'); return; }
  if(DATA.users.find(u=>u.username.toLowerCase()===username.toLowerCase())){ toast('Identifiant déjà utilisé','error'); return; }
  DATA.users.push({id:uid(),name,username,password:pass,role,email,photo:''});
  saveDB(DATA);
  closeModal();
  renderAdminUsers();
  toast('Utilisateur créé','success');
}

function openEditUserModal(id){
  const u=DATA.users.find(x=>x.id===id);
  if(!u) return;
  const canMakeAdmin=currentUser.role==='admin';
  openModal(`
    ${mHead('Modifier l\'utilisateur')}
    <div class="modal-body">
      <div class="grid2">
        <div class="mfield"><label>Nom</label><input id="eu-name" value="${u.name}"/></div>
        <div class="mfield"><label>Identifiant</label><input id="eu-user" value="${u.username}"/></div>
      </div>
      <div class="mfield"><label>Email</label><input id="eu-email" type="email" value="${u.email||''}"/></div>
      <div class="mfield"><label>Nouveau mot de passe</label><input id="eu-pass" type="password" placeholder="Laisser vide"/></div>
      <div class="mfield"><label>Rôle</label><select id="eu-role">
        <option value="client"${u.role==='client'?' selected':''}>Client</option>
        ${canMakeAdmin?`<option value="controller"${u.role==='controller'?' selected':''}>Contrôleur</option><option value="admin"${u.role==='admin'?' selected':''}>Administrateur</option>`:''}
      </select></div>
    </div>
    ${mFoot(`<button class="btn btn-ghost" onclick="closeModal()">Annuler</button>`,`<button class="btn btn-primary" onclick="editUser('${id}')">Enregistrer</button>`)}
  `);
}

function editUser(id){
  const u=DATA.users.find(x=>x.id===id);
  if(!u) return;
  u.name=document.getElementById('eu-name').value.trim();
  u.username=document.getElementById('eu-user').value.trim();
  u.email=document.getElementById('eu-email').value.trim();
  const pass=document.getElementById('eu-pass').value;
  if(pass) u.password=pass;
  u.role=document.getElementById('eu-role').value;
  if(!u.name||!u.username){ toast('Champs obligatoires manquants','error'); return; }
  if(u.id===currentUser.id) currentUser=u;
  saveDB(DATA);
  closeModal();
  renderAdminUsers();
  toast('Utilisateur mis à jour','success');
}

function deleteUser(id){
  if(!confirm('Supprimer cet utilisateur ?')) return;
  DATA.users=DATA.users.filter(u=>u.id!==id);
  DATA.projects=DATA.projects.filter(p=>p.clientId!==id);
  DATA.documents=DATA.documents.filter(d=>d.clientId!==id);
  saveDB(DATA);
  renderAdminUsers();
  toast('Utilisateur supprimé','info');
}

/* ═══════════════════════════════════════════════
   MODALS – PROJECT CRUD
═══════════════════════════════════════════════ */
function openCreateProjectModal(){
  const clients=DATA.users.filter(u=>u.role==='client');
  openModal(`
    ${mHead('Nouveau projet')}
    <div class="modal-body">
      <div class="mfield"><label>Nom du projet</label><input id="np-name" placeholder="Nom"/></div>
      <div class="mfield"><label>Client</label><select id="np-client">
        <option value="">— Sélectionner un client —</option>
        ${clients.map(c=>`<option value="${c.id}">${c.name}</option>`).join('')}
      </select></div>
      <div class="mfield"><label>Description</label><textarea id="np-desc" placeholder="Description optionnelle…"></textarea></div>
      <div class="mfield">
        <label>Étapes du projet</label>
        <div class="steps-list" id="steps-list">
          <div class="step-row"><input placeholder="Étape 1…"/><button class="step-del" onclick="this.closest('.step-row').remove()">×</button></div>
        </div>
        <button class="add-step-btn" onclick="addStepRow()">+ Ajouter une étape</button>
      </div>
    </div>
    ${mFoot(`<button class="btn btn-ghost" onclick="closeModal()">Annuler</button>`,`<button class="btn btn-primary" onclick="createProject()">Créer</button>`)}
  `);
}

function addStepRow(){
  const list=document.getElementById('steps-list');
  const div=document.createElement('div');
  div.className='step-row';
  div.innerHTML=`<input placeholder="Étape…"/><button class="step-del" onclick="this.closest('.step-row').remove()">×</button>`;
  list.appendChild(div);
}

function createProject(){
  const name=document.getElementById('np-name').value.trim();
  const clientId=document.getElementById('np-client').value;
  const desc=document.getElementById('np-desc').value.trim();
  if(!name){ toast('Nom requis','error'); return; }
  const stepInputs=[...document.getElementById('steps-list').querySelectorAll('input')];
  const steps=stepInputs.map(i=>i.value.trim()).filter(Boolean).map(label=>({label,done:false}));
  DATA.projects.push({id:uid(),name,clientId,desc,steps,createdAt:Date.now(),updatedAt:Date.now()});
  saveDB(DATA);
  closeModal();
  renderAdminHome();
  toast('Projet créé','success');
}

/* ═══════════════════════════════════════════════
   MODALS – DOC CRUD
═══════════════════════════════════════════════ */
function openCreateDocModal(){
  const projects=DATA.projects;
  openModal(`
    ${mHead('Nouveau document')}
    <div class="modal-body">
      <div class="mfield"><label>Nom du document</label><input id="nd-name" placeholder="Nom"/></div>
      <div class="mfield"><label>Projet</label><select id="nd-proj">
        <option value="">— Sélectionner un projet —</option>
        ${projects.map(p=>{
          const client=DATA.users.find(u=>u.id===p.clientId);
          return `<option value="${p.id}">${p.name}${client?' ('+client.name+')':''}</option>`;
        }).join('')}
      </select></div>
      <div class="mfield"><label>Statut</label><select id="nd-status">
        <option value="pending">En attente</option>
        <option value="progress">En cours</option>
        <option value="done">Complété</option>
      </select></div>
      <div class="mfield"><label>Notes</label><textarea id="nd-notes" placeholder="Notes optionnelles…"></textarea></div>
    </div>
    ${mFoot(`<button class="btn btn-ghost" onclick="closeModal()">Annuler</button>`,`<button class="btn btn-primary" onclick="createDoc()">Ajouter</button>`)}
  `);
}

function createDoc(){
  const name=document.getElementById('nd-name').value.trim();
  const projId=document.getElementById('nd-proj').value;
  const status=document.getElementById('nd-status').value;
  const notes=document.getElementById('nd-notes').value.trim();
  if(!name){ toast('Nom requis','error'); return; }
  const proj=DATA.projects.find(p=>p.id===projId);
  const clientId=proj?proj.clientId:'';
  const doc={id:uid(),name,projectId:projId,clientId,status,notes,createdAt:Date.now(),updatedAt:Date.now()};
  DATA.documents.push(doc);
  saveDB(DATA);
  closeModal();
  renderAdminDocs();
  toast('Document ajouté','success');
}

function openDocModal(docId){
  const d=DATA.documents.find(x=>x.id===docId);
  if(!d) return;
  const isAdmin=currentUser.role==='admin'||currentUser.role==='controller';
  const proj=DATA.projects.find(p=>p.id===d.projectId);
  openModal(`
    ${mHead(d.name)}
    <div class="modal-body">
      ${proj?`<div style="font-size:13px;color:var(--text-2);margin-bottom:14px">Projet : ${proj.name}</div>`:''}
      ${isAdmin?`
        <div class="mfield"><label>Statut</label><select id="doc-status">
          <option value="pending"${d.status==='pending'?' selected':''}>En attente</option>
          <option value="progress"${d.status==='progress'?' selected':''}>En cours</option>
          <option value="done"${d.status==='done'?' selected':''}>Complété</option>
        </select></div>
        <div class="mfield"><label>Notes</label><textarea id="doc-notes">${d.notes||''}</textarea></div>
      `:`
        <div>${statusBadge(d.status)}</div>
        ${d.notes?`<div style="margin-top:14px;font-size:14px;color:var(--text-1)">${d.notes}</div>`:''}
      `}
    </div>
    ${isAdmin?mFoot(`<button class="btn btn-ghost" onclick="closeModal()">Fermer</button>`,`<button class="btn btn-primary" onclick="saveDoc('${docId}')">Enregistrer</button>`):
    mFoot(`<button class="btn btn-ghost" onclick="closeModal()">Fermer</button>`)}
  `);
}

function saveDoc(id){
  const d=DATA.documents.find(x=>x.id===id);
  if(!d) return;
  d.status=document.getElementById('doc-status').value;
  d.notes=document.getElementById('doc-notes').value.trim();
  d.updatedAt=Date.now();
  saveDB(DATA);
  closeModal();
  renderAdminDocs();
  toast('Document mis à jour','success');
}

function deleteDoc(id){
  if(!confirm('Supprimer ce document ?')) return;
  DATA.documents=DATA.documents.filter(d=>d.id!==id);
  saveDB(DATA);
  renderAdminDocs();
  toast('Document supprimé','info');
}

/* ═══════════════════════════════════════════════
   INIT
═══════════════════════════════════════════════ */
bootApp();
</script>
</body>
</html>
