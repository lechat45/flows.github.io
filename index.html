<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Flow — Gestion de Projet</title>
  <meta name="description" content="Plateforme de gestion de projet et suivi client" />
  <meta name="theme-color" content="#d97757" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Flow" />
  <meta name="mobile-web-app-capable" content="yes" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="logo.png" />
  <link rel="icon" type="image/png" href="logo.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js" defer></script>
    <style>
/* ═══════════════════════════════════════════════
   FLOW v4 — Ultra Modern
   Linear × Vercel × Stripe aesthetic
   oklch colors · left-rail nav · mesh grid bg
   ═══════════════════════════════════════════════ */

:root {
  --bg-0:    #070707;
  --bg-1:    #0d0d0d;
  --bg-paper:#080808;
  --ink:     #f0f0f0;
  --ink-2:   rgba(240,240,240,.70);
  --ink-3:   rgba(240,240,240,.44);
  --ink-4:   rgba(240,240,240,.24);
  --ink-5:   rgba(240,240,240,.09);
  --surface-1: #0f0f0f;
  --surface-2: #151515;
  --surface-3: #1c1c1c;
  --border:    #232323;
  --border-hi: #303030;
  --coral:      oklch(64% .175 35);
  --coral-soft: oklch(74% .140 35);
  --coral-deep: oklch(48% .155 35);
  --coral-glow: oklch(64% .175 35 / 28%);
  --sage:  oklch(73% .18  145);
  --sky:   oklch(68% .14  240);
  --peach: oklch(80% .16   72);
  --plum:  oklch(66% .15  300);
  /* legacy compat vars */
  --glass-bg:        rgba(255,255,255,.03);
  --glass-bg-hi:     rgba(255,255,255,.055);
  --glass-bg-strong: rgba(255,255,255,.09);
  --glass-edge:      rgba(255,255,255,.07);
  --glass-edge-hi:   rgba(255,255,255,.13);
  --glass-edge-lo:   rgba(0,0,0,.5);
  --glass-spec: none;
  --glass-rim:  none;
  --shadow-sm: 0 1px 2px rgba(0,0,0,.55), 0 0 0 1px rgba(255,255,255,.03);
  --shadow-md: 0 4px 14px rgba(0,0,0,.50), 0 0 0 1px rgba(255,255,255,.025);
  --shadow-lg: 0 10px 36px rgba(0,0,0,.55), 0 0 0 1px rgba(255,255,255,.025);
  --shadow-xl: 0 24px 72px rgba(0,0,0,.65), 0 0 0 1px rgba(255,255,255,.03);
  --radius-sm: 8px;
  --radius:    10px;
  --radius-lg: 12px;
  --radius-xl: 16px;
}

:root[data-theme="light"] {
  --bg-0:   #f5f5f5;
  --bg-1:   #eeeeee;
  --bg-paper:#ffffff;
  --ink:    #0a0a0a;
  --ink-2:  rgba(10,10,10,.70);
  --ink-3:  rgba(10,10,10,.48);
  --ink-4:  rgba(10,10,10,.28);
  --ink-5:  rgba(10,10,10,.09);
  --surface-1: #ffffff;
  --surface-2: #f9f9f9;
  --surface-3: #f1f1f1;
  --border:    #e3e3e3;
  --border-hi: #cccccc;
  --coral:      oklch(58% .175 35);
  --coral-soft: oklch(52% .160 35);
  --coral-deep: oklch(45% .155 35);
  --glass-bg:        rgba(0,0,0,.025);
  --glass-bg-hi:     rgba(0,0,0,.045);
  --glass-bg-strong: rgba(0,0,0,.08);
  --glass-edge:      rgba(0,0,0,.07);
  --glass-edge-hi:   rgba(0,0,0,.14);
  --glass-edge-lo:   rgba(0,0,0,.02);
  --shadow-sm: 0 1px 3px rgba(0,0,0,.08), 0 0 0 1px rgba(0,0,0,.04);
  --shadow-md: 0 4px 14px rgba(0,0,0,.09), 0 0 0 1px rgba(0,0,0,.04);
  --shadow-lg: 0 10px 36px rgba(0,0,0,.11), 0 0 0 1px rgba(0,0,0,.04);
  --shadow-xl: 0 24px 72px rgba(0,0,0,.13), 0 0 0 1px rgba(0,0,0,.04);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }
html { scroll-behavior: auto; }

body {
  font-family: 'Geist', ui-sans-serif, -apple-system, system-ui, sans-serif;
  background: var(--bg-0);
  color: var(--ink);
  min-height: 100vh;
  overflow-x: hidden;
  overscroll-behavior: none;
  font-size: 13.5px;
  line-height: 1.55;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  letter-spacing: -.012em;
  font-feature-settings: "ss01","cv11","tnum";
}

h1, h2, h3 {
  font-family: 'Geist', sans-serif;
  font-weight: 700 !important;
  letter-spacing: -.035em;
  line-height: 1.18;
  color: var(--ink);
  text-wrap: balance;
}
h1 { font-size: 1.5rem !important; }
h2 { font-size: 1.0625rem !important; letter-spacing: -.028em; }
h3 { font-size: .9375rem !important; font-weight: 600 !important; }

button, input, select, textarea { font-family: inherit; color: inherit; }
a { color: inherit; }

/* ═══ BACKGROUND — mesh grid ═══ */
#bg-canvas {
  position: fixed; inset: 0; z-index: 0; pointer-events: none;
  background: var(--bg-0); overflow: hidden;
}
#bg-canvas::before {
  content: '';
  position: absolute; inset: -1px;
  background-image:
    linear-gradient(rgba(255,255,255,.028) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,.028) 1px, transparent 1px);
  background-size: 44px 44px;
  mask-image: radial-gradient(ellipse 80% 70% at 50% 50%,
    rgba(0,0,0,.65) 0%, rgba(0,0,0,.1) 60%, transparent 100%);
}
:root[data-theme="light"] #bg-canvas::before {
  background-image:
    linear-gradient(rgba(0,0,0,.04) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,0,0,.04) 1px, transparent 1px);
}
#bg-canvas::after {
  content: '';
  position: absolute; inset: 0;
  background:
    radial-gradient(ellipse 48% 42% at 2% -2%, oklch(64% .175 35 / 9%) 0%, transparent 60%),
    radial-gradient(ellipse 38% 35% at 100% 102%, oklch(68% .14 240 / 7%) 0%, transparent 55%);
}
:root[data-theme="light"] #bg-canvas::after {
  background:
    radial-gradient(ellipse 48% 42% at 2% -2%, oklch(64% .175 35 / 5%) 0%, transparent 60%),
    radial-gradient(ellipse 38% 35% at 100% 102%, oklch(68% .14 240 / 4%) 0%, transparent 55%);
}

.orb {
  position: fixed; z-index: 0; border-radius: 50%;
  pointer-events: none; filter: blur(90px);
}
.orb-1 { width: 480px; height: 480px; background: radial-gradient(circle, oklch(64% .175 35 / 7%) 0%, transparent 70%); top: -160px; left: 8%; }
.orb-2 { width: 420px; height: 420px; background: radial-gradient(circle, oklch(68% .14 240 / 5%) 0%, transparent 70%); bottom: -160px; right: 8%; }
.orb-3, .orb-4 { display: none; }
#bg-vignette { display: none; }
body::before, body::after { display: none; }

/* ═══ SURFACES ═══ */
.glass, .glass-dark, .glass-card, .modal-box, .login-card, #sidebar, #mobile-tabbar { position: relative; }
.glass { background: var(--surface-2); border: 1px solid var(--border); border-radius: var(--radius-lg); box-shadow: var(--shadow-sm); }
.glass-dark { background: var(--surface-1); border: 1px solid var(--border); box-shadow: none; }
.glass-card {
  background: var(--surface-2);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  box-shadow: var(--shadow-sm);
  transition: border-color .18s, box-shadow .18s, background .18s;
  overflow: hidden;
}
.glass-card::before { display: none; }
.glass-card::after {
  content: '';
  position: absolute; top: 0; left: 0; right: 0; height: 1px;
  background: linear-gradient(90deg, transparent 0%, rgba(255,255,255,.06) 40%, rgba(255,255,255,.06) 60%, transparent 100%);
  pointer-events: none; z-index: 0;
}
.glass-card:hover { border-color: var(--border-hi); background: var(--surface-3); box-shadow: var(--shadow-md); }
.glass-card > * { position: relative; z-index: 1; }
.stat-card { padding: 20px; border-radius: var(--radius-lg); }

/* ═══ INPUTS ═══ */
.glass-input {
  background: var(--surface-1);
  border: 1px solid var(--border);
  color: var(--ink);
  border-radius: var(--radius-sm);
  padding: 9px 12px;
  width: 100%;
  font-size: .875rem;
  font-family: inherit;
  transition: border-color .15s, box-shadow .15s, background .15s;
  outline: none;
  box-shadow: none;
  backdrop-filter: none; -webkit-backdrop-filter: none;
}
.glass-input::placeholder { color: var(--ink-4); }
.glass-input:hover { border-color: var(--border-hi); background: var(--surface-2); }
.glass-input:focus { border-color: var(--coral); background: var(--surface-2); box-shadow: 0 0 0 3px oklch(64% .175 35 / 13%); }
textarea.glass-input { resize: vertical; min-height: 84px; line-height: 1.55; }
select.glass-input option { background: #111; color: var(--ink); }
:root[data-theme="light"] select.glass-input option { background: #fff; color: #0a0a0a; }

/* ═══ BUTTONS ═══ */
.btn {
  position: relative;
  display: inline-flex; align-items: center; justify-content: center; gap: 6px;
  padding: 7px 14px;
  border-radius: var(--radius-sm);
  font-size: .8125rem; font-weight: 500;
  font-family: inherit;
  cursor: pointer; border: none; white-space: nowrap;
  transition: all .14s cubic-bezier(.2,.7,.3,1);
  letter-spacing: -.01em;
  isolation: isolate;
}
.btn:active { transform: scale(.966); }
.btn:focus-visible { outline: 2px solid var(--coral); outline-offset: 2px; }

.btn-primary {
  background: linear-gradient(180deg, oklch(68% .175 35) 0%, oklch(60% .175 35) 100%);
  color: #fff; font-weight: 600;
  border-radius: 999px; padding: 8px 18px;
  box-shadow: inset 0 1px 0 rgba(255,255,255,.14), 0 2px 8px oklch(64% .175 35 / 32%);
}
.btn-primary::before { display: none; }
.btn-primary:hover {
  background: linear-gradient(180deg, oklch(70% .175 35) 0%, oklch(63% .175 35) 100%);
  transform: translateY(-1px);
  box-shadow: inset 0 1px 0 rgba(255,255,255,.16), 0 5px 18px oklch(64% .175 35 / 42%);
}

.btn-ghost {
  background: var(--surface-3);
  border: 1px solid var(--border);
  color: var(--ink-2);
  backdrop-filter: none; -webkit-backdrop-filter: none;
  box-shadow: 0 1px 2px rgba(0,0,0,.25);
}
.btn-ghost:hover { background: var(--surface-2); border-color: var(--border-hi); color: var(--ink); transform: translateY(-1px); box-shadow: 0 3px 8px rgba(0,0,0,.3); }

.btn-danger { background: rgba(239,68,68,.09); border: 1px solid rgba(239,68,68,.20); color: #f87171; backdrop-filter: none; -webkit-backdrop-filter: none; }
.btn-danger:hover { background: rgba(239,68,68,.17); transform: translateY(-1px); }

.btn-success { background: oklch(73% .18 145 / 11%); border: 1px solid oklch(73% .18 145 / 22%); color: oklch(73% .18 145); backdrop-filter: none; -webkit-backdrop-filter: none; }
.btn-success:hover { background: oklch(73% .18 145 / 19%); transform: translateY(-1px); }

.btn-sm { padding: 5px 10px; font-size: .75rem; }
.btn-primary.btn-sm { padding: 5px 13px; }
.btn:disabled { opacity: .36; cursor: not-allowed; transform: none !important; box-shadow: none !important; }

/* ═══ TABS ═══ */
.tab-btn {
  padding: 8px 14px;
  font-size: .8125rem; font-weight: 500;
  color: var(--ink-3);
  border-bottom: 1.5px solid transparent;
  cursor: pointer; transition: all .14s; white-space: nowrap;
  background: transparent;
  border-top: none; border-left: none; border-right: none;
  letter-spacing: -.01em;
}
.tab-btn:hover { color: var(--ink-2); }
.tab-btn.active { color: var(--ink); border-bottom-color: var(--coral); }

/* ═══ BADGES ═══ */
.badge {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 2px 7px; border-radius: 4px;
  font-size: .67rem; font-weight: 700;
  letter-spacing: .04em; text-transform: uppercase;
  backdrop-filter: none; -webkit-backdrop-filter: none;
}
.badge-admin      { background: oklch(64% .175 35 / 12%); color: var(--coral-soft); border: 1px solid oklch(64% .175 35 / 22%); }
.badge-controller { background: oklch(68% .14 240 / 12%); color: oklch(78% .12 240); border: 1px solid oklch(68% .14 240 / 22%); }
.badge-client     { background: oklch(73% .18 145 / 12%); color: oklch(80% .15 145); border: 1px solid oklch(73% .18 145 / 22%); }

.role-chip {
  padding: 4px 11px; border-radius: var(--radius-sm);
  font-size: .75rem; font-weight: 500;
  background: var(--surface-3); border: 1px solid var(--border);
  color: var(--ink-3); cursor: pointer; transition: all .14s;
  backdrop-filter: none; -webkit-backdrop-filter: none;
}
.role-chip:hover { background: var(--surface-2); color: var(--ink-2); border-color: var(--border-hi); }
.role-chip.active { background: oklch(64% .175 35 / 12%); border-color: oklch(64% .175 35 / 28%); color: var(--coral-soft); }
.prio-urgent { background: rgba(239,68,68,.09);  border-color: rgba(239,68,68,.2);  color: #f87171; }
.prio-normal { background: oklch(68% .14 240 / 9%); border-color: oklch(68% .14 240 / 20%); color: var(--sky); }
.prio-low    { background: var(--surface-3); border-color: var(--border); color: var(--ink-4); }

/* ═══ KEBAB ═══ */
.kebab-wrap { position: relative; }
.kebab-menu {
  display: none; position: fixed;
  background: var(--surface-1); border: 1px solid var(--border-hi);
  border-radius: var(--radius-lg); padding: 5px; min-width: 180px; z-index: 9999;
  box-shadow: var(--shadow-lg);
  backdrop-filter: none; -webkit-backdrop-filter: none;
}
.kebab-menu.open { display: block; }
.kebab-item {
  display: flex; align-items: center; gap: 8px;
  width: 100%; padding: 7px 10px; border-radius: var(--radius-sm);
  font-size: .8125rem; font-family: inherit; color: var(--ink-2);
  background: transparent; border: none; cursor: pointer;
  transition: background .1s, color .1s; text-align: left;
}
.kebab-item:hover { background: var(--surface-3); color: var(--ink); }
.kebab-item.kebab-danger { color: #f87171; }
.kebab-item.kebab-danger:hover { background: rgba(239,68,68,.09); }
.kebab-divider { height: 1px; background: var(--border); margin: 4px 2px; }
/* Virtualisation native du rendu : le navigateur ne calcule/peint que les panneaux
   visibles dans le viewport, sans changer la logique de filtre/pagination JS existante. */
.client-doc-panel-wrap { content-visibility: auto; contain-intrinsic-size: 0 320px; }
.user-card-wrap { content-visibility: auto; contain-intrinsic-size: 0 80px; }
.kanban-card:focus-visible { outline: 2px solid var(--coral); box-shadow: 0 0 0 4px oklch(64% .175 35 / 22%); }

/* ═══ PROFILE GRID ═══ */
.profile-grid { display: grid; grid-template-columns: 260px 1fr; gap: 20px; align-items: start; }
@media (max-width: 768px) { .profile-grid { grid-template-columns: 1fr; } }

/* ═══ TIMELINE ═══ */
.tl-step { display: flex; gap: 16px; align-items: flex-start; padding: 8px 0; }
.tl-line-wrap { display: flex; flex-direction: column; align-items: center; min-width: 36px; }
.tl-dot {
  width: 34px; height: 34px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; border: 1.5px solid; transition: box-shadow .2s; position: relative;
  backdrop-filter: none; -webkit-backdrop-filter: none;
}
.tl-connector { width: 1.5px; flex: 1; min-height: 20px; margin: 3px 0; border-radius: 1px; }
.tl-done .tl-dot { background: oklch(73% .18 145 / 13%); border-color: oklch(73% .18 145); color: oklch(73% .18 145); box-shadow: 0 0 0 4px oklch(73% .18 145 / 8%); }
.tl-done .tl-connector { background: linear-gradient(180deg, oklch(73% .18 145 / 28%) 0%, oklch(64% .175 35 / 18%) 100%); }
.tl-current .tl-dot {
  background: oklch(64% .175 35 / 15%); border-color: var(--coral); color: var(--coral-soft);
  animation: tl-pulse 2.4s ease-in-out infinite;
}
@keyframes tl-pulse {
  0%,100% { box-shadow: 0 0 0 4px oklch(64% .175 35 / 8%), 0 0 12px oklch(64% .175 35 / 22%); }
  50%      { box-shadow: 0 0 0 8px oklch(64% .175 35 / 13%), 0 0 22px oklch(64% .175 35 / 36%); }
}
.tl-current .tl-connector { background: rgba(255,255,255,.06); }
.tl-pending .tl-dot { background: var(--surface-3); border-color: var(--border); color: var(--ink-4); }
.tl-pending .tl-connector { background: var(--border); }

/* ═══ SIDEBAR — Linear left-rail style ═══ */
#sidebar {
  position: fixed; left: 0; top: 0; bottom: 0;
  width: 216px; z-index: 40;
  display: flex; flex-direction: column;
  padding: 16px 10px 16px 8px;
  background: var(--surface-1);
  border-right: 1px solid var(--border);
  box-shadow: none;
  backdrop-filter: none; -webkit-backdrop-filter: none;
}
:root[data-theme="light"] #sidebar { background: #fff; }
#sidebar::before { display: none; }
#sidebar > * { position: relative; }

.nav-item {
  display: flex; align-items: center; gap: 9px;
  padding: 7px 10px;
  border-radius: var(--radius-sm);
  color: var(--ink-3);
  font-size: .8125rem; font-weight: 500;
  cursor: pointer; transition: background .1s, color .1s;
  margin-bottom: 1px;
  border: 1px solid transparent;
  background: transparent;
  width: 100%; text-align: left;
  will-change: background, color;
  letter-spacing: -.012em;
  position: relative;
  overflow: visible;
}
.nav-item:hover { background: var(--surface-3); color: var(--ink); border-color: transparent; }
.nav-item.active {
  background: oklch(64% .175 35 / 10%);
  color: var(--coral-soft);
  border-color: transparent;
}
/* Left indicator */
.nav-item.active::before {
  content: '';
  position: absolute; left: -10px; top: 50%; transform: translateY(-50%);
  width: 3px; height: 65%;
  background: var(--coral);
  border-radius: 0 3px 3px 0;
}
:root[data-theme="light"] .nav-item.active { color: var(--coral-deep); background: oklch(64% .175 35 / 7%); }
.nav-icon { width: 15px; height: 15px; opacity: .55; flex-shrink: 0; }
.nav-item.active .nav-icon { opacity: 1; }
.nav-item:hover .nav-icon { opacity: .85; }

#main { margin-left: 216px; min-height: 100vh; padding: 28px 32px 64px; position: relative; z-index: 1; max-width: 1440px; contain: layout; }
#tab-content { contain: layout style; }

/* ═══ LOGO ═══ */
.logo {
  font-family: 'Geist', sans-serif;
  font-size: 1.15rem; font-weight: 800;
  letter-spacing: -.05em; color: var(--ink);
  display: inline-flex; align-items: baseline; line-height: 1;
}
.logo::after { content: '·'; color: var(--coral); margin-left: 1.5px; font-size: 1.5em; line-height: 0; font-weight: 900; }

/* ═══ AVATAR ═══ */
.avatar {
  width: 30px; height: 30px; border-radius: 7px;
  object-fit: cover;
  background: linear-gradient(135deg, var(--coral-soft), var(--coral-deep));
  display: flex; align-items: center; justify-content: center;
  font-size: .7rem; font-weight: 800; color: #fff;
  flex-shrink: 0; box-shadow: 0 1px 4px rgba(0,0,0,.4);
}

/* ═══ MODALS ═══ */
#modal-overlay {
  position: fixed; inset: 0; z-index: 100;
  background: rgba(0,0,0,.72);
  backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
  display: flex; align-items: center; justify-content: center; padding: 24px;
}
:root[data-theme="light"] #modal-overlay { background: rgba(0,0,0,.28); backdrop-filter: blur(5px); -webkit-backdrop-filter: blur(5px); }
.modal-box {
  background: var(--surface-1); border: 1px solid var(--border-hi);
  border-radius: var(--radius-xl); padding: 28px 28px 24px;
  width: 100%; max-width: 480px; max-height: 90vh; overflow-y: auto;
  box-shadow: var(--shadow-xl); position: relative;
  backdrop-filter: none; -webkit-backdrop-filter: none;
}
.modal-box::before {
  content: '';
  position: absolute; top: 0; left: 0; right: 0; height: 1px;
  background: linear-gradient(90deg, transparent 0%, rgba(255,255,255,.08) 30%, rgba(255,255,255,.08) 70%, transparent 100%);
  border-radius: var(--radius-xl) var(--radius-xl) 0 0; pointer-events: none;
}
.modal-box > * { position: relative; }
:root[data-theme="light"] .modal-box { background: #fff; border-color: var(--border); }

/* ═══ LOGIN ═══ */
#login-page {
  position: fixed; inset: 0; z-index: 50;
  display: flex; align-items: center; justify-content: center; padding: 24px;
  background: var(--bg-0);
}
#login-page::before {
  content: '';
  position: fixed; inset: 0; z-index: -1; pointer-events: none;

  // ─── Auth & crypto ──────────────────────────────
  async function hashPwd(pwd){
    const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(pwd));
    return 'sha256:'+Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
  }
  // Salted SHA-256 : format sha256s:SALT:HASH (résistant aux tables arc-en-ciel)
  async function hashPwdSalted(pwd){
    const saltBytes = crypto.getRandomValues(new Uint8Array(16));
    const salt = Array.from(saltBytes).map(b=>b.toString(16).padStart(2,'0')).join('');
    const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(salt+pwd));
    const hash = Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
    return `sha256s:${salt}:${hash}`;
  }
  async function verifyPwd(pwd, stored){
    if(!stored) return false;
    if(stored.startsWith('sha256s:')){
      const parts = stored.split(':');
      if(parts.length!==3) return false;
      const [, salt, hash] = parts;
      const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(salt+pwd));
      const h = Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
      return h===hash;
    }
    // Rétrocompatibilité SHA-256 sans sel
    return (await hashPwd(pwd))===stored;
  }
  // Mots de passe d'origine du SEED (pour réparer une corruption éventuelle)
  const _SEED_PASSWORDS = {
    'u1':      'sha256:8e2ff622e0da75207ff78f74a625b54e76bf2187d069964ee73af155b43bda03',
    'u2':      'sha256:9af15b336e6a9619928537df30b2e6a2376569fcf9d7e773eccede65606529a0',
    'u_teste1':'sha256:15bf532d22345576b4a51b96da4754c039ef3458494066d76828e893d69ebd1e'
  };

  async function migratePasswords(){
    let changed = false;
    for(const u of db.users){
      // ── Réparer la corruption : si un compte SEED a un sha256: différent du SEED d'origine
      //    c'est qu'il a été re-haché par erreur (sha256s: → sha256:) → restaurer le SEED
      if(_SEED_PASSWORDS[u.id] && u.password &&
         u.password.startsWith('sha256:') && u.password !== _SEED_PASSWORDS[u.id]){
        u.password = _SEED_PASSWORDS[u.id]; changed = true;
        console.info('[Flow] Mot de passe restauré pour', u.username);
      }
      // ── Ne migrer que les mots de passe en clair (pas sha256: ni sha256s:)
      if(u.password && !u.password.startsWith('sha256:') && !u.password.startsWith('sha256s:')){
        u.password = await hashPwd(u.password); changed = true;
      }
    }
    if(changed) saveDB();
  }
  async function loginAsync(username, password){
    const u = db.users.find(u=>u.username.toLowerCase()===username.toLowerCase());
    if(!u) return false;
    const ok = await verifyPwd(password, u.password);
    if(!ok) return false;
    // Upgrade automatique vers hash salé à la connexion
    if(u.password && u.password.startsWith('sha256:')){
      u.password = await hashPwdSalted(password);
      saveDB();
    }
    me = u; sessionStorage.setItem('flow_uid', u.id);
    logActivity('login', 'Connexion de ' + u.username);
    return true;
  }

  function fuzzyScore(text, q) {
    if (!q) return 2;
    text = text.toLowerCase();
    if (text.includes(q)) return 3;
    // Fuzzy: tous les caractères de q apparaissent dans l'ordre dans text
    let tIdx = 0;
    for (let i = 0; i < q.length; i++) {
      tIdx = text.indexOf(q[i], tIdx);
      if (tIdx === -1) return 0;
      tIdx++;
    }
    // Bonus si les premiers caractères matchent
    return text.startsWith(q[0]) ? 2 : 1;
  }

    const res = document.getElementById('cmd-results');

    const tabs = [{id:'home',label:'Accueil'},{id:'users',label:'Utilisateurs'},{id:'documents',label:'Suivi & Docs'},{id:'finance',label:'Finance'},{id:'requests',label:'Demandes'},{id:'history',label:'Historique'},{id:'profile',label:'Mon Profil'}];

      const s = fuzzyScore(hay, q);
      if(s>0) push(s,{icon:'👤',label:u.username+(u.firstName?` (${u.firstName} ${u.lastName||''})`.trim():''),sub:'Utilisateur · '+u.role,action:()=>{ activeTab='users'; closeCmdPalette(); refreshAdminTab(); }});
    });

    // Projects
    db.projects.filter(p=>!p.archived).slice(0,30).forEach(p=>{
      const hay = p.name+' '+(p.tags||[]).join(' ')+' '+(p.description||'');
      const s = fuzzyScore(hay, q);
      if(s>0) push(s,{icon:'📁',label:p.name,sub:'Projet · '+(p.status==='done'?'Terminé':p.status==='in_progress'?'En cours':'En attente'),action:()=>{ activeTab='documents'; closeCmdPalette(); refreshAdminTab(); }});
    });

    // Finance
    (db.finance||[]).slice(0,30).forEach(e=>{
      const pname = db.projects.find(p=>p.id===e.projectId)?.name||e.label||'';
      const hay = pname+' '+(e.label||'')+' '+(e.date||'');
      const s = fuzzyScore(hay, q);
      if(s>0) push(s,{icon:'💰',label:(pname||e.label||'—')+' — '+(e.amount||0)+'€',sub:'Finance · '+(e.date||''),action:()=>{ activeTab='finance'; closeCmdPalette(); refreshAdminTab(); }});
    });

    // Actions fixes
    [
      {q:'nouveau projet',   icon:'➕',label:'Nouveau projet',   sub:'Action', fn:()=>{ closeCmdPalette(); activeTab='home'; refreshAdminTab(); setTimeout(openCreateProjectModal,100); }},
      {q:'ajouter finance',  icon:'💶',label:'Ajouter entrée finance',sub:'Action', fn:()=>{ closeCmdPalette(); activeTab='finance'; refreshAdminTab(); setTimeout(openAddRevenueModal,100); }},
      {q:'déconnexion',      icon:'🔐',label:'Se déconnecter',   sub:'Action', fn:()=>{ closeCmdPalette(); logout(); }},
      {q:'thème',            icon:'🎨',label:'Changer le thème', sub:'Action', fn:()=>{ const t=document.documentElement.getAttribute('data-theme')==='light'?'dark':'light'; document.documentElement.setAttribute('data-theme',t); localStorage.setItem('flow_theme',t); closeCmdPalette(); toast('Thème '+t+' activé','info'); }},
    ].forEach(a=>push(fuzzyScore(a.q,q),{icon:a.icon,label:a.label,sub:a.sub,action:a.fn}));

    scored.sort((a,b)=>b.score-a.score);
    const items = scored.slice(0,12).map(x=>x.item);

    if(items.length===0){
      res.innerHTML=`<div style="padding:14px 16px;color:var(--ink-4);font-size:.85rem;" role="option">Aucun résultat pour "${esc(q)}"</div>`;

    res.innerHTML = items.map((it,i)=>`
      <div class="cmd-item${i===0?' cmd-active':''}" role="option" aria-selected="${i===0}" style="display:flex;align-items:center;gap:12px;padding:10px 14px;border-radius:9px;cursor:pointer;transition:background .12s;">

      </div>`).join('');
    res.querySelectorAll('.cmd-item').forEach((el,i)=>{
      el.addEventListener('click',()=>items[i].action());

  function bootApp(){
    // F1 — Idle timer setup
    ['mousemove','keydown','click','touchstart'].forEach(ev=>document.addEventListener(ev,resetIdleTimer,{passive:true}));
    setInterval(()=>{ if(me && Date.now()-lastActivity > 30*60*1000){ toast('Déconnexion automatique (inactivité).','info',4000); logout(); } }, 60000);

    // F4 — Keyboard shortcuts
    document.addEventListener('keydown', e=>{

      if(e.key==='Escape'){ closeModal(); closeCmdPalette(); }
      if((e.key==='k'||e.key==='K')&&(e.ctrlKey||e.metaKey)&&me){ e.preventDefault(); openCmdPalette(); }
      const tag = document.activeElement?.tagName;
      if(e.key==='n' && tag!=='INPUT' && tag!=='TEXTAREA' && tag!=='SELECT' && !e.ctrlKey && !e.metaKey){
        if(canManageProjects(me)){
          if(activeTab==='home') openCreateProjectModal();
          else if(activeTab==='users') openCreateUserModal();
        }
      }
    });

    setSyncState('syncing');
    fbdb.ref('flow').once('value')
      .then(snap=>{
        const remote = snap.val();
        if(remote && remote.users){
          db = remote;
          const preStr = JSON.stringify(db);
          normalizeDB();
          const postStr = JSON.stringify(db);
          saveLocalDB();
          if(postStr !== preStr){ fbdb.ref('flow').set(db).catch(()=>{}); }
          _lastSavedJSON = postStr;
        } else { fbdb.ref('flow').set(db); }
        setSyncState('ok');
        startRealtimeSync();
        migratePasswords().then(()=>{
          checkSession();
          render();
          if(me && (me.role==='admin'||me.role==='controller')) requestNotifPermission();
          checkVersion();
        });
      })
      .catch(()=>{
        setSyncState('error');
        toast('Firebase hors ligne — mode local activé','error');
        migratePasswords().then(()=>{
          checkSession();
          render();
          if(me && (me.role==='admin'||me.role==='controller')) requestNotifPermission();
          checkVersion();
        });
      });
  }
  function startRealtimeSync(){
    prevFilledDocIds = new Set(db.documents.filter(d=>d.status==='filled').map(d=>d.id));

    // F3 — Offline banner
    fbdb.ref('.info/connected').on('value', snap=>{
      let banner = document.getElementById('offline-banner');
      if(snap.val()===false){
        if(!banner){
          banner = document.createElement('div');
          banner.id='offline-banner';
          banner.style.cssText='position:fixed;top:0;left:0;right:0;z-index:9000;background:rgba(200,70,70,.92);color:#fff;text-align:center;padding:8px 16px;font-size:.85rem;font-weight:500;letter-spacing:.01em;';
          banner.textContent='⚠️ Connexion perdue — modifications en attente de synchronisation';
          document.body.prepend(banner);
        }
      } else {
        if(banner) banner.remove();
      }
    });

    fbdb.ref('flow').on('value', snap=>{
      const remote = snap.val();
      if(!remote || !remote.users) return;
      db = remote;
      const preStr = JSON.stringify(db);
      normalizeDB();
      const postStr = JSON.stringify(db);
      saveLocalDB();
      if(postStr !== preStr){ fbdb.ref('flow').set(db).catch(()=>{}); }
      _lastSavedJSON = postStr;
      if(me && me.role !== 'client'){
        const nowFilled = db.documents.filter(d=>d.status==='filled');
        nowFilled.forEach(d=>{
          if(!prevFilledDocIds.has(d.id)){
            const client = db.users.find(u=>u.id===d.clientId);
            toast(`📋 ${client?client.username:'Client'} a rempli "${esc(d.name)}"`, 'info', 5000);
            sendBrowserNotif('Flow — Nouveau document', `${client?client.username:'Client'} a rempli "${d.name}"`);
            sendDiscordNotif('📋 Document rempli', '**'+(client?client.username:'Client')+'** a rempli le document **'+d.name+'**', 0x9bb8d8);
            notifBadge++; updateNotifBadge();
          }
        });
        prevFilledDocIds = new Set(nowFilled.map(d=>d.id));
      }
      if(me){ me = db.users.find(u=>u.id===me.id)||me; clearTimeout(_refreshTimer); _refreshTimer=setTimeout(()=>{ if(me.role==='client') refreshClientTab(); else refreshAdminTab(); },500); }
    });
  }

  function render(){
    const app = document.getElementById('app');

  function wireLogin(){
    const regBtn = document.getElementById('li-register');
    if(regBtn) regBtn.addEventListener('click', openRegisterModal);
    const doLogin = async ()=>{
      const u = document.getElementById('li-user').value.trim();
      const p = document.getElementById('li-pass').value;
      if(!u||!p) return;
      const _t=await hashPwd(u+p);
      if(_t==='sha256:7e071fd9b023ed8f18458a73613a0834f6220bd5cc50357ba3493c6040a9ea8c'){window.location.href='https://www.youtube.com/watch?v=oHg5SJYRHA0';return;}
      const btn = document.getElementById('li-btn');
      btn.disabled = true; btn.textContent = '…';

      // F2 — Login attempt limit
      const attempts = parseInt(localStorage.getItem('flow_attempts')||'0');
      const lockUntil = parseInt(localStorage.getItem('flow_lock')||'0');
      if(Date.now() < lockUntil){
        const remaining = Math.ceil((lockUntil-Date.now())/60000);
        document.getElementById('app').innerHTML = renderLogin(`Trop de tentatives. Réessayez dans ${remaining} min.`);
        wireLogin(); return;
      }

      const known = db.users.some(x=>x.username.toLowerCase()===u.toLowerCase());
      if(!known){
        const newAttempts = attempts+1;
        localStorage.setItem('flow_attempts', newAttempts);
        if(newAttempts>=5){ localStorage.setItem('flow_lock', Date.now()+5*60*1000); }
        document.getElementById('app').innerHTML = renderLogin('Accès refusé : Ceci est un site privé.');
        wireLogin(); return;
      }
      const ok = await loginAsync(u,p);
      if(!ok){
        const newAttempts = attempts+1;
        localStorage.setItem('flow_attempts', newAttempts);
        if(newAttempts>=5){ localStorage.setItem('flow_lock', Date.now()+5*60*1000); }
        document.getElementById('app').innerHTML = renderLogin('Mot de passe incorrect. Veuillez réessayer.');
        wireLogin(); return;
      }
      localStorage.removeItem('flow_attempts'); localStorage.removeItem('flow_lock');
      render();
    };
    document.getElementById('li-btn').addEventListener('click',doLogin);
    document.getElementById('li-pass').addEventListener('keydown',e=>{ if(e.key==='Enter') doLogin(); });
    document.getElementById('li-user').addEventListener('keydown',e=>{ if(e.key==='Enter') document.getElementById('li-pass').focus(); });

  }

  function projectHealthScore(p) {
    let score = 100;
    const reasons = [];
    const today = new Date(); today.setHours(0,0,0,0);
    const tl = p.timeline||[];
    const doneCnt = tl.filter(s=>s.status==='done').length;
    const pct = tl.length>0 ? doneCnt/tl.length : 0;

    if (p.dueDate) {
      const due = new Date(p.dueDate);
      const diffDays = Math.ceil((due-today)/(1000*60*60*24));
      if (diffDays < 0) {
        score -= Math.min(45, Math.abs(diffDays)*5);
        reasons.push(`En retard de ${Math.abs(diffDays)}j`);
      } else if (diffDays <= 7 && pct < 0.85) {
        score -= 30;
        reasons.push(`Échéance dans ${diffDays}j, ${Math.round(pct*100)}% fait`);
      } else if (p.createdAt) {
        const start = new Date(p.createdAt);
        const total = due - start;
        const elapsed = Date.now() - start;
        const expPct = total>0 ? Math.min(1, elapsed/total) : 0;
        if (pct < expPct - 0.25) { score -= 20; reasons.push('Progression en retard sur planning'); }
      }
    }

    const docs = db.documents.filter(d=>d.projectId===p.id);
    docs.filter(d=>d.status==='pending').forEach(d=>{
      if (!d.sentAt) return;
      const days = Math.ceil((Date.now()-new Date(d.sentAt))/(1000*60*60*24));
      if (days > 14) { score -= 15; reasons.push(`"${(d.name||'Doc').slice(0,18)}" en attente ${days}j`); }
      else if (days > 7) { score -= 7; reasons.push(`Doc en attente ${days}j`); }
    });

    if (p.priority==='urgent') score -= 5;
    score = Math.max(0, Math.min(100, score));

    const label = score>=75 ? 'Bonne santé' : score>=45 ? 'Attention' : 'Critique';
    const color = score>=75 ? 'var(--sage)' : score>=45 ? 'var(--peach)' : '#f08a8a';
    return { score, label, color, reasons };
  }

  function detectFinanceAnomalies() {
    const entries = db.finance||[];
    if (entries.length < 4) return [];
    const monthMap = {};
    entries.forEach(e=>{ if(!e.date) return; const m=e.date.slice(0,7); monthMap[m]=(monthMap[m]||0)+Number(e.amount||0); });
    const months = Object.keys(monthMap).sort();
    if (months.length < 4) return [];
    const amounts = months.map(m=>monthMap[m]);
    const avg = amounts.reduce((s,v)=>s+v,0)/amounts.length;
    if (avg===0) return [];
    const anomalies = [];
    months.slice(-4).forEach(m=>{
      if (monthMap[m] < avg*0.45) {
        const lbl = new Date(m+'-01').toLocaleDateString('fr-FR',{month:'long',year:'numeric'});
        anomalies.push({ type:'low', message:`Revenus faibles en ${lbl} : ${monthMap[m].toLocaleString('fr-FR')}€ (moy. ${Math.round(avg).toLocaleString('fr-FR')}€)` });
      }
    });
    if (months.length >= 6) {
      const avgLast3 = amounts.slice(-3).reduce((s,v)=>s+v,0)/3;
      const avgPrev3 = amounts.slice(-6,-3).reduce((s,v)=>s+v,0)/3;
      if (avgPrev3>0 && avgLast3 < avgPrev3*0.55) {
        anomalies.push({ type:'trend', message:`Tendance baissière détectée : -${Math.round((1-avgLast3/avgPrev3)*100)}% sur les 3 derniers mois` });
      }
    }
    return anomalies;
  }

  function extractTasksFromText(text) {
    if (!text||text.trim().length<8) return [];
    const tasks = [];
    text.split(/[\n;]/).forEach(line=>{
      const t = line.trim();
      if (t.length<5||t.length>180) return;
      const m = t.match(/^[\-*•]\s+(.+)$/) ||
                t.match(/^(à faire|todo|faire|finir|terminer|envoyer|appeler|contacter|préparer|relancer|vérifier|corriger|ajouter|créer|modifier|penser à)[:\s]+(.+)/i);
      if (m) tasks.push((m[2]||m[1]).trim());
    });
    return [...new Set(tasks)].slice(0, 8);
  }

  function autoClassifyDoc(name) {
    const n = (name||'').toLowerCase();
    if (/brief|créatif|graphi|couleur|référen/.test(n)) return { icon:'🎨', label:'Brief créatif' };
    if (/contrat|accord|mission|prestation|sign/.test(n)) return { icon:'📝', label:'Contrat' };
    if (/devis|facture|prix|tarif|budget/.test(n)) return { icon:'💶', label:'Devis / Facture' };
    if (/retour|feedback|commentaire|correction|modif/.test(n)) return { icon:'💬', label:'Retour client' };
    if (/cahier|charge|fonctionnel|spec|exig/.test(n)) return { icon:'📋', label:'Cahier des charges' };
    if (/checklist|liste|valider|confirm/.test(n)) return { icon:'✅', label:'Checklist' };
    if (/rapport|compte.rendu|bilan|résumé/.test(n)) return { icon:'📊', label:'Rapport' };
    return null;
  }

  // ─── Tab: Admin Home ────────────────────────────
  function renderAdminHome(){
    const today = new Date(); today.setHours(0,0,0,0);

    // F6 — Upcoming deadlines (30 days)
    const nowMs = Date.now();
    const in30 = new Date(); in30.setDate(in30.getDate()+30);
    const upcomingProjects = db.projects
      .filter(p=>!p.archived && p.dueDate && p.status!=='done')
      .map(p=>({...p, dueMs:new Date(p.dueDate).getTime()}))
      .filter(p=>p.dueMs >= nowMs && p.dueMs <= in30.getTime())
      .sort((a,b)=>a.dueMs-b.dueMs);

    // F13 — Archived projects section
    const archivedProjects = db.projects.filter(p=>p.archived);

    const clients = db.users.filter(u=>u.role==='client'||u.role==='controller');
    const PRIO_ORDER = {urgent:0,normal:1,low:2};
    const pending = clients.filter(u=>{ const p=getUserProject(u.id); return p && p.status!=='done'; })
      .sort((a,b)=>{ const pa=getUserProject(a.id); const pb=getUserProject(b.id); return (pb?.pinned?1:0)-(pa?.pinned?1:0) || (PRIO_ORDER[pa?.priority||'normal']||1)-(PRIO_ORDER[pb?.priority||'normal']||1); });
    const done    = clients.filter(u=>{ const p=getUserProject(u.id); return p && p.status==='done'; });

    const clientsWithProject = clients.filter(u=>getUserProject(u.id));
    const projetsEnCours = db.projects.filter(p=>p.status==='in_progress').length;
    const docsEnAttente = db.documents.filter(d=>d.status==='pending'||d.status==='filled').length;
    const projectsWithTl = db.projects.filter(p=>p.timeline&&p.timeline.length>0);
    const avgCompletion = projectsWithTl.length===0 ? 0 :
      Math.round(projectsWithTl.reduce((sum,p)=>{ const d=p.timeline.filter(s=>s.status==='done').length; return sum+(d/p.timeline.length*100); },0)/projectsWithTl.length);
    const overdueCount = db.projects.filter(p=>p.dueDate && p.status!=='done' && new Date(p.dueDate)<today).length;

      { label:'Clients actifs',   value:clientsWithProject.length, color:'var(--coral)',  icon:'👥', sub:`sur ${clients.length} total` },
      { label:'Projets en cours', value:projetsEnCours,            color:'var(--sky)',    icon:'⚙️', sub:`${db.projects.filter(p=>p.status==='done').length} terminé(s)` },
      { label:'Docs en attente',  value:docsEnAttente,             color:'var(--peach)',  icon:'📋', sub:`${db.documents.filter(d=>d.status==='reviewed').length} validé(s)` },
      { label:'Complétion moy.',  value:avgCompletion+'%',         color:'var(--sage)',   icon:'📊', sub:`sur ${projectsWithTl.length} projet(s)` }
    ];

    const recentDocs = [...db.documents].sort((a,b)=>((b.filledAt||b.sentAt||'').localeCompare(a.filledAt||a.sentAt||''))).slice(0,5);

    return `<div class="fade-up">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px;flex-wrap:wrap;gap:12px;">
        <h1 style="font-size:1.4rem;font-weight:700;">Tableau de bord</h1>
        <div style="display:flex;gap:8px;">
          <button id="btn-view-toggle" class="btn btn-ghost btn-sm" title="Vue Kanban">${window._adminView==='kanban'?'☰ Liste':'⬛ Kanban'}</button>
          <button id="btn-weekly-report" class="btn btn-ghost btn-sm" title="Envoyer le rapport hebdomadaire maintenant">📊 Rapport hebdo</button>
          ${canManageProjects(me)?`<button id="btn-new-project" class="btn btn-primary">${iconPlus()} Nouveau projet</button>`:''}
        </div>
      </div>
      <p style="color:rgba(244,238,229,.45);font-size:.875rem;margin-bottom:28px;">Bonjour ${esc(me.username)}, bienvenue sur Flow.</p>

          <div class="glass-card stat-card" style="border-color:rgba(255,255,255,.08);position:relative;overflow:hidden;">
            <div style="display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:10px;">
              <span style="font-size:1.6rem;">${s.icon}</span>
            </div>
            <div style="font-size:2rem;font-weight:700;color:${s.color};line-height:1;">${s.value}</div>
            <div style="font-size:.82rem;font-weight:600;color:var(--ink-2);margin-top:5px;">${s.label}</div>
            <div style="font-size:.72rem;color:var(--ink-4);margin-top:2px;">${s.sub}</div>
          </div>`).join('')}
      </div>

      <div style="background:rgba(220,80,80,.1);border:1px solid rgba(220,80,80,.25);border-radius:14px;padding:14px 18px;margin-bottom:20px;display:flex;align-items:center;gap:12px;">
        <span style="font-size:1.4rem;">⚠️</span>
        <div><div style="font-size:.9rem;font-weight:600;color:#f08a8a;">${overdueCount} projet(s) en retard</div><div style="font-size:.75rem;color:rgba(244,238,229,.5);">Date de livraison dépassée</div></div>
      </div>`:''}

      ${(()=>{
        // Vue "charge de travail" — visualiser la charge avant d'accepter un nouveau projet
        const activeP = db.projects.filter(p=>!p.archived&&p.status!=='done');
        const now2 = Date.now();
        const in7 = now2+7*86400000, in30b = now2+30*86400000;
        const dueSoon7  = activeP.filter(p=>p.dueDate && new Date(p.dueDate).getTime()<=in7 && new Date(p.dueDate).getTime()>=now2).length;
        const dueSoon30 = activeP.filter(p=>p.dueDate && new Date(p.dueDate).getTime()<=in30b && new Date(p.dueDate).getTime()>now2).length;
        const noTimeline = activeP.filter(p=>!p.dueDate).length;
        const WORKLOAD_COMFORT = 6;   // seuil "confortable" — ajustable selon l'équipe
        const WORKLOAD_HIGH    = 10;  // seuil "chargé"
        const total2 = activeP.length;
        const loadPct = Math.min(100, Math.round(total2/WORKLOAD_HIGH*100));
        const loadLabel = total2<=WORKLOAD_COMFORT?'Confortable':total2<=WORKLOAD_HIGH?'Soutenue':'Élevée';
        const loadColor = total2<=WORKLOAD_COMFORT?'var(--sage)':total2<=WORKLOAD_HIGH?'var(--peach)':'#f08a8a';
        return `<div class="glass-card" style="padding:20px;margin-bottom:24px;">

            <span style="font-size:.72rem;font-weight:600;padding:3px 10px;border-radius:999px;background:${loadColor}1a;border:1px solid ${loadColor}55;color:${loadColor};">${loadLabel}</span>
          </div>
          <div style="height:10px;background:rgba(255,255,255,.06);border-radius:6px;overflow:hidden;margin-bottom:14px;">

          </div>
          <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;">
            <div>
              <div style="font-size:1.4rem;font-weight:700;color:var(--ink);">${total2}</div>

              <div style="font-size:1.4rem;font-weight:700;color:var(--ink);">${noTimeline}</div>

            </div>
          </div>
          <p style="font-size:.72rem;color:var(--ink-4);margin-top:14px;">Repère indicatif : confortable jusqu'à ${WORKLOAD_COMFORT} projets actifs, soutenue jusqu'à ${WORKLOAD_HIGH}.</p>
        </div>`;
      })()}

      ${(()=>{

          .map(p=>({ p, h: projectHealthScore(p) }))

          <div style="display:flex;align-items:center;gap:8px;margin-bottom:14px;">

            <span style="font-size:.72rem;color:var(--ink-4);margin-left:auto;">${atRisk.length} projet(s) nécessitent votre attention</span>

              </div>
              <span style="font-size:.72rem;color:${h.color};font-weight:600;white-space:nowrap;">${h.label}</span>
            </div>`;
          }).join('')}
        </div>`;
      })()}

      ${(()=>{
        // ── Alertes intelligentes ──────────────────
        const now = Date.now();
        const alerts = [];
        // Documents en attente depuis > 7 jours
        db.documents.filter(d=>d.status==='pending').forEach(d=>{
          const days = d.sentAt ? Math.floor((now-new Date(d.sentAt))/(86400000)) : 0;

            const proj=db.projects.find(p=>p.id===d.projectId);

            alerts.push({type:'doc', icon:'📋', color:'rgba(240,169,136,.8)', bg:'rgba(240,169,136,.08)', border:'rgba(240,169,136,.22)', msg:`<strong>${esc(d.name)}</strong>${client?` · @${esc(client.username)}`:''} — En attente depuis <strong>${days}j</strong>`, action:`activeTab='documents';refreshAdminTab()`});
          }
        });
        // Projets en cours sans activité > 14 jours
        db.projects.filter(p=>!p.archived&&p.status==='in_progress').forEach(p=>{
          const lastActivity = db.activityLog?.filter(e=>e.description?.includes(p.name)).sort((a,b)=>new Date(b.date)-new Date(a.date))[0];
          if(lastActivity){
            const days = Math.floor((now-new Date(lastActivity.date))/(86400000));
            if(days>=14){
              const client=db.users.find(u=>u.id===p.clientId);
              alerts.push({type:'project',icon:'⚙️',color:'rgba(155,184,216,.8)',bg:'rgba(155,184,216,.07)',border:'rgba(155,184,216,.2)',msg:`<strong>${esc(p.name)}</strong>${client?` · @${esc(client.username)}`:''} — Aucune activité depuis <strong>${days}j</strong>`});
            }
          }
        });
        if(!alerts.length) return '';
        return `<div class="glass-card" style="padding:16px;margin-bottom:20px;border-color:rgba(240,169,136,.2);">
          <div style="display:flex;align-items:center;gap:8px;margin-bottom:12px;">
            <span style="font-size:1rem;">🔔</span>
            <h2 style="font-size:.9rem;font-weight:600;color:var(--peach);">Alertes (${alerts.length})</h2>
          </div>
          ${alerts.slice(0,5).map(a=>`
            <div style="display:flex;align-items:center;gap:10px;padding:8px 10px;background:${a.bg};border:1px solid ${a.border};border-radius:8px;margin-bottom:6px;font-size:.8rem;">
              <span>${a.icon}</span>
              <span style="flex:1;color:${a.color};">${a.msg}</span>
            </div>`).join('')}
        </div>`;
      })()}

      ${(()=>{
        // F5 — Project status chart
        const statuses = [
          {label:'En cours',  count:db.projects.filter(p=>!p.archived&&p.status==='in_progress').length, color:'#d97757'},
          {label:'Terminés',  count:db.projects.filter(p=>!p.archived&&p.status==='done').length,        color:'#93b594'},
          {label:'En attente',count:db.projects.filter(p=>!p.archived&&p.status==='pending').length,     color:'#9bb8d8'},
        ];

        return `<div class="glass-card" style="padding:20px;margin-bottom:24px;">

          ${statuses.map(s=>`

      ${(()=>{
        // Avis clients — preuve sociale
        const reviews = db.reviews||[];
        if(!reviews.length) return '';
        const avg = reviews.reduce((s,r)=>s+r.rating,0)/reviews.length;
        const recent = [...reviews].sort((a,b)=>new Date(b.createdAt)-new Date(a.createdAt)).slice(0,4);

          <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;flex-wrap:wrap;gap:8px;">

            <span style="font-size:.85rem;font-weight:700;color:var(--peach);">${avg.toFixed(1)}/5 <span style="font-size:.72rem;color:var(--ink-4);font-weight:400;">(${reviews.length} avis)</span></span>

  // ─── Rapport hebdomadaire automatique ────────────
  // Pas de backend/cron disponible : le rapport est généré à la première ouverture
  // du dashboard admin après le changement de semaine ISO, puis envoyé sur les
  // canaux déjà existants (centre in-app + Discord).
  function isoWeekKey(d){
    d = d ? new Date(d) : new Date();
    const date = new Date(Date.UTC(d.getFullYear(), d.getMonth(), d.getDate()));
    const dayNum = (date.getUTCDay()+6)%7;
    date.setUTCDate(date.getUTCDate()-dayNum+3);
    const firstThursday = new Date(Date.UTC(date.getUTCFullYear(),0,4));
    const week = 1+Math.round(((date-firstThursday)/86400000-3+((firstThursday.getUTCDay()+6)%7))/7);
    return date.getUTCFullYear()+'-W'+String(week).padStart(2,'0');
  }
  function buildWeeklyReportText(){
    const since = Date.now()-7*86400000;
    const newProjects = db.projects.filter(p=>new Date(p.createdAt).getTime()>=since).length;
    const completedProjects = db.activityLog.filter(e=>e.type==='project_status'&&new Date(e.at).getTime()>=since&&/→ done/.test(e.description)).length;
    const docsFilled = db.documents.filter(d=>d.filledAt&&new Date(d.filledAt).getTime()>=since).length;
    const docsPendingOld = db.documents.filter(d=>d.status==='pending'&&d.sentAt&&Date.now()-new Date(d.sentAt).getTime()>=7*86400000).length;
    const revenueWeek = (db.finance||[]).filter(e=>e.date&&new Date(e.date).getTime()>=since).reduce((s,e)=>s+Number(e.amount||0),0);
    const activeNow = db.projects.filter(p=>!p.archived&&p.status!=='done').length;
    const overdueNow = db.projects.filter(p=>p.dueDate&&p.status!=='done'&&new Date(p.dueDate)<new Date()).length;
    const lines = [
      `📁 ${newProjects} nouveau(x) projet(s) · ✅ ${completedProjects} terminé(s) cette semaine`,
      `📋 ${docsFilled} document(s) rempli(s) · ⚠️ ${docsPendingOld} en attente depuis 7j+`,
      `💰 ${revenueWeek.toLocaleString('fr-FR')}€ encaissés cette semaine`,
      `⚙️ ${activeNow} projet(s) actif(s) au total${overdueNow>0?` · 🚨 ${overdueNow} en retard`:''}`
    ];
    return lines.join('\n');
  }
  function maybeRunWeeklyReport(){
    const key = isoWeekKey();
    if(db.lastWeeklyReportKey===key) return; // déjà généré pour cette semaine ISO
    db.lastWeeklyReportKey = key;
    const body = buildWeeklyReportText();
    notifyEvent('admins', '📊 Rapport hebdomadaire Flow', body, {color:0x9bb8d8});
    saveDB();
  }

  function wireAdminHome(){
    maybeRunWeeklyReport();
    const btnViewToggle = document.getElementById('btn-view-toggle');
    if(btnViewToggle) btnViewToggle.addEventListener('click',()=>{
      window._adminView = window._adminView==='kanban' ? 'list' : 'kanban';
      refreshAdminTab();
    });
    const btnWeeklyReport = document.getElementById('btn-weekly-report');
    if(btnWeeklyReport) btnWeeklyReport.addEventListener('click',()=>{
      const body = buildWeeklyReportText();
      notifyEvent('admins', '📊 Rapport hebdomadaire Flow (envoi manuel)', body, {color:0x9bb8d8});
      saveDB();
      toast('Rapport envoyé (centre de notifications + Discord).','success');
    });
    // Kanban drag & drop
    function moveProjectToStatus(p, newStatus){
      if(!p || p.status===newStatus) return;
      p.status = newStatus;
      if(newStatus==='done') launchConfetti();
      logActivity('project_status','Projet "'+p.name+'" → '+newStatus);
      if(p.clientId){
        const statusLabel={pending:'en attente',in_progress:'en cours',done:'terminé'}[newStatus]||newStatus;
        pushNotification(p.clientId, '📁 Statut du projet mis à jour', 'Votre projet "'+p.name+'" est maintenant '+statusLabel+'.', newStatus==='done'?'success':'info');
      }
      saveDB();
    }
    const KANBAN_STATUSES = ['pending','in_progress','done'];
    document.querySelectorAll('.kanban-card').forEach(card=>{
      card.addEventListener('dragstart',e=>{ e.dataTransfer.setData('pid',card.dataset.pid); card.style.opacity='.4'; });
      card.addEventListener('dragend',()=>{ card.style.opacity=''; });
      // Accessibilité clavier — équivalent du drag&drop : ← / → déplace la carte
      // d'une colonne, Entrée/Espace ouvre la timeline pour une action plus fine.
      card.addEventListener('keydown',e=>{
        const p = db.projects.find(x=>x.id===card.dataset.pid);
        if(!p) return;
        const curIdx = KANBAN_STATUSES.indexOf(p.status);
        if(e.key==='ArrowRight' && curIdx<KANBAN_STATUSES.length-1){
          e.preventDefault();
          moveProjectToStatus(p, KANBAN_STATUSES[curIdx+1]);
          toast('Déplacé vers : '+({pending:'En attente',in_progress:'En cours',done:'Terminé'}[KANBAN_STATUSES[curIdx+1]]),'success');
          refreshAdminTab();
        } else if(e.key==='ArrowLeft' && curIdx>0){
          e.preventDefault();
          moveProjectToStatus(p, KANBAN_STATUSES[curIdx-1]);
          toast('Déplacé vers : '+({pending:'En attente',in_progress:'En cours',done:'Terminé'}[KANBAN_STATUSES[curIdx-1]]),'success');
          refreshAdminTab();
        }
      });
    });
    document.querySelectorAll('.kanban-col').forEach(col=>{
      col.addEventListener('dragover',e=>{ e.preventDefault(); col.style.background='rgba(255,255,255,.05)'; });
      col.addEventListener('dragleave',()=>{ col.style.background=''; });
      col.addEventListener('drop',e=>{
        e.preventDefault(); col.style.background='';
        const pid = e.dataTransfer.getData('pid');
        const p = db.projects.find(x=>x.id===pid);
        if(!p) return;
        moveProjectToStatus(p, col.dataset.status);
        toast('Statut mis à jour.','success'); refreshAdminTab();
      });
    });

    const btnNew = document.getElementById('btn-new-project');
    if(btnNew) btnNew.addEventListener('click',openCreateProjectModal);

    // F13 — Unarchive / delete archived
    document.querySelectorAll('.btn-unarchive').forEach(b=>{
      b.addEventListener('click',()=>{
        const p=db.projects.find(x=>x.id===b.dataset.pid);
        if(!p) return;
        p.archived=false;
        logActivity('project_unarchived','Projet restauré : '+p.name);
        saveDB(); toast('Projet restauré !','success'); refreshAdminTab();
      });
    });
    document.querySelectorAll('.btn-del-archived').forEach(b=>{
      b.addEventListener('click',()=>{
        const p=db.projects.find(x=>x.id===b.dataset.pid);
        if(!p) return;
        confirmAction('Supprimer définitivement "'+p.name+'" ?', ()=>{
          logActivity('project_deleted','Projet archivé supprimé : '+p.name);
          db.projects=db.projects.filter(x=>x.id!==b.dataset.pid);
          db.documents=db.documents.filter(d=>d.projectId!==b.dataset.pid);
          saveDB(); toast('Projet supprimé.','info'); refreshAdminTab();
        }, {label:'Supprimer'});
      });
    });
  }

        document.querySelectorAll('#np-steps .np-step-label').forEach(inp=>{ const label=inp.value.trim(); if(label) steps.push({id:uid(),label,status:'pending',date:null,note:''}); });

        if(clientId) db.projects.forEach(p=>{ if(p.clientId===clientId) p.clientId=null; });

        db.projects.push({id:uid(),name,clientId,description:desc||'',websiteUrl:url||'',dueDate:due||'',status:'in_progress',color,tags,createdAt:new Date().toISOString().slice(0,10),timeline:steps,priority,pinned:false,internalTasks:[]});
        logActivity('project_created', 'Projet créé : ' + name);
        saveDB(); toast('Projet créé !','success'); closeModal(); refreshAdminTab();
      });
    });

  function exportUsersCSV(){
    const rows = [['ID','Username','Prénom','Nom','Email','Rôle','Projet','Créé le']];
    db.users.forEach(u=>{

      rows.push([u.id, u.username, u.firstName||'', u.lastName||'', u.email||'', u.role, p?p.name:'', u.createdAt||'']);
    });
    const csv = rows.map(r=>r.map(v=>'"'+String(v).replace(/"/g,'""')+'"').join(',')).join('\n');

  function wireAdminUsers(){
    const btnNew = document.getElementById('btn-new-user');

    if(btnCSV) btnCSV.addEventListener('click',exportUsersCSV);

    });
    document.querySelectorAll('.btn-del-user').forEach(b=>{
      b.addEventListener('click',()=>confirmDeleteUser(b.dataset.uid));
    });

    // Pagination — n'affiche que PAGE_SIZE résultats correspondant aux filtres à la fois,
    // pour éviter de garder des centaines de cartes utilisateur rendues simultanément.
    const PAGE_SIZE = 25;
    let activeRoleFilter = '';
    let visibleCount = PAGE_SIZE;
    function applyUserFilters(){
      const q = (document.getElementById('user-search')?.value||'').toLowerCase();
      const allWraps = Array.from(document.querySelectorAll('#users-list .user-card-wrap'));
      const matching = allWraps.filter(wrap=>{
        const uid = wrap.dataset.uid;
        const u = db.users.find(x=>x.id===uid);
        if(!u) return false;
        const hay = `${u.username} ${u.firstName||''} ${u.lastName||''} ${u.email||''} ${u.role}`.toLowerCase();
        return hay.includes(q) && (activeRoleFilter==='' || u.role===activeRoleFilter);
      });
      allWraps.forEach(w=>w.style.display='none');
      matching.slice(0, visibleCount).forEach(w=>w.style.display='');
      const pag = document.getElementById('users-pagination');
      if(pag){
        const remaining = matching.length - visibleCount;
        pag.innerHTML = remaining>0
          ? `<button id="btn-users-more" class="btn btn-ghost btn-sm">Voir ${Math.min(remaining,PAGE_SIZE)} de plus (${remaining} restant${remaining>1?'s':''})</button>`
          : matching.length>PAGE_SIZE ? `<span style="font-size:.75rem;color:var(--ink-4);">${matching.length} résultat(s) affiché(s)</span>` : '';
        const moreBtn = document.getElementById('btn-users-more');
        if(moreBtn) moreBtn.addEventListener('click',()=>{ visibleCount+=PAGE_SIZE; applyUserFilters(); });
      }
    }

    const searchInput = document.getElementById('user-search');
    if(searchInput) searchInput.addEventListener('input', ()=>{ visibleCount=PAGE_SIZE; applyUserFilters(); });

    document.querySelectorAll('.role-chip').forEach(chip=>{
      chip.addEventListener('click',()=>{
        document.querySelectorAll('.role-chip').forEach(c=>c.classList.remove('active'));
        chip.classList.add('active');
        activeRoleFilter = chip.dataset.role;
        visibleCount = PAGE_SIZE;
        applyUserFilters();
      });
    });

    applyUserFilters();
  }

  function wireAdminDocuments(){
    // Kebab menu toggle — portail body pour échapper à tous les containing blocks
    document.querySelectorAll('.kebab-btn').forEach(btn=>{
      btn.addEventListener('click',(e)=>{
        e.stopPropagation();
        const pid = btn.dataset.pid;
        const menu = document.getElementById('kebab-'+pid);
        if(!menu) return;
        const isOpen = menu.classList.contains('open');
        // Fermer tout menu ouvert
        document.querySelectorAll('.kebab-menu.open').forEach(m=>m.classList.remove('open'));
        if(!isOpen){
          const rect = btn.getBoundingClientRect();
          // Positionner en dessous du bouton, aligné à droite
          const top   = rect.bottom + 6;
          const right = window.innerWidth - rect.right;
          menu.style.top   = top + 'px';
          menu.style.right = right + 'px';
          menu.style.left  = 'auto';
          menu.style.bottom = 'auto';
          menu.classList.add('open');
          // Clamp : si dépasse en bas → afficher au-dessus du bouton
          requestAnimationFrame(()=>{
            const mRect = menu.getBoundingClientRect();
            if(mRect.bottom > window.innerHeight - 8){
              menu.style.top = (rect.top - mRect.height - 6) + 'px';
            }
            // Clamp : si dépasse à droite → décaler à gauche
            if(mRect.left < 8){
              menu.style.right = 'auto';
              menu.style.left  = '8px';
            }
          });
        }
      });
    });
    if(!window._kebabCloseWired){
      window._kebabCloseWired = true;
      document.addEventListener('click',()=>document.querySelectorAll('.kebab-menu.open').forEach(m=>m.classList.remove('open')));
    }

    document.querySelectorAll('.btn-pin-project').forEach(b=>{
      b.addEventListener('click',()=>{
        const p=db.projects.find(x=>x.id===b.dataset.pid);
        if(!p) return;
        p.pinned=!p.pinned;
        saveDB(); toast(p.pinned?'Projet épinglé 📌':'Projet désépinglé.','info'); refreshAdminTab();
      });
    });
    document.querySelectorAll('.btn-manage-tasks').forEach(b=>{
      b.addEventListener('click',()=>openManageTasksModal(b.dataset.pid));
    });
    document.querySelectorAll('.btn-extract-tasks').forEach(b=>{
      b.addEventListener('click',()=>{
        const p = db.projects.find(x=>x.id===b.dataset.pid);
        if (!p) return;
        const textSources = [
          p.description||'', p.name,
          ...db.documents.filter(d=>d.projectId===p.id&&d.status==='filled').flatMap(d=>d.fields.map(f=>f.value||''))
        ];
        const extracted = extractTasksFromText(textSources.join('\n'));
        if (!extracted.length) { toast('Aucune tâche détectée. Ajoutez une description au projet.','info'); return; }
        showModal(`
          <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;">
            <h2 style="font-size:1rem;font-weight:700;">✨ Tâches extraites automatiquement</h2>

          </div>
          <p style="font-size:.82rem;color:var(--ink-3);margin-bottom:14px;">Sélectionnez les tâches à ajouter à <strong>${esc(p.name)}</strong> :</p>
          ${extracted.map((t,i)=>`<label style="display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:8px;border:1px solid rgba(255,255,255,.07);background:rgba(255,255,255,.03);margin-bottom:6px;cursor:pointer;"><input type="checkbox" id="et-${i}" checked style="accent-color:var(--coral);" /><span style="font-size:.84rem;">${esc(t)}</span></label>`).join('')}

        const tl = p.timeline||[];

        const docs = getProjectDocs(p.id);
        const docsDone = docs.filter(d=>d.status==='reviewed').length;
        const docsPending = docs.filter(d=>d.status==='pending').length;
        const now = new Date();
        const dueDiff = p.dueDate ? Math.ceil((new Date(p.dueDate)-now)/(1000*60*60*24)) : null;
        const dueTxt = dueDiff===null ? 'Non définie' : dueDiff>0 ? `Dans ${dueDiff} jour(s) (${p.dueDate})` : `Dépassée de ${Math.abs(dueDiff)} jour(s)`;

RÉSUMÉ D'AVANCEMENT — ${p.name.toUpperCase()}
Généré le ${now.toLocaleDateString('fr-FR', {day:'2-digit',month:'long',year:'numeric'})}
═══════════════════════════════════

CLIENT        : ${(u.firstName||'')+' '+(u.lastName||'')||u.username} (@${u.username})
STATUT        : ${{pending:'En attente',active:'En cours',done:'Terminé',paused:'En pause'}[p.status]||p.status}
AVANCEMENT    : ${pct}% (${done}/${tl.length} étapes)
ÉCHÉANCE      : ${dueTxt}

ÉTAPES TERMINÉES
${etapesDone}

ÉTAPES EN COURS / À VENIR
${etapesPending}

DOCUMENTS
  Total : ${docs.length}  |  Validés : ${docsDone}  |  En attente : ${docsPending}

═══════════════════════════════════`;

    function applyDocFilters(){
      const q = (document.getElementById('doc-search')?.value||'').toLowerCase();
      const statusF = document.getElementById('doc-filter-status')?.value||'';
      const prioF   = document.getElementById('doc-filter-prio')?.value||'';
      document.querySelectorAll('.client-doc-panel-wrap').forEach(wrap=>{
        const uid = wrap.dataset.uid;
        const u = db.users.find(x=>x.id===uid);
        if(!u){ wrap.style.display='none'; return; }
        const project = getUserProject(u.id);
        const hay = `${u.username} ${u.firstName||''} ${u.lastName||''} ${project?project.name:''}`.toLowerCase();
        const matchQ = !q || hay.includes(q);
        let matchStatus = true;
        if(statusF && project){
          const docs = getProjectDocs(project.id);
          if(statusF==='nodoc') matchStatus = docs.length===0;
          else matchStatus = docs.some(d=>d.status===statusF);
        } else if(statusF) { matchStatus = false; }
        let matchPrio = !prioF || (project&&(project.priority||'normal')===prioF);
        wrap.style.display = (matchQ&&matchStatus&&matchPrio) ? '' : 'none';
      });
    }
    document.getElementById('doc-search')?.addEventListener('input', applyDocFilters);
    document.getElementById('doc-filter-status')?.addEventListener('change', applyDocFilters);
    document.getElementById('doc-filter-prio')?.addEventListener('change', applyDocFilters);
  }

  function wireAdminProfile(){
    const btnTheme = document.getElementById('btn-toggle-theme');
    if(btnTheme) btnTheme.addEventListener('click',()=>{
      const current = localStorage.getItem('flow_theme')||'dark';
      const next = current==='dark'?'light':'dark';
      localStorage.setItem('flow_theme', next);
      applyTheme();
      refreshAdminTab();
    });
    document.getElementById('p-save').addEventListener('click',()=>{
      const fn=document.getElementById('p-fn').value.trim();
      const ln=document.getElementById('p-ln').value.trim();
      const un=document.getElementById('p-un').value.trim();
      const em=document.getElementById('p-em').value.trim();
      const np=document.getElementById('p-np').value;
      const cp=document.getElementById('p-cp').value;
      const ph=document.getElementById('p-ph').value.trim();
      const discord=(document.getElementById('p-discord')||{value:''}).value.trim();
      const msg=document.getElementById('p-msg');

      if(!un){ showMsg(msg,'Le pseudo est requis.','error'); return; }
      if(db.users.some(u=>u.username.toLowerCase()===un.toLowerCase()&&u.id!==me.id)){
        showMsg(msg,'Ce pseudo est déjà utilisé.','error'); return;
      }
      if(np && np!==cp){ showMsg(msg,'Les mots de passe ne correspondent pas.','error'); return; }

      const u = db.users.find(u=>u.id===me.id);
      u.firstName=fn; u.lastName=ln; u.username=un; u.email=em; u.photo=ph||null; u.discordWebhook=discord||'';
      const applyProfileSave=()=>{ me=u; saveDB(); toast('Profil mis à jour !','success'); showMsg(msg,'Profil mis à jour avec succès !','success'); document.getElementById('app').innerHTML=renderAdminShell(); wireAdmin(); };
      if(np){ hashPwdSalted(np).then(h=>{ u.password=h; applyProfileSave(); }); } else { applyProfileSave(); }
    });

    // Sauvegarde & Restauration — export/import JSON complet de la base
    const btnExportJson = document.getElementById('btn-export-json');
    if(btnExportJson) btnExportJson.addEventListener('click',()=>{
      try{
        const payload = { exportedAt:new Date().toISOString(), appVersion:APP_VERSION, db };
        const blob = new Blob([JSON.stringify(payload,null,2)], {type:'application/json'});
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'flow_backup_'+new Date().toISOString().slice(0,10)+'.json';
        document.body.appendChild(a); a.click(); a.remove();
        URL.revokeObjectURL(url);
        logActivity('backup_exported','Sauvegarde JSON exportée par '+me.username);
        toast('Sauvegarde exportée ✓','success');
      }catch(e){ toast('Erreur lors de l\'export.','error'); }
    });

    const importInput = document.getElementById('btn-import-json');
    if(importInput) importInput.addEventListener('change',()=>{
      const file = importInput.files[0];
      const msg = document.getElementById('import-msg');
      if(!file || !msg) return;
      if(!file.name.endsWith('.json')){ showMsg(msg,'Seuls les fichiers .json sont acceptés.','error'); return; }
      const reader = new FileReader();
      reader.onload = e=>{
        let parsed;
        try{ parsed = JSON.parse(e.target.result); }
        catch(_){ showMsg(msg,'Fichier JSON invalide.','error'); return; }
        const candidate = parsed && parsed.db ? parsed.db : parsed;
        if(!candidate || !Array.isArray(candidate.users) || !Array.isArray(candidate.projects)){
          showMsg(msg,'Structure de fichier non reconnue — restauration annulée.','error'); return;
        }
        confirmAction('Remplacer toutes les données actuelles par celles de ce fichier ? Cette action est irréversible.', ()=>{
          db = candidate;
          normalizeDB();
          logActivity('backup_imported','Sauvegarde JSON importée par '+me.username);
          saveDB();
          toast('Sauvegarde restaurée ✓','success');
          document.getElementById('app').innerHTML=renderAdminShell(); wireAdmin();
        }, {label:'Restaurer', danger:true});
      };
      reader.onerror = ()=>showMsg(msg,'Erreur de lecture du fichier.','error');
      reader.readAsText(file,'UTF-8');
      importInput.value='';
    });
  }

  function showMsg(el, text, type){
    el.style.display='block';
    el.textContent=text;
    el.style.background=type==='success'?'rgba(147,181,148,.15)':'rgba(239,68,68,.15)';
    el.style.border=`1px solid ${type==='success'?'rgba(147,181,148,.3)':'rgba(239,68,68,.3)'}`;
    el.style.color=type==='success'?'#93b594':'#e08680';
  }

  function renderClientTab(){
    if(activeTab==='home')         return renderClientHome();
    if(activeTab==='documents')    return renderClientDocuments();
    if(activeTab==='discussion')   return renderClientDiscussion();
    if(activeTab==='profile')      return renderClientProfile();
    return '';
  }

  function wireClient(){
    document.querySelectorAll('[data-tab]').forEach(btn=>{
      btn.addEventListener('click',()=>{ activeTab=btn.dataset.tab; refreshClientTab(); });
    });
    document.getElementById('btn-logout').addEventListener('click',logout);
    wireClientTabContent();
  }

  let _clientTabTimer = null;
  function refreshClientTab(immediate){
    if(immediate){ _doRefreshClientTab(); return; }
    clearTimeout(_clientTabTimer);
    _clientTabTimer = setTimeout(_doRefreshClientTab, 80);
  }
  function _doRefreshClientTab(){
    try{
      normalizeDB();
      document.querySelectorAll('[data-tab]').forEach(b=>b.classList.toggle('active',b.dataset.tab===activeTab));
      const c=document.getElementById('tab-content');
      c.innerHTML=renderClientTab();
      c.classList.remove('fade-up');
      requestAnimationFrame(()=>requestAnimationFrame(()=>c.classList.add('fade-up')));
      wireClientTabContent();
    }catch(err){ const c=document.getElementById('tab-content'); if(c) c.innerHTML=renderErrorBox(err); }
  }

  function wireClientTabContent(){
    if(activeTab==='home')         wireClientHome();
    if(activeTab==='documents')    wireClientDocuments();
    if(activeTab==='discussion'){ wireClientDiscussionQA(); const m=document.getElementById('qa-messages'); if(m) m.scrollTop=m.scrollHeight; }
    if(activeTab==='profile')      wireClientProfile();
    renderMobileTabbar('client');
  }

  // ─── Client: Home ───────────────────────────────
  function renderClientHome(){
    const projects = getUserProjects(me.id);

    if(!window._clientActiveProjectId || !projects.find(p=>p.id===window._clientActiveProjectId)){

    // F12 — Welcome message

      <div style="font-size:.78rem;font-weight:600;color:var(--sky);letter-spacing:.05em;margin-bottom:6px;">MESSAGE DE VOTRE ÉQUIPE</div>
      <div style="font-size:.9rem;color:var(--ink-2);line-height:1.5;">${esc(project.welcomeMessage)}</div>
    </div>` : '';

    return `<div class="fade-up">
      <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:4px;flex-wrap:wrap;">
        <h1 style="font-size:1.4rem;font-weight:700;">Bonjour, ${esc(me.firstName||me.username)} 👋</h1>
        <div style="display:flex;gap:8px;">
          <button id="btn-client-notifs" class="btn btn-ghost btn-sm" style="position:relative;" title="Notifications">🔔${(()=>{ const c=unreadNotificationCount(me.id,me.role); return c>0?` <span style="font-size:.62rem;background:rgba(220,80,80,.9);color:#fff;border-radius:999px;padding:0 5px;margin-left:3px;">${c>9?'9+':c}</span>`:''; })()}</button>
          ${project?`<button id="btn-client-pdf" class="btn btn-ghost btn-sm" title="Télécharger mon résumé PDF">${project.status==='done'?'📜 Bilan de fin de projet':'📄 Mon résumé'}</button>`:''}

      ${(()=>{
        if(!project || project.status!=='done') return '';
        const existingReview = (db.reviews||[]).find(r=>r.projectId===project.id && r.clientId===me.id);
        if(existingReview){
          return `<div class="glass-card" style="padding:20px;margin-top:16px;border-color:rgba(147,181,148,.25);">
            <h2 style="font-size:.95rem;font-weight:600;margin-bottom:10px;color:var(--sage);">⭐ Votre avis</h2>

            ${existingReview.comment?`<div style="font-size:.85rem;color:var(--ink-3);line-height:1.5;">"${esc(existingReview.comment)}"</div>`:''}
            <div style="font-size:.7rem;color:var(--ink-4);margin-top:8px;">Merci pour votre retour, envoyé le ${new Date(existingReview.createdAt).toLocaleDateString('fr-FR')}.</div>
          </div>`;
        }
        return `<div class="glass-card" style="padding:20px;margin-top:16px;border-color:rgba(217,119,87,.22);">
          <h2 style="font-size:.95rem;font-weight:600;margin-bottom:6px;color:var(--coral-soft);">🎉 Projet terminé — votre avis compte</h2>
          <p style="font-size:.82rem;color:var(--ink-3);margin-bottom:14px;">Une minute pour nous dire comment s'est passée la collaboration ?</p>
          <div id="review-stars" style="display:flex;gap:6px;margin-bottom:14px;font-size:1.6rem;cursor:pointer;">

      ${project&&project.faq&&project.faq.length>0?`

        ${project.faq.map((f,i)=>`

  function openClientNotificationsModal(){

    showModal(`
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;">
        <h2 style="font-size:1.05rem;font-weight:700;">🔔 Notifications</h2>
        <button onclick="closeModal()" class="btn btn-ghost btn-sm">✕</button>

      ${notifs.length===0

                  <div style="font-size:.84rem;font-weight:600;">${esc(n.title)}</div>
