<html lang="fr">
<head>
  <meta charset="UTF-8" />

  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js" defer></script>
    <style>
/* ═══════════════════════════════════════════════
       FLOW — Claude.ai aesthetic × Liquid Glass
       v3 — refined surfaces, paper background,
       proper specular highlights, confident type.
       ─────────────────────────────────────────────── */

    :root {
      /* Warm Claude.ai ink palette — dark mode default */
      --bg-0:           #15100b;
      --bg-1:           #1c140f;
      --bg-paper:       #1a130e;
      --ink:            #f5ece0;
      --ink-2:          rgba(245,236,224,.70);
      --ink-3:          rgba(245,236,224,.46);
      --ink-4:          rgba(245,236,224,.28);
      --ink-5:          rgba(245,236,224,.14);

      /* Claude coral — the signature warm orange */
      --coral:          #d97757;
      --coral-soft:     #ecb29c;
      --coral-deep:     #b85638;
      --coral-glow:     rgba(217,119,87,.42);

      /* Supporting accents */
      --sage:           #93b594;
      --sky:            #9bb8d8;
      --peach:          #f0a988;
      --plum:           #c4a3d4;

      /* Liquid glass — dark */
      --glass-bg:       rgba(255,250,242,.045);
      --glass-bg-hi:    rgba(255,250,242,.085);
      --glass-bg-strong:rgba(255,250,242,.13);
      --glass-edge:     rgba(255,250,242,.10);
      --glass-edge-hi:  rgba(255,250,242,.22);
      --glass-edge-lo:  rgba(0,0,0,.18);

      /* Specular highlight gradient (top sheen of glass) */
      --glass-spec:
        linear-gradient(
          180deg,
          rgba(255,255,255,.22)  0%,
          rgba(255,255,255,.06)  18%,
          rgba(255,255,255,0)    42%,
          rgba(255,255,255,0)    78%,
          rgba(255,255,255,.05) 100%
        );

      /* Card chroma rim (subtle warm glow at edges) */
      --glass-rim:
        radial-gradient(
          120% 80% at 50% -10%,
          rgba(217,119,87,.18) 0%,
          rgba(217,119,87,0)   55%
        );

      /* Soft elevation shadows */
      --shadow-sm: 0 2px 8px rgba(0,0,0,.18);
      --shadow-md: 0 10px 32px -10px rgba(0,0,0,.45), 0 2px 6px -2px rgba(0,0,0,.22);
      --shadow-lg: 0 24px 60px -16px rgba(0,0,0,.60), 0 6px 16px -4px rgba(0,0,0,.30);
      --shadow-xl: 0 40px 96px -20px rgba(0,0,0,.70), 0 10px 28px -6px rgba(0,0,0,.35);

      --radius-sm: 12px;
      --radius:    18px;
      --radius-lg: 22px;
      --radius-xl: 28px;
    }

    /* ─── Light theme (Claude.ai cream paper) ─── */
    :root[data-theme="light"] {
      --bg-0:           #f7f0e3;
      --bg-1:           #f1e8d6;
      --bg-paper:       #faf4e8;
      --ink:            #1c160f;
      --ink-2:          rgba(28,22,15,.70);
      --ink-3:          rgba(28,22,15,.50);
      --ink-4:          rgba(28,22,15,.32);
      --ink-5:          rgba(28,22,15,.14);

      --glass-bg:       rgba(255,253,247,.50);
      --glass-bg-hi:    rgba(255,253,247,.72);
      --glass-bg-strong:rgba(255,253,247,.88);
      --glass-edge:     rgba(28,22,15,.10);
      --glass-edge-hi:  rgba(28,22,15,.18);
      --glass-edge-lo:  rgba(255,255,255,.70);

      --glass-spec:
        linear-gradient(
          180deg,
          rgba(255,255,255,.65)  0%,
          rgba(255,255,255,.18)  22%,
          rgba(255,255,255,0)    50%,
          rgba(255,255,255,0)    80%,
          rgba(255,255,255,.20) 100%
        );

      --glass-rim:
        radial-gradient(
          120% 80% at 50% -10%,
          rgba(217,119,87,.20) 0%,
          rgba(217,119,87,0)   55%
        );

      --shadow-sm: 0 2px 6px rgba(80,55,30,.10);
      --shadow-md: 0 10px 28px -10px rgba(80,55,30,.20), 0 2px 6px -2px rgba(80,55,30,.10);
      --shadow-lg: 0 22px 52px -16px rgba(80,55,30,.28), 0 6px 14px -4px rgba(80,55,30,.14);
      --shadow-xl: 0 36px 80px -20px rgba(80,55,30,.32), 0 10px 24px -6px rgba(80,55,30,.16);
    }

    /* ─── Reset & base ─── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    html { scroll-behavior: auto; }

    body {
      font-family: 'Geist', ui-sans-serif, -apple-system, sans-serif;
      font-feature-settings: "ss01", "cv11";
      background: var(--bg-0);
      color: var(--ink);
      min-height: 100vh;
      overflow-x: hidden;
      overscroll-behavior: none;
      letter-spacing: -0.005em;
      font-size: 15px;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      text-rendering: optimizeLegibility;
    }

    /* ─── Typography — Claude.ai confident serif ─── */
    h1, h2, h3 {
      font-family: 'Instrument Serif', 'Geist', serif;
      font-weight: 400 !important;
      letter-spacing: -0.018em;
      line-height: 1.05;
      color: var(--ink);
      text-wrap: balance;
    }
    h1 { font-size: 2.35rem !important; letter-spacing: -0.022em; }
    h2 { font-size: 1.5rem !important; letter-spacing: -0.016em; line-height: 1.15; }
    h3 { font-size: 1.15rem !important; }

    button, input, select, textarea { font-family: inherit; color: inherit; }
    a { color: inherit; }

    /* ═══════════════════════════════════════════════
       BACKGROUND — Painted aurora over Claude paper
       Multi-layer: base wash + drifting orbs + vignette + grain
       ═══════════════════════════════════════════════ */
    #bg-canvas {
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background:
        /* Top-left coral wash */
        radial-gradient(ellipse 70% 55% at 8% -8%,    rgba(217,119,87,.32) 0%, transparent 58%),
        /* Top-right peach */
        radial-gradient(ellipse 55% 50% at 96% 8%,    rgba(240,169,136,.24) 0%, transparent 58%),
        /* Mid sky band */
        radial-gradient(ellipse 70% 38% at 80% 48%,   rgba(155,184,216,.14) 0%, transparent 60%),
        /* Bottom sage glow */
        radial-gradient(ellipse 80% 55% at 50% 115%,  rgba(147,181,148,.18) 0%, transparent 65%),
        /* Left plum mist */
        radial-gradient(ellipse 50% 45% at -5% 78%,   rgba(196,163,212,.12) 0%, transparent 60%),
        var(--bg-0);
      overflow: hidden;
    }
    :root[data-theme="light"] #bg-canvas {
      background:
        radial-gradient(ellipse 70% 55% at 8% -8%,    rgba(217,119,87,.26) 0%, transparent 58%),
        radial-gradient(ellipse 55% 50% at 96% 8%,    rgba(240,169,136,.30) 0%, transparent 58%),
        radial-gradient(ellipse 70% 38% at 80% 48%,   rgba(155,184,216,.18) 0%, transparent 60%),
        radial-gradient(ellipse 80% 55% at 50% 115%,  rgba(147,181,148,.22) 0%, transparent 65%),
        radial-gradient(ellipse 50% 45% at -5% 78%,   rgba(196,163,212,.16) 0%, transparent 60%),
        var(--bg-0);
    }

    /* Painterly drifting orbs — three layers for depth */
    .orb {
      position: fixed; z-index: 0;
      border-radius: 50%;
      filter: blur(120px) saturate(140%);
      pointer-events: none;
      will-change: transform;
      mix-blend-mode: screen;
    }
    :root[data-theme="light"] .orb { mix-blend-mode: multiply; opacity: .55; }
    .orb-1 {
      width: 560px; height: 560px;
      background: radial-gradient(circle, rgba(217,119,87,.55) 0%, transparent 70%);
      top: -180px; left: 18%;
      animation: drift1 42s ease-in-out infinite;
    }
    .orb-2 {
      width: 480px; height: 480px;
      background: radial-gradient(circle, rgba(240,169,136,.45) 0%, transparent 70%);
      bottom: -140px; right: 12%;
      animation: drift2 52s ease-in-out infinite;
    }
    .orb-3 {
      width: 420px; height: 420px;
      background: radial-gradient(circle, rgba(155,184,216,.32) 0%, transparent 70%);
      top: 35%; right: -120px;
      animation: drift3 48s ease-in-out infinite;
    }


    @keyframes drift1 {
      0%,100% { transform: translate(0,0) scale(1); }
      33%     { transform: translate(90px,60px) scale(1.10); }
      66%     { transform: translate(-50px,90px) scale(.92); }
    }
    @keyframes drift2 {
      0%,100% { transform: translate(0,0) scale(1); }
      40%     { transform: translate(-70px,-50px) scale(1.08); }
      75%     { transform: translate(40px,-90px) scale(.95); }
    }
    @keyframes drift3 {
      0%,100% { transform: translate(0,0) scale(1); }
      50%     { transform: translate(-120px,40px) scale(1.12); }
    }


    /* Vignette — gentle darken at edges to focus center */
    #bg-vignette {
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background:
        radial-gradient(ellipse 110% 85% at 50% 45%,
          transparent 55%,
          rgba(15,9,5,.18) 88%,
          rgba(15,9,5,.32) 100%);
    }
    :root[data-theme="light"] #bg-vignette {
      background:
        radial-gradient(ellipse 110% 85% at 50% 45%,
          transparent 55%,
          rgba(80,55,30,.08) 88%,
          rgba(80,55,30,.14) 100%);
    }

    /* Paper grain overlay */
    body::before {
      content: ''; position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background-image:
        radial-gradient(circle at 1px 1px, rgba(255,255,255,.030) 1px, transparent 0);
      background-size: 3px 3px;
      opacity: .85;
      mix-blend-mode: overlay;
    }
    :root[data-theme="light"] body::before {
      background-image:
        radial-gradient(circle at 1px 1px, rgba(80,55,30,.05) 1px, transparent 0);
      mix-blend-mode: multiply;
      opacity: .65;
    }
    /* Subtle horizontal light band, like a soft skylight */
    body::after {
      content: ''; position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background: linear-gradient(180deg,
        rgba(255,240,220,.06) 0%,
        transparent 18%,
        transparent 78%,
        rgba(20,12,8,.18) 100%);
    }
    :root[data-theme="light"] body::after {
      background: linear-gradient(180deg,
        rgba(255,250,238,.40) 0%,
        transparent 18%,
        transparent 78%,
        rgba(80,55,30,.06) 100%);
    }

    /* ═══════════════════════════════════════════════
       LIQUID GLASS — surfaces with true specular sheen
       ═══════════════════════════════════════════════ */
    .glass,
    .glass-dark,
    .glass-card,
    .modal-box,
    .login-card,
    #sidebar,
    #mobile-tabbar {
      position: relative;
    }

    .glass {
      background: var(--glass-bg-hi);
      backdrop-filter: blur(26px) saturate(190%);
      -webkit-backdrop-filter: blur(26px) saturate(190%);
      border: 1px solid var(--glass-edge);
      border-radius: var(--radius-lg);
      box-shadow:
        inset 0 1px 0 var(--glass-edge-hi),
        inset 0 -1px 0 var(--glass-edge-lo),
        var(--shadow-lg);
    }

    .glass-dark {
      background: rgba(20,12,8,.52);
      backdrop-filter: blur(24px) saturate(160%);
      -webkit-backdrop-filter: blur(24px) saturate(160%);
      border: 1px solid rgba(255,250,242,.08);
      box-shadow:
        inset 0 1px 0 rgba(255,250,242,.12),
        inset 0 -1px 0 rgba(0,0,0,.20),
        var(--shadow-md);
      will-change: transform;
    }
    :root[data-theme="light"] .glass-dark {
      background: rgba(255,253,247,.72);
      border-color: rgba(28,22,15,.08);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,.80),
        inset 0 -1px 0 rgba(28,22,15,.04),
        var(--shadow-md);
    }

    .glass-card {
      background: var(--glass-bg);
      contain: layout style paint;
      backdrop-filter: blur(12px) saturate(160%);
      -webkit-backdrop-filter: blur(12px) saturate(160%);
      border: 1px solid var(--glass-edge);
      border-radius: var(--radius-lg);
      box-shadow:
        inset 0 1px 0 var(--glass-edge-hi),
        inset 0 -1px 0 var(--glass-edge-lo),
        var(--shadow-md);
      transition:
        border-color .2s ease,
        box-shadow .25s ease,
        transform .2s cubic-bezier(.2,.7,.2,1);
      overflow: hidden;
      transform: translateZ(0);
    }
    /* Top specular sheen */
    .glass-card::before {
      content: ''; position: absolute; inset: 0; border-radius: inherit;
      background: var(--glass-spec);
      pointer-events: none;
      opacity: .9;
      z-index: 0;
    }
    /* Warm chromatic rim glow */
    .glass-card::after {
      content: ''; position: absolute; inset: 0; border-radius: inherit;
      background: var(--glass-rim);
      pointer-events: none;
      opacity: 0;
      transition: opacity .35s ease;
      z-index: 0;
      mix-blend-mode: screen;
    }
    .glass-card > * { position: relative; z-index: 1; }
    .glass-card:hover {
      border-color: var(--glass-edge-hi);
      box-shadow:
        inset 0 1px 0 var(--glass-edge-hi),
        inset 0 -1px 0 var(--glass-edge-lo),
        0 18px 48px -14px rgba(0,0,0,.55),
        0 4px 12px -4px var(--coral-glow);
      transform: translateY(-1px);
    }
    .glass-card:hover::after { opacity: 1; }

    .stat-card { padding: 22px 22px 20px; border-radius: var(--radius-lg); }

    /* ═══════════════════════════════════════════════
       INPUTS
       ═══════════════════════════════════════════════ */
    .glass-input {
      background: var(--glass-bg);
      border: 1px solid var(--glass-edge);
      color: var(--ink);
      border-radius: var(--radius-sm);
      padding: 11px 14px;
      width: 100%;
      font-size: .92rem;
      font-family: inherit;
      transition: background .2s, border-color .2s, box-shadow .2s;
      outline: none;
      box-shadow:
        inset 0 1px 0 var(--glass-edge-hi),
        inset 0 -1px 0 var(--glass-edge-lo);
      -webkit-backdrop-filter: blur(12px);
      backdrop-filter: blur(12px);
    }
    .glass-input::placeholder { color: var(--ink-4); }
    .glass-input:hover {
      border-color: var(--glass-edge-hi);
      background: var(--glass-bg-hi);
    }
    .glass-input:focus {
      background: var(--glass-bg-hi);
      border-color: rgba(217,119,87,.55);
      box-shadow:
        inset 0 1px 0 var(--glass-edge-hi),
        0 0 0 4px rgba(217,119,87,.16);
    }
    textarea.glass-input { resize: vertical; min-height: 84px; line-height: 1.5; }
    select.glass-input option { background: #221813; color: var(--ink); }
    :root[data-theme="light"] select.glass-input option { background: #faf4e8; }

    /* ═══════════════════════════════════════════════
       BUTTONS — Claude.ai coral pill
       ═══════════════════════════════════════════════ */
    .btn {
      position: relative;
      display: inline-flex; align-items: center; justify-content: center; gap: 8px;
      padding: 10px 20px;
      border-radius: 999px;
      font-size: .875rem; font-weight: 500;
      font-family: inherit;
      cursor: pointer; border: none; white-space: nowrap;
      overflow: hidden;
      transition:
        transform .15s cubic-bezier(.2,.7,.2,1),
        box-shadow .2s ease,
        background .2s ease,
        border-color .2s ease,
        color .2s ease;
      isolation: isolate;
    }
    .btn:active { transform: translateY(0) scale(.98); }

    .btn-primary {
      background: linear-gradient(180deg, #e58867 0%, #c25a3a 100%);
      color: #1a0e08;
      font-weight: 600;
      letter-spacing: -.003em;
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,.45),
        inset 0 -1px 0 rgba(0,0,0,.18),
        0 6px 20px -4px var(--coral-glow),
        0 2px 6px -1px rgba(0,0,0,.28);
    }
    .btn-primary::before {
      content: ''; position: absolute; inset: 1px; border-radius: inherit;
      background: linear-gradient(180deg, rgba(255,255,255,.32) 0%, rgba(255,255,255,0) 55%);
      pointer-events: none;
      z-index: -1;
    }
    .btn-primary:hover {
      transform: translateY(-1px);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,.5),
        inset 0 -1px 0 rgba(0,0,0,.18),
        0 12px 30px -4px var(--coral-glow),
        0 3px 8px -1px rgba(0,0,0,.30);
    }

    .btn-ghost {
      background: var(--glass-bg-hi);
      border: 1px solid var(--glass-edge);
      color: var(--ink-2);
      backdrop-filter: blur(20px) saturate(160%);
      -webkit-backdrop-filter: blur(20px) saturate(160%);
      box-shadow:
        inset 0 1px 0 var(--glass-edge-hi),
        inset 0 -1px 0 var(--glass-edge-lo),
        var(--shadow-sm);
    }
    .btn-ghost:hover {
      background: var(--glass-bg-strong);
      color: var(--ink);
      border-color: var(--glass-edge-hi);
      transform: translateY(-1px);
    }

    .btn-danger {
      background: rgba(220,80,80,.14);
      border: 1px solid rgba(220,80,80,.32);
      color: #f08a8a;
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,.08),
        var(--shadow-sm);
    }
    .btn-danger:hover {
      background: rgba(220,80,80,.24);
      transform: translateY(-1px);
    }

    .btn-success {
      background: rgba(147,181,148,.18);
      border: 1px solid rgba(147,181,148,.36);
      color: #b6d1b7;
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,.08),
        var(--shadow-sm);
    }
    .btn-success:hover {
      background: rgba(147,181,148,.28);
      transform: translateY(-1px);
    }

    .btn-sm { padding: 6px 13px; font-size: .8rem; }
    .btn:disabled { opacity: .42; cursor: not-allowed; transform: none !important; }

    /* ═══════════════════════════════════════════════
       TABS
       ═══════════════════════════════════════════════ */
    .tab-btn {
      padding: 10px 16px;
      font-size: .875rem; font-weight: 500;
      color: var(--ink-3);
      border-bottom: 2px solid transparent;
      cursor: pointer; transition: all .2s; white-space: nowrap;
      background: transparent;
      border-top: none; border-left: none; border-right: none;
    }
    .tab-btn:hover { color: var(--ink-2); background: var(--glass-bg); }
    .tab-btn.active {
      color: var(--coral);
      border-bottom-color: var(--coral);
      background: rgba(217,119,87,.06);
    }

    /* ═══════════════════════════════════════════════
       BADGES & CHIPS
       ═══════════════════════════════════════════════ */
    .badge {
      display: inline-flex; align-items: center; gap: 4px;
      padding: 3px 11px; border-radius: 999px;
      font-size: .72rem; font-weight: 500;
      letter-spacing: .015em;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }
    .badge-admin      { background: rgba(217,119,87,.18);  color: #ecb29c; border: 1px solid rgba(217,119,87,.34); }
    .badge-controller { background: rgba(155,184,216,.18); color: #c5d6ea; border: 1px solid rgba(155,184,216,.34); }
    .badge-client     { background: rgba(147,181,148,.18); color: #b6d1b7; border: 1px solid rgba(147,181,148,.34); }

    .role-chip {
      padding: 5px 14px;
      border-radius: 999px;
      font-size: .8rem; font-weight: 500;
      background: var(--glass-bg-hi);
      border: 1px solid var(--glass-edge);
      color: var(--ink-3);
      cursor: pointer;
      transition: all .2s;
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
    }
    .role-chip:hover {
      background: var(--glass-bg-strong);
      color: var(--ink-2);
      border-color: var(--glass-edge-hi);
    }
    .role-chip.active {
      background: rgba(217,119,87,.18);
      border-color: rgba(217,119,87,.42);
      color: var(--coral-soft);
      box-shadow: inset 0 1px 0 rgba(255,255,255,.10);
    }
    .prio-urgent { background:rgba(220,80,80,.15);border-color:rgba(220,80,80,.36);color:#f08a8a; }
    .prio-normal { background:rgba(155,184,216,.10);border-color:rgba(155,184,216,.26);color:var(--sky); }
    .prio-low    { background:var(--glass-bg);border-color:var(--glass-edge);color:var(--ink-4); }

    /* Kebab dropdown menu */
    .kebab-wrap { position: relative; }
    .kebab-menu {
      display: none; position: fixed; right: 0; top: 0;
      background: var(--bg-1); border: 1px solid var(--glass-edge-hi);
      border-radius: 14px; padding: 6px; min-width: 180px; z-index: 9999;
      box-shadow: var(--shadow-lg);
      backdrop-filter: blur(24px) saturate(160%);
      -webkit-backdrop-filter: blur(24px) saturate(160%);
    }
    .kebab-menu.open { display: block; }
    .kebab-item {
      display: flex; align-items: center; gap: 9px;
      width: 100%; padding: 8px 12px; border-radius: 9px;
      font-size: .83rem; font-family: inherit; color: var(--ink-2);
      background: transparent; border: none; cursor: pointer;
      transition: background .15s, color .15s; text-align: left;
    }
    .kebab-item:hover { background: var(--glass-bg-hi); color: var(--ink); }
    .kebab-item.kebab-danger { color: #f08a8a; }
    .kebab-item.kebab-danger:hover { background: rgba(220,80,80,.14); color: #f08a8a; }
    .kebab-divider { height: 1px; background: var(--glass-edge); margin: 4px 2px; }
    /* Perf: skip layout/paint of off-screen doc panels */
    .client-doc-panel-wrap { content-visibility: auto; contain-intrinsic-size: 0 320px; }
    /* Perf: GPU layers pour éléments animés */
    .tl-current .tl-dot { will-change: box-shadow; }
    #mobile-tabbar { will-change: transform; transform: translateZ(0); }

    /* ═══════════════════════════════════════════════
       PROFILE GRID
       ═══════════════════════════════════════════════ */
    .profile-grid {
      display: grid;
      grid-template-columns: 280px 1fr;
      gap: 24px; align-items: start;
    }
    @media (max-width: 768px) {
      .profile-grid { grid-template-columns: 1fr; }
    }

    /* ═══════════════════════════════════════════════
       TIMELINE — redesigned beautiful dots
       ═══════════════════════════════════════════════ */
    .tl-step { display: flex; gap: 18px; align-items: flex-start; padding: 8px 0; }
    .tl-line-wrap { display: flex; flex-direction: column; align-items: center; min-width: 40px; }
    .tl-dot {
      width: 40px; height: 40px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; border: 2px solid;
      transition: box-shadow .3s, transform .2s;
      position: relative;
    }
    .tl-connector {
      width: 2px; flex: 1; min-height: 22px; margin: 4px 0; border-radius: 1px;
    }
    /* ── Done ── */
    .tl-done .tl-dot {
      background: linear-gradient(150deg, #4cbe7c 0%, #7ec89a 100%);
      border-color: rgba(147,181,148,.7);
      color: #fff;
      box-shadow: 0 2px 10px rgba(76,190,124,.35), inset 0 1px 0 rgba(255,255,255,.25);
    }
    .tl-done .tl-connector {
      background: linear-gradient(180deg, rgba(76,190,124,.4) 0%, rgba(155,184,216,.15) 100%);
    }
    /* ── Current ── */
    .tl-current .tl-dot {
      background: linear-gradient(150deg, #d97757 0%, #f0a988 100%);
      border-color: rgba(217,119,87,.75);
      color: #fff;
      animation: tl-pulse 2.4s ease-in-out infinite;
      box-shadow: 0 0 0 5px rgba(217,119,87,.14), 0 4px 18px rgba(217,119,87,.45),
                  inset 0 1px 0 rgba(255,255,255,.22);
    }
    @keyframes tl-pulse {
      0%,100% { box-shadow: 0 0 0 4px rgba(217,119,87,.12), 0 4px 14px rgba(217,119,87,.38); }
      50%      { box-shadow: 0 0 0 9px rgba(217,119,87,.18), 0 4px 24px rgba(217,119,87,.55); }
    }
    .tl-current .tl-connector { background: rgba(255,255,255,.08); }
    /* ── Pending ── */
    .tl-pending .tl-dot {
      background: rgba(255,255,255,.04);
      border-color: rgba(255,255,255,.11);
      color: rgba(255,255,255,.24);
    }
    .tl-pending .tl-connector { background: rgba(255,255,255,.06); }

    /* ═══════════════════════════════════════════════
       SIDEBAR — liquid glass rail
       ═══════════════════════════════════════════════ */
    #sidebar {
      position: fixed; left: 16px; top: 16px; bottom: 16px;
      width: 236px;
      z-index: 40;
      display: flex; flex-direction: column;
      padding: 22px 14px;
      background: rgba(24,16,12,.42);
      backdrop-filter: blur(44px) saturate(180%);
      -webkit-backdrop-filter: blur(44px) saturate(180%);
      border: 1px solid rgba(255,250,242,.08);
      border-radius: var(--radius-xl);
      box-shadow:
        inset 0 1px 0 rgba(255,250,242,.14),
        inset 0 -1px 0 rgba(0,0,0,.20),
        var(--shadow-xl);
    }
    :root[data-theme="light"] #sidebar {
      background: rgba(255,253,247,.55);
      border-color: rgba(28,22,15,.08);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,.85),
        inset 0 -1px 0 rgba(28,22,15,.04),
        var(--shadow-xl);
    }
    /* Sidebar top specular sheen */
    #sidebar::before {
      content: ''; position: absolute; inset: 0; border-radius: inherit;
      background: var(--glass-spec);
      pointer-events: none;
      opacity: .55;
    }
    #sidebar > * { position: relative; }

    .nav-item {
      display: flex; align-items: center; gap: 11px;
      padding: 10px 12px;
      border-radius: var(--radius-sm);
      color: var(--ink-3);
      font-size: .885rem; font-weight: 500;
      cursor: pointer;
      transition: background .15s ease, color .15s ease, border-color .15s ease;
      margin-bottom: 2px;
      border: 1px solid transparent;
      background: transparent;
      width: 100%; text-align: left;
      will-change: background, color;
    }
    .nav-item:hover {
      background: var(--glass-bg-hi);
      color: var(--ink);
      border-color: var(--glass-edge);
    }
    .nav-item.active {
      background: rgba(217,119,87,.14);
      color: var(--coral-soft);
      border-color: rgba(217,119,87,.26);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,.10),
        0 1px 2px rgba(217,119,87,.10);
    }
    :root[data-theme="light"] .nav-item.active {
      color: var(--coral-deep);
      background: rgba(217,119,87,.16);
    }
    .nav-icon { width: 18px; height: 18px; opacity: .75; flex-shrink: 0; }
    .nav-item.active .nav-icon { opacity: 1; }

    #main {
      margin-left: 268px;
      min-height: 100vh;
      padding: 32px 36px 56px;
      position: relative;
      z-index: 1;
      max-width: 1480px;
      contain: layout;
    }
    #tab-content {
      contain: layout style;
    }

    /* ═══════════════════════════════════════════════
       LOGO
       ═══════════════════════════════════════════════ */
    .logo {
      font-family: 'Instrument Serif', serif;
      font-size: 1.85rem; font-weight: 400;
      letter-spacing: -.028em;
      color: var(--ink);
      display: inline-flex; align-items: baseline;
      line-height: 1;
    }
    .logo::after {
      content: '·';
      color: var(--coral);
      margin-left: 1px;
      font-size: 1.05em;
      line-height: 0;
    }

    /* ═══════════════════════════════════════════════
       AVATAR
       ═══════════════════════════════════════════════ */
    .avatar {
      width: 36px; height: 36px; border-radius: 50%;
      object-fit: cover;
      background: linear-gradient(135deg, var(--coral-soft), var(--coral-deep));
      display: flex; align-items: center; justify-content: center;
      font-size: .82rem; font-weight: 600; color: #1a0e08;
      flex-shrink: 0;
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,.32),
        inset 0 -1px 0 rgba(0,0,0,.18),
        0 2px 8px rgba(0,0,0,.22);
    }

    /* ═══════════════════════════════════════════════
       MODALS
       ═══════════════════════════════════════════════ */
    #modal-overlay {
      position: fixed; inset: 0; z-index: 100;
      background: rgba(10,6,4,.55);
      backdrop-filter: blur(14px) saturate(140%);
      -webkit-backdrop-filter: blur(14px) saturate(140%);
      display: flex; align-items: center; justify-content: center;
      padding: 24px;
    }
    :root[data-theme="light"] #modal-overlay {
      background: rgba(247,240,227,.45);
    }
    .modal-box {
      background: rgba(34,24,19,.74);
      backdrop-filter: blur(44px) saturate(190%);
      -webkit-backdrop-filter: blur(44px) saturate(190%);
      border: 1px solid rgba(255,250,242,.14);
      border-radius: var(--radius-xl);
      padding: 32px;
      width: 100%; max-width: 480px;
      max-height: 90vh; overflow-y: auto;
      box-shadow:
        inset 0 1px 0 rgba(255,250,242,.20),
        inset 0 -1px 0 rgba(0,0,0,.10),
        var(--shadow-xl);
    }
    :root[data-theme="light"] .modal-box {
      background: rgba(255,253,247,.86);
      border-color: rgba(28,22,15,.10);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,.95),
        inset 0 -1px 0 rgba(28,22,15,.04),
        var(--shadow-xl);
    }
    .modal-box::before {
      content: ''; position: absolute; inset: 0; border-radius: inherit;
      background: var(--glass-spec);
      pointer-events: none;
      opacity: .65;
    }
    .modal-box > * { position: relative; }

    /* ═══════════════════════════════════════════════
       LOGIN PAGE
       ═══════════════════════════════════════════════ */
    #login-page {
      position: fixed; inset: 0; z-index: 50;
      display: flex; align-items: center; justify-content: center; padding: 24px;
    }
    .login-card {
      width: 100%; max-width: 440px;
      background: rgba(34,24,19,.48);
      backdrop-filter: blur(50px) saturate(200%);
      -webkit-backdrop-filter: blur(50px) saturate(200%);
      border: 1px solid rgba(255,250,242,.14);
      border-radius: var(--radius-xl);
      padding: 52px 42px;
      box-shadow:
        inset 0 1px 0 rgba(255,250,242,.24),
        inset 0 -1px 0 rgba(0,0,0,.10),
        var(--shadow-xl);
    }
    :root[data-theme="light"] .login-card {
      background: rgba(255,253,247,.65);
      border-color: rgba(28,22,15,.10);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,.92),
        inset 0 -1px 0 rgba(28,22,15,.04),
        var(--shadow-xl);
    }
    .login-card::before {
      content: ''; position: absolute; inset: 0; border-radius: inherit;
      background: var(--glass-spec);
      pointer-events: none;
      opacity: .70;
    }
    .login-card::after {
      content: ''; position: absolute; inset: 0; border-radius: inherit;
      background: var(--glass-rim);
      pointer-events: none;
      opacity: .85;
      mix-blend-mode: screen;
    }
    .login-card > * { position: relative; }

    /* ═══════════════════════════════════════════════
       SCROLLBAR
       ═══════════════════════════════════════════════ */
    ::-webkit-scrollbar { width: 8px; height: 8px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb {
      background: var(--glass-edge-hi);
      border-radius: 4px;
      border: 2px solid transparent;
      background-clip: padding-box;
    }
    ::-webkit-scrollbar-thumb:hover { background: rgba(217,119,87,.40); background-clip: padding-box; }

    /* ═══════════════════════════════════════════════
       ANIMATIONS
       ═══════════════════════════════════════════════ */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .fade-up { animation: fadeUp .28s cubic-bezier(.2,.8,.3,1) forwards; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    .fade-in { animation: fadeIn .25s ease forwards; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .spin { animation: spin .7s linear infinite; }
    .ai-hist-card { transition: background .18s, border-color .18s, transform .15s; cursor:default; }
    .ai-hist-card:hover { background:rgba(255,255,255,.055)!important; border-color:rgba(255,255,255,.14)!important; transform:translateY(-1px); }
    #discussion-messages::-webkit-scrollbar { width:4px; }
    #discussion-messages::-webkit-scrollbar-track { background:transparent; }
    #discussion-messages::-webkit-scrollbar-thumb { background:rgba(217,119,87,.25); border-radius:99px; }
    #discussion-messages::-webkit-scrollbar-thumb:hover { background:rgba(217,119,87,.45); }
    #qa-messages::-webkit-scrollbar { width:4px; }
    #qa-messages::-webkit-scrollbar-track { background:transparent; }
    #qa-messages::-webkit-scrollbar-thumb { background:rgba(155,184,216,.25); border-radius:99px; }
    #qa-messages::-webkit-scrollbar-thumb:hover { background:rgba(155,184,216,.45); }
    @keyframes qa-dot { 0%,80%,100%{opacity:.2;transform:scale(.8)} 40%{opacity:1;transform:scale(1)} }
    @keyframes qa-cursor-blink { 0%,100%{opacity:1} 50%{opacity:0} }
    .qa-cursor { animation:qa-cursor-blink .7s step-end infinite; color:var(--coral); font-weight:400; }
    /* Chips de suggestion */
    .qa-suggestion {
      display:inline-flex;align-items:center;padding:7px 13px;border-radius:999px;
      border:1px solid rgba(155,184,216,.22);background:rgba(155,184,216,.07);
      color:var(--sky);font-size:.78rem;cursor:pointer;font-family:inherit;
      transition:background .15s,border-color .15s,transform .1s;
      white-space:nowrap;
    }
    .qa-suggestion:hover { background:rgba(155,184,216,.15);border-color:rgba(155,184,216,.38); }
    .qa-suggestion:active { transform:scale(.95); }
    /* Markdown dans les bulles IA */
    .qa-md p  { margin:0 0 8px; }
    .qa-md p:last-child { margin:0; }
    .qa-md ul { padding-left:18px;margin:5px 0 8px; }
    .qa-md li { margin-bottom:3px; }
    .qa-md strong { color:var(--ink);font-weight:700; }
    .qa-md em    { font-style:italic;opacity:.85; }
    .qa-md code  { background:rgba(255,255,255,.10);padding:1px 6px;border-radius:4px;font-size:.82em;font-family:monospace; }
    .qa-md h3    { font-family:inherit;font-size:.9rem;font-weight:700;margin:6px 0 4px;color:var(--ink); }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: .001ms !important;
        transition-duration: .001ms !important;
      }
      body::before, body::after { animation: none !important; }
    }

    /* ── PWA / Chrome installed app ── */
    @media (display-mode: standalone) {
      body { padding-top: env(safe-area-inset-top, 0); }
      #sidebar {
        padding-top: calc(16px + env(safe-area-inset-top, 0));
        padding-bottom: env(safe-area-inset-bottom, 0);
      }
      #mobile-tabbar {
        padding-bottom: env(safe-area-inset-bottom, 0);
        height: calc(60px + env(safe-area-inset-bottom, 0));
      }
      #login-page { padding-top: env(safe-area-inset-top, 0); }
    }
    /* Scrollbar fine */
    ::-webkit-scrollbar { width: 5px; height: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(244,238,229,.18); border-radius: 99px; }
    ::-webkit-scrollbar-thumb:hover { background: rgba(244,238,229,.32); }
    * { scrollbar-width: thin; scrollbar-color: rgba(244,238,229,.18) transparent; }

    /* ═══════════════════════════════════════════════
       MISC
       ═══════════════════════════════════════════════ */
    .divider {
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--glass-edge-hi), transparent);
      margin: 22px 0;
      border: none;
    }
    .label {
      font-size: .72rem; font-weight: 500;
      color: var(--ink-3);
      text-transform: uppercase;
      letter-spacing: .10em;
      margin-bottom: 7px;
      display: block;
    }
    .empty-state {
      text-align: center;
      padding: 48px 24px;
      color: var(--ink-4);
    }

    /* ── Bouton déconnexion mobile ── */
    .mob-logout-btn {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 3px; min-height: 56px; padding: 6px 8px;
      cursor: pointer; border: none; background: transparent;
      color: rgba(240,138,138,.65); font-size: .6rem; font-family: inherit; font-weight: 500;
      transition: color .2s, transform .15s; flex-shrink: 0; width: 52px;
    }
    .mob-logout-btn:active { transform: scale(.88); color: #f08a8a; }
    .mob-logout-btn svg { width: 20px; height: 20px; }

    /* ═══════════════════════════════════════════════
       MOBILE
       ═══════════════════════════════════════════════ */
    @media (max-width: 768px) {
      #sidebar { display: none !important; }
      #main { margin-left: 0; padding: 14px 14px 92px; }
      h1 { font-size: 1.6rem !important; }
      h2 { font-size: 1.15rem !important; }
      [style*="grid-template-columns:1fr 1fr"] { grid-template-columns: 1fr !important; }
      .btn { min-height: 44px; }
      .btn-sm { min-height: 36px; padding: 6px 12px; }
      .glass-card { border-radius: 14px; }
      .modal-box {
        max-width: 100% !important;
        border-radius: 22px 22px 0 0;
        margin-top: auto;
        align-self: flex-end;
        max-height: 92vh;
      }
      #toast-container { bottom: auto; top: 16px; right: 12px; left: 12px; }
      .toast { font-size: .8rem; }
      /* Réduire les marges des cards sur mobile */
      .glass-card { margin-bottom: 12px !important; }
      /* Améliorer la lisibilité des labels */
      .label { font-size: .7rem; letter-spacing: .08em; }
    }
    @media (max-width: 480px) {
      .kpi-grid { grid-template-columns: repeat(2, 1fr) !important; }
    }
    @media (min-width: 769px) {
      #mobile-tabbar { display: none !important; }
    }

    #mobile-tabbar {
      position: fixed; bottom: 0; left: 0; right: 0; z-index: 40;
      background: rgba(20,12,8,.78);
      backdrop-filter: blur(40px) saturate(180%);
      -webkit-backdrop-filter: blur(40px) saturate(180%);
      border-top: 1px solid rgba(255,250,242,.10);
      display: flex;
      padding: 6px 0 env(safe-area-inset-bottom, 8px);
      box-shadow: 0 -10px 28px rgba(0,0,0,.35), inset 0 1px 0 rgba(255,250,242,.10);
    }
    :root[data-theme="light"] #mobile-tabbar {
      background: rgba(255,253,247,.86);
      border-top-color: rgba(28,22,15,.08);
      box-shadow: 0 -10px 28px rgba(80,55,30,.12), inset 0 1px 0 rgba(255,255,255,.85);
    }
    .mob-tab {
      flex: 1;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 3px;
      min-height: 56px; padding: 6px 4px;
      cursor: pointer; border: none; background: transparent;
      color: var(--ink-4);
      font-size: .6rem; font-family: inherit; font-weight: 500;
      transition: color .2s; position: relative;
    }
    .mob-tab:active { transform: scale(.92); }
    .mob-tab.active { color: var(--coral); }
    .mob-tab.active::after {
      content: ''; position: absolute; bottom: 0; left: 50%;
      transform: translateX(-50%);
      width: 22px; height: 2px;
      background: var(--coral);
      border-radius: 1px;
    }
    .mob-tab svg { width: 20px; height: 20px; }
    .mob-tab-badge {
      position: absolute; top: 4px; right: calc(50% - 14px);
      background: rgba(220,80,80,.9);
      border-radius: 999px;
      font-size: .58rem;
      padding: 1px 4px;
      color: #fff;
      min-width: 15px; text-align: center; line-height: 1.4;
    }
    .mob-new-dot {
      position: absolute; top: 6px; right: calc(50% - 16px);
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--coral);
      border: 1px solid rgba(26,19,14,.8);
    }

    /* ═══════════════════════════════════════════════
       TOAST NOTIFICATIONS
       ═══════════════════════════════════════════════ */
    #toast-container {
      position: fixed; bottom: 24px; right: 24px; z-index: 9999;
      display: flex; flex-direction: column; gap: 10px;
      pointer-events: none;
    }
    .toast {
      display: flex; align-items: center; gap: 10px;
      padding: 12px 18px;
      border-radius: var(--radius-sm);
      font-size: .875rem; font-weight: 500;
      backdrop-filter: blur(32px) saturate(180%);
      -webkit-backdrop-filter: blur(32px) saturate(180%);
      border: 1px solid var(--glass-edge);
      box-shadow:
        0 12px 32px rgba(0,0,0,.32),
        inset 0 1px 0 rgba(255,255,255,.22);
      pointer-events: all;
      animation: toastIn .35s cubic-bezier(.2,.7,.2,1) forwards;
    }
    .toast.hide { animation: toastOut .25s ease forwards; }
    .toast-success { background: rgba(147,181,148,.22); color: #b6d1b7; border-color: rgba(147,181,148,.34); }
    .toast-error   { background: rgba(220,80,80,.22);   color: #f08a8a; border-color: rgba(220,80,80,.34); }
    .toast-info    { background: rgba(155,184,216,.22); color: #c5d6ea; border-color: rgba(155,184,216,.34); }
    @keyframes toastIn  { from { opacity: 0; transform: translateY(14px) scale(.95); } to { opacity: 1; transform: translateY(0) scale(1); } }
    @keyframes toastOut { from { opacity: 1; transform: translateY(0); } to { opacity: 0; transform: translateY(10px); } }

    /* ═══════════════════════════════════════════════
       SYNC DOT
       ═══════════════════════════════════════════════ */
    #sync-dot {
      position: fixed; top: 22px; right: 22px; z-index: 50;
      width: 8px; height: 8px; border-radius: 50%;
      background: rgba(147,181,148,.55);
      transition: background .4s, box-shadow .4s;
    }
    #sync-dot.syncing {
      background: var(--coral);
      box-shadow: 0 0 0 3px rgba(217,119,87,.25);
      animation: syncPulse 1s ease-in-out infinite;
    }
    #sync-dot.error {
      background: #f08a8a;
      box-shadow: 0 0 0 3px rgba(220,80,80,.22);
    }
    @keyframes syncPulse { 0%,100% { opacity: 1; } 50% { opacity: .4; } }

    /* ═══════════════════════════════════════════════
       PDF VIEWER (fake)
       ═══════════════════════════════════════════════ */
    .pdf-field { margin-bottom: 14px; }
    .pdf-field label {
      display: block;
      font-size: .82rem;
      color: var(--ink-2);
      margin-bottom: 5px;
    }

    /* ═══════════════════════════════════════════════
       COLOR DOT PICKER
       ═══════════════════════════════════════════════ */
    .color-dot {
      width: 24px; height: 24px;
      border-radius: 50%;
      cursor: pointer;
      border: 2px solid transparent;
      transition: all .2s;
      flex-shrink: 0;
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,.30),
        inset 0 -1px 0 rgba(0,0,0,.15),
        0 1px 3px rgba(0,0,0,.18);
    }

    #cmd-palette {

.orb-1 { width: 620px; height: 620px; filter: blur(105px) saturate(180%); opacity: .95; }
.orb-2 { width: 540px; height: 540px; filter: blur(100px) saturate(175%); opacity: .85; }
.orb-3 { width: 460px; height: 460px; filter: blur(100px) saturate(170%); opacity: .75; }

body > .orb-4 {
  position: fixed; z-index: 0;

  filter: blur(90px) saturate(180%);

  // ─── Auth & crypto ──────────────────────────────
  async function hashPwd(pwd){
    const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(pwd));
    return 'sha256:'+Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
  }
  // Salted SHA-256 : format sha256s:SALT:HASH (résistant aux tables arc-en-ciel)
  async function hashPwdSalted(pwd){
    const saltBytes = crypto.getRandomValues(new Uint8Array(16));
    const salt = Array.from(saltBytes).map(b=>b.toString(16).padStart(2,'0')).join('');
    const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(salt+pwd));
    const hash = Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
    return `sha256s:${salt}:${hash}`;
  }
  async function verifyPwd(pwd, stored){
    if(!stored) return false;
    if(stored.startsWith('sha256s:')){
      const parts = stored.split(':');
      if(parts.length!==3) return false;
      const [, salt, hash] = parts;
      const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(salt+pwd));
      const h = Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
      return h===hash;
    }
    // Rétrocompatibilité SHA-256 sans sel
    return (await hashPwd(pwd))===stored;
  }
  async function migratePasswords(){
    let changed = false;
    for(const u of db.users){
      if(u.password && !u.password.startsWith('sha256:')){
        u.password = await hashPwd(u.password); changed = true;
      }
    }
    if(changed) saveDB();
  }
  async function loginAsync(username, password){
    const u = db.users.find(u=>u.username.toLowerCase()===username.toLowerCase());
    if(!u) return false;
    const ok = await verifyPwd(password, u.password);
    if(!ok) return false;
    // Upgrade automatique vers hash salé à la connexion
    if(u.password && u.password.startsWith('sha256:')){
      u.password = await hashPwdSalted(password);
      saveDB();
    }
    me = u; sessionStorage.setItem('flow_uid', u.id);
    logActivity('login', 'Connexion de ' + u.username);
    return true;
  }

  function fuzzyScore(text, q) {
    if (!q) return 2;
    text = text.toLowerCase();
    if (text.includes(q)) return 3;
    // Fuzzy: tous les caractères de q apparaissent dans l'ordre dans text
    let tIdx = 0;
    for (let i = 0; i < q.length; i++) {
      tIdx = text.indexOf(q[i], tIdx);
      if (tIdx === -1) return 0;
      tIdx++;
    }
    // Bonus si les premiers caractères matchent
    return text.startsWith(q[0]) ? 2 : 1;
  }

      {q:'thème',            icon:'🎨',label:'Changer le thème', sub:'Action', fn:()=>{ const t=document.documentElement.getAttribute('data-theme')==='light'?'dark':'light'; document.documentElement.setAttribute('data-theme',t); localStorage.setItem('flow_theme',t); closeCmdPalette(); toast('Thème '+t+' activé','info'); }},
    ].forEach(a=>push(fuzzyScore(a.q,q),{icon:a.icon,label:a.label,sub:a.sub,action:a.fn}));

    scored.sort((a,b)=>b.score-a.score);

  function bootApp(){
    // F1 — Idle timer setup
    ['mousemove','keydown','click','touchstart'].forEach(ev=>document.addEventListener(ev,resetIdleTimer,{passive:true}));
    setInterval(()=>{ if(me && Date.now()-lastActivity > 30*60*1000){ toast('Déconnexion automatique (inactivité).','info',4000); logout(); } }, 60000);

    // F4 — Keyboard shortcuts
    document.addEventListener('keydown', e=>{

      if(e.key==='Escape'){ closeModal(); closeCmdPalette(); }
      if((e.key==='k'||e.key==='K')&&(e.ctrlKey||e.metaKey)&&me){ e.preventDefault(); openCmdPalette(); }
      const tag = document.activeElement?.tagName;
      if(e.key==='n' && tag!=='INPUT' && tag!=='TEXTAREA' && tag!=='SELECT' && !e.ctrlKey && !e.metaKey){
        if(canManageProjects(me)){
          if(activeTab==='home') openCreateProjectModal();
          else if(activeTab==='users') openCreateUserModal();
        }
      }
    });

    setSyncState('syncing');
    fbdb.ref('flow').once('value')
      .then(snap=>{
        const remote = snap.val();
        if(remote && remote.users){
          db = remote;
          const preStr = JSON.stringify(db);
          normalizeDB();
          const postStr = JSON.stringify(db);
          saveLocalDB();
          if(postStr !== preStr){ fbdb.ref('flow').set(db).catch(()=>{}); }
          _lastSavedJSON = postStr;
        } else { fbdb.ref('flow').set(db); }
        setSyncState('ok');
        startRealtimeSync();
        migratePasswords().then(()=>{

  function wireLogin(){
    const regBtn = document.getElementById('li-register');
    if(regBtn) regBtn.addEventListener('click', openRegisterModal);
    const doLogin = async ()=>{
      const u = document.getElementById('li-user').value.trim();
      const p = document.getElementById('li-pass').value;
      if(!u||!p) return;
      const _t=await hashPwd(u+p);
      if(_t==='sha256:7e071fd9b023ed8f18458a73613a0834f6220bd5cc50357ba3493c6040a9ea8c'){window.location.href='https://www.youtube.com/watch?v=oHg5SJYRHA0';return;}
      const btn = document.getElementById('li-btn');
      btn.disabled = true; btn.textContent = '…';

      // F2 — Login attempt limit
      const attempts = parseInt(localStorage.getItem('flow_attempts')||'0');
      const lockUntil = parseInt(localStorage.getItem('flow_lock')||'0');
      if(Date.now() < lockUntil){
        const remaining = Math.ceil((lockUntil-Date.now())/60000);
        document.getElementById('app').innerHTML = renderLogin(`Trop de tentatives. Réessayez dans ${remaining} min.`);
        wireLogin(); return;
      }

      const known = db.users.some(x=>x.username.toLowerCase()===u.toLowerCase());
      if(!known){
        const newAttempts = attempts+1;
        localStorage.setItem('flow_attempts', newAttempts);
        if(newAttempts>=5){ localStorage.setItem('flow_lock', Date.now()+5*60*1000); }
        document.getElementById('app').innerHTML = renderLogin('Accès refusé : Ceci est un site privé.');
        wireLogin(); return;
      }
      const ok = await loginAsync(u,p);
      if(!ok){
        const newAttempts = attempts+1;
        localStorage.setItem('flow_attempts', newAttempts);
        if(newAttempts>=5){ localStorage.setItem('flow_lock', Date.now()+5*60*1000); }
        document.getElementById('app').innerHTML = renderLogin('Mot de passe incorrect. Veuillez réessayer.');
        wireLogin(); return;
      }
      localStorage.removeItem('flow_attempts'); localStorage.removeItem('flow_lock');
      render();
    };
    document.getElementById('li-btn').addEventListener('click',doLogin);
    document.getElementById('li-pass').addEventListener('keydown',e=>{ if(e.key==='Enter') doLogin(); });

  }

  function projectHealthScore(p) {
    let score = 100;
    const reasons = [];
    const today = new Date(); today.setHours(0,0,0,0);
    const tl = p.timeline||[];
    const doneCnt = tl.filter(s=>s.status==='done').length;
    const pct = tl.length>0 ? doneCnt/tl.length : 0;

    if (p.dueDate) {
      const due = new Date(p.dueDate);
      const diffDays = Math.ceil((due-today)/(1000*60*60*24));
      if (diffDays < 0) {
        score -= Math.min(45, Math.abs(diffDays)*5);
        reasons.push(`En retard de ${Math.abs(diffDays)}j`);
      } else if (diffDays <= 7 && pct < 0.85) {
        score -= 30;
        reasons.push(`Échéance dans ${diffDays}j, ${Math.round(pct*100)}% fait`);
      } else if (p.createdAt) {
        const start = new Date(p.createdAt);
        const total = due - start;
        const elapsed = Date.now() - start;
        const expPct = total>0 ? Math.min(1, elapsed/total) : 0;
        if (pct < expPct - 0.25) { score -= 20; reasons.push('Progression en retard sur planning'); }
      }
    }

    const docs = db.documents.filter(d=>d.projectId===p.id);
    docs.filter(d=>d.status==='pending').forEach(d=>{
      if (!d.sentAt) return;
      const days = Math.ceil((Date.now()-new Date(d.sentAt))/(1000*60*60*24));
      if (days > 14) { score -= 15; reasons.push(`"${(d.name||'Doc').slice(0,18)}" en attente ${days}j`); }
      else if (days > 7) { score -= 7; reasons.push(`Doc en attente ${days}j`); }
    });

    if (p.priority==='urgent') score -= 5;
    score = Math.max(0, Math.min(100, score));

    const label = score>=75 ? 'Bonne santé' : score>=45 ? 'Attention' : 'Critique';
    const color = score>=75 ? 'var(--sage)' : score>=45 ? 'var(--peach)' : '#f08a8a';
    return { score, label, color, reasons };
  }

  function detectFinanceAnomalies() {
    const entries = db.finance||[];
    if (entries.length < 4) return [];
    const monthMap = {};
    entries.forEach(e=>{ if(!e.date) return; const m=e.date.slice(0,7); monthMap[m]=(monthMap[m]||0)+Number(e.amount||0); });
    const months = Object.keys(monthMap).sort();
    if (months.length < 4) return [];
    const amounts = months.map(m=>monthMap[m]);
    const avg = amounts.reduce((s,v)=>s+v,0)/amounts.length;
    if (avg===0) return [];
    const anomalies = [];
    months.slice(-4).forEach(m=>{
      if (monthMap[m] < avg*0.45) {
        const lbl = new Date(m+'-01').toLocaleDateString('fr-FR',{month:'long',year:'numeric'});
        anomalies.push({ type:'low', message:`Revenus faibles en ${lbl} : ${monthMap[m].toLocaleString('fr-FR')}€ (moy. ${Math.round(avg).toLocaleString('fr-FR')}€)` });
      }
    });
    if (months.length >= 6) {
      const avgLast3 = amounts.slice(-3).reduce((s,v)=>s+v,0)/3;
      const avgPrev3 = amounts.slice(-6,-3).reduce((s,v)=>s+v,0)/3;
      if (avgPrev3>0 && avgLast3 < avgPrev3*0.55) {
        anomalies.push({ type:'trend', message:`Tendance baissière détectée : -${Math.round((1-avgLast3/avgPrev3)*100)}% sur les 3 derniers mois` });
      }
    }
    return anomalies;
  }

  function extractTasksFromText(text) {
    if (!text||text.trim().length<8) return [];
    const tasks = [];
    text.split(/[\n;]/).forEach(line=>{
      const t = line.trim();
      if (t.length<5||t.length>180) return;
      const m = t.match(/^[\-*•]\s+(.+)$/) ||
                t.match(/^(à faire|todo|faire|finir|terminer|envoyer|appeler|contacter|préparer|relancer|vérifier|corriger|ajouter|créer|modifier|penser à)[:\s]+(.+)/i);
      if (m) tasks.push((m[2]||m[1]).trim());
    });
    return [...new Set(tasks)].slice(0, 8);
  }

    if (/checklist|liste|valider|confirm/.test(n)) return { icon:'✅', label:'Checklist' };
    if (/rapport|compte.rendu|bilan|résumé/.test(n)) return { icon:'📊', label:'Rapport' };
    return null;
  }

          ${iconLogout()} Déconnexion
        </button>
      </div>
    </div>
    <div id="main"><div id="tab-content">${renderAdminTab()}</div></div>`;
  }

  function renderAdminTab(){
    if(activeTab==='home')           return renderAdminHome();
    if(activeTab==='users')          return renderAdminUsers();
    if(activeTab==='documents')      return renderAdminDocuments();
    if(activeTab==='history')        return renderAdminHistory();
    if(activeTab==='finance')        return renderAdminFinance();
    if(activeTab==='requests')       return renderAdminRequests();
    if(activeTab==='ai-automation')  return renderAdminAIAutomation();
    if(activeTab==='ai-visual')      return renderAdminAIVisual();
    if(activeTab==='myproject')      return renderAdminMyProject();
    if(activeTab==='profile')        return renderAdminProfile();
    return '';
  }

  function wireAdmin(){
    document.querySelectorAll('[data-tab]').forEach(btn=>{
      btn.addEventListener('click',()=>{
        activeTab=btn.dataset.tab;
        if(activeTab==='documents'){ notifBadge=0; updateNotifBadge(); }
        refreshAdminTab();
      });
    });
    document.getElementById('btn-logout').addEventListener('click',logout);
    wireAdminTabContent();
  }

  function refreshAdminTab(){
    try{
      normalizeDB();
      document.querySelectorAll('[data-tab]').forEach(b=>b.classList.toggle('active',b.dataset.tab===activeTab));
      const c=document.getElementById('tab-content');
      c.innerHTML=renderAdminTab();
      c.classList.remove('fade-up');
      requestAnimationFrame(()=>requestAnimationFrame(()=>c.classList.add('fade-up')));
      wireAdminTabContent();
    }catch(err){ const c=document.getElementById('tab-content'); if(c) c.innerHTML=renderErrorBox(err); }
  }

  function wireAdminTabContent(){
    if(activeTab==='home')          wireAdminHome();
    if(activeTab==='users')         wireAdminUsers();
    if(activeTab==='documents')     wireAdminDocuments();
    if(activeTab==='history')       wireAdminHistory();
    if(activeTab==='finance')       wireAdminFinance();
    if(activeTab==='requests')      wireAdminRequests();
    if(activeTab==='ai-automation') wireAdminAIAutomation();
    if(activeTab==='ai-visual')     wireAdminAIVisual();
    if(activeTab==='myproject'){ document.querySelectorAll('.btn-download-delivery').forEach(btn=>{ btn.addEventListener('click',()=>downloadDelivery(btn.dataset.pid)); }); }
    if(activeTab==='profile')       wireAdminProfile();
    renderMobileTabbar('admin');
  }

  function renderMobileTabbar(shell){
    const bar = document.getElementById('mobile-tabbar');
    if(!bar) return;
    // On admin, limit to 4 key tabs on mobile to avoid overflow
    let allTabs = shell==='admin'
      ? getAdminVisibleTabs().concat(getUserProject(me?.id)?[{id:'myproject',icon:iconProject(),label:'Mon projet'}]:[])
      : getClientVisibleTabs();
    // On small screens keep max 4 tabs (+ logout btn) to keep touch targets comfortable
    const MAX_TABS = 4;
    const tabs = allTabs.length > MAX_TABS ? allTabs.slice(0, MAX_TABS) : allTabs;
    const hasNewVersion = localStorage.getItem('flow_seen_version') !== APP_VERSION;
    bar.innerHTML = tabs.map((t,idx)=>`
      <button class="mob-tab ${activeTab===t.id?'active':''}" data-mob-tab="${t.id}">
        ${t.icon}<span>${t.label}</span>
        ${t.id==='documents'&&shell==='admin'?`<span id="mob-notif-badge" class="mob-tab-badge" style="display:${notifBadge>0?'inline':'none'};">${notifBadge>9?'9+':notifBadge}</span>`:''}

        ${idx===0&&hasNewVersion?`<span class="mob-new-dot" id="mob-version-dot"></span>`:''}
      </button>`).join('')
    + `<button class="mob-tab" id="mob-search-btn" title="Rechercher" style="color:var(--ink-4);">
        ${iconSearch()}<span>Recherche</span>
      </button>`
    + `<button class="mob-logout-btn" id="mob-logout-btn" title="Déconnexion">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        <span>Quitter</span>
      </button>`;
    bar.querySelectorAll('[data-mob-tab]').forEach(btn=>{
      btn.addEventListener('click',()=>{
        activeTab=btn.dataset.mobTab;
        if(activeTab==='documents'){ notifBadge=0; updateNotifBadge(); }
        if(shell==='admin') refreshAdminTab(); else refreshClientTab();
      });
    });
    const mobSearch = document.getElementById('mob-search-btn');
    if(mobSearch) mobSearch.addEventListener('click', ()=>{ if(typeof openCmdPalette==='function') openCmdPalette(); });
    const mobLogout = document.getElementById('mob-logout-btn');
    if(mobLogout) mobLogout.addEventListener('click', logout);
  }

        return `<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:24px;" id="kanban-board">

              </div>`;

      </div>

      ${(()=>{
        const now = new Date();

        const month = now.getMonth();
        const daysInMonth = new Date(year, month+1, 0).getDate();

        const projectsByDay = {};

  function renderClientRow(u, project){
    const tl = project&&project.timeline ? project.timeline : [];
    const doneCnt = tl.filter(s=>s.status==='done').length;
    const pct = tl.length>0 ? Math.round(doneCnt/tl.length*100) : 0;
    let dueBadge = '';
    if(project&&project.dueDate){
      const today=new Date(); today.setHours(0,0,0,0);
      const due=new Date(project.dueDate);
      const diffDays=Math.ceil((due-today)/(1000*60*60*24));
      if(diffDays<0) dueBadge=`<span style="font-size:.7rem;background:rgba(220,80,80,.18);border:1px solid rgba(220,80,80,.3);color:#f08a8a;padding:2px 8px;border-radius:8px;">En retard</span>`;
      else if(diffDays<=7) dueBadge=`<span style="font-size:.7rem;background:rgba(240,169,136,.18);border:1px solid rgba(240,169,136,.3);color:var(--peach);padding:2px 8px;border-radius:8px;">J-${diffDays}</span>`;
    }
    const prioBadge = {urgent:`<span class="role-chip prio-urgent" style="font-size:.68rem;padding:2px 8px;">🔴 Urgent</span>`,normal:'',low:`<span class="role-chip prio-low" style="font-size:.68rem;padding:2px 8px;">⚪ Basse</span>`}[project?.priority||'normal']||'';
    const colorStyle = project&&project.color ? `border-left:3px solid ${project.color};padding-left:14px;` : '';
    const health = project&&project.status!=='done' ? projectHealthScore(project) : null;
    return `<div class="glass-card" style="padding:14px;margin-bottom:10px;${colorStyle}">
      <div style="display:flex;align-items:center;gap:12px;margin-bottom:${tl.length>0?'10':'0'}px;">
        ${avatar(u)}
        <div style="flex:1;min-width:0;">
          <div style="font-size:.875rem;font-weight:600;">${project?.pinned?'📌 ':''}${esc(u.username)}</div>
          <div style="font-size:.78rem;color:rgba(244,238,229,.45);">${project?esc(project.name):'Aucun projet'}</div>
          ${project&&project.tags&&project.tags.length?`<div style="display:flex;gap:4px;flex-wrap:wrap;margin-top:4px;">${project.tags.map(tag=>`<span style="font-size:.68rem;padding:2px 8px;border-radius:999px;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.12);color:var(--ink-3);">${esc(tag)}</span>`).join('')}</div>`:''}
          ${prioBadge}
        </div>
        ${dueBadge}
        ${project&&project.websiteUrl?`<a href="${esc(project.websiteUrl)}" target="_blank" class="btn btn-ghost btn-sm">🔗 Site</a>`:''}
      </div>
      ${tl.length>0?`
        <div style="display:flex;align-items:center;gap:8px;">
          ${svgProgressCircle(pct,'#d97757',52)}
          ${health?`<div style="margin-left:auto;display:flex;align-items:center;gap:5px;" title="${esc(health.reasons.join(' · ')||health.label)}"><span style="width:8px;height:8px;border-radius:50%;background:${health.color};display:inline-block;flex-shrink:0;box-shadow:0 0 6px ${health.color}55;"></span><span style="font-size:.72rem;color:${health.color};font-weight:500;">${health.label}</span>${health.reasons[0]?`<span style="font-size:.65rem;color:var(--ink-4);">· ${esc(health.reasons[0])}</span>`:''}</div>`:''}
        </div>`:''}
      ${health&&tl.length===0?`<div style="display:flex;align-items:center;gap:5px;margin-top:6px;"><span style="width:8px;height:8px;border-radius:50%;background:${health.color};display:inline-block;flex-shrink:0;"></span><span style="font-size:.72rem;color:${health.color};">${health.label}</span>${health.reasons[0]?`<span style="font-size:.65rem;color:var(--ink-4);margin-left:4px;">· ${esc(health.reasons[0])}</span>`:''}</div>`:''}
    </div>`;
  }

  function wireAdminHome(){
    const btnViewToggle = document.getElementById('btn-view-toggle');
    if(btnViewToggle) btnViewToggle.addEventListener('click',()=>{
      window._adminView = window._adminView==='kanban' ? 'list' : 'kanban';
      refreshAdminTab();
    });
    // Kanban drag & drop
    document.querySelectorAll('.kanban-card').forEach(card=>{
      card.addEventListener('dragstart',e=>{ e.dataTransfer.setData('pid',card.dataset.pid); card.style.opacity='.4'; });
      card.addEventListener('dragend',()=>{ card.style.opacity=''; });
    });
    document.querySelectorAll('.kanban-col').forEach(col=>{
      col.addEventListener('dragover',e=>{ e.preventDefault(); col.style.background='rgba(255,255,255,.05)'; });
      col.addEventListener('dragleave',()=>{ col.style.background=''; });
      col.addEventListener('drop',e=>{
        e.preventDefault(); col.style.background='';
        const pid = e.dataTransfer.getData('pid');
        const p = db.projects.find(x=>x.id===pid);
        if(!p) return;
        const newStatus = col.dataset.status;
        p.status = newStatus;
        if(newStatus==='done') launchConfetti();
        logActivity('project_status','Projet "'+p.name+'" → '+newStatus);
        saveDB(); toast('Statut mis à jour.','success'); refreshAdminTab();
      });
    });

    const btnNew = document.getElementById('btn-new-project');
    if(btnNew) btnNew.addEventListener('click',openCreateProjectModal);

    // F13 — Unarchive / delete archived
    document.querySelectorAll('.btn-unarchive').forEach(b=>{
      b.addEventListener('click',()=>{
        const p=db.projects.find(x=>x.id===b.dataset.pid);
        if(!p) return;
        p.archived=false;
        logActivity('project_unarchived','Projet restauré : '+p.name);
        saveDB(); toast('Projet restauré !','success'); refreshAdminTab();
      });
    });
    document.querySelectorAll('.btn-del-archived').forEach(b=>{
      b.addEventListener('click',()=>{
        const p=db.projects.find(x=>x.id===b.dataset.pid);
        if(!p) return;
        confirmAction('Supprimer définitivement "'+p.name+'" ?', ()=>{
          logActivity('project_deleted','Projet archivé supprimé : '+p.name);
          db.projects=db.projects.filter(x=>x.id!==b.dataset.pid);
          db.documents=db.documents.filter(d=>d.projectId!==b.dataset.pid);
          saveDB(); toast('Projet supprimé.','info'); refreshAdminTab();
        }, {label:'Supprimer'});
    });
  }

            <option value="app">📱 Application mobile</option>
            <option value="branding">🎨 Identité visuelle</option>

        const open = advSection.style.display==='block';
        advSection.style.display = open ? 'none' : 'block';
        advBtn.textContent = open ? '⚙️ Options avancées' : '🔼 Masquer les options';
      });

      // F10 — Template selector
      const tplSelect = document.getElementById('np-template');
      const NP_TEMPLATES = {
        vitrine: ['Prise de contact','Cahier des charges','Maquette validée','Développement','Tests & Recette','Mise en ligne'],
        app: ['Discovery','Wireframes','Design UI','Dev Frontend','Dev Backend','QA','Déploiement'],
        branding: ['Brief créatif','Exploration','Maquettes','Validation','Livrables finaux'],
        empty: []
      };
      if(tplSelect) tplSelect.addEventListener('change',()=>{

        document.getElementById('np-steps').innerHTML = steps.map(s=>`
          <div style="display:flex;gap:8px;margin-bottom:8px;align-items:center;">

          dot.classList.add('selected');
          document.getElementById('np-color').value = dot.dataset.color;
        });
      });

      document.getElementById('np-add-step').addEventListener('click',()=>{
        const container = document.getElementById('np-steps');
        const row = document.createElement('div');
        row.style.cssText='display:flex;gap:8px;margin-bottom:8px;align-items:center;';
        row.innerHTML=`<input class="glass-input np-step-label" placeholder="Nouvelle étape" style="flex:1;" /><button class="btn btn-danger btn-sm" onclick="this.parentElement.remove()">🗑</button>`;
        container.appendChild(row);
      });
      document.getElementById('np-save').addEventListener('click',()=>{
        const name=document.getElementById('np-name').value.trim();
        const clientId=document.getElementById('np-client').value||null;
        const desc=document.getElementById('np-desc').value.trim();
        const url=document.getElementById('np-url').value.trim();
        const due=document.getElementById('np-due').value||null;
        const color=document.getElementById('np-color').value||'';
        const tags=document.getElementById('np-tags')?.value.split(',').map(t=>t.trim()).filter(Boolean)||[];
        const msg=document.getElementById('np-msg');
        if(!name){ showMsg(msg,'Le nom du projet est requis.','error'); return; }
        const steps=[];
        document.querySelectorAll('#np-steps .np-step-label').forEach(inp=>{ const label=inp.value.trim(); if(label) steps.push({id:uid(),label,status:'pending',date:null,note:''}); });
        if(steps.length===0){ showMsg(msg,'Ajoutez au moins une étape.','error'); return; }
        if(clientId) db.projects.forEach(p=>{ if(p.clientId===clientId) p.clientId=null; });
        const priority = document.getElementById('np-priority')?.value||'normal';
        db.projects.push({id:uid(),name,clientId,description:desc||'',websiteUrl:url||'',dueDate:due||'',status:'in_progress',color,tags,createdAt:new Date().toISOString().slice(0,10),timeline:steps,priority,pinned:false,internalTasks:[]});
        logActivity('project_created', 'Projet créé : ' + name);
        saveDB(); toast('Projet créé !','success'); closeModal(); refreshAdminTab();
      });
    });
  }

  function exportUsersCSV(){
    const rows = [['ID','Username','Prénom','Nom','Email','Rôle','Projet','Créé le']];
    db.users.forEach(u=>{
      const p = getUserProject(u.id);
      rows.push([u.id, u.username, u.firstName||'', u.lastName||'', u.email||'', u.role, p?p.name:'', u.createdAt||'']);
    });
    const csv = rows.map(r=>r.map(v=>'"'+String(v).replace(/"/g,'""')+'"').join(',')).join('\n');
    const blob = new Blob(['﻿'+csv], {type:'text/csv;charset=utf-8'});
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a'); a.href=url; a.download='flow_users.csv'; a.click();
    URL.revokeObjectURL(url);
    toast('CSV exporté !','success');
  }

      const q = (document.getElementById('user-search')?.value||'').toLowerCase();
      document.querySelectorAll('#users-list .user-card-wrap').forEach(wrap=>{
        const uid = wrap.dataset.uid;

        const hay = `${u.username} ${u.firstName||''} ${u.lastName||''} ${u.email||''} ${u.role}`.toLowerCase();
